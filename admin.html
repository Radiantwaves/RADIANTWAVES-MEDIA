<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RadiantWaves Admin</title>

<style>
body { font-family:Arial; padding:20px; background:#f4f4f4; }

input, textarea {
  width:100%;
  margin:10px 0;
  padding:10px;
}

button {
  padding:10px;
  background:#cc0000;
  color:white;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<h2>News Admin Panel</h2>

<input id="title" placeholder="Title">
<input id="image" placeholder="Image URL">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="publish()">Publish News</button>

<script>
function publish() {
  const news = {
    title: document.getElementById("title").value,
    image: document.getElementById("image").value,
    description: document.getElementById("desc").value
  };

  let existing = JSON.parse(localStorage.getItem("news")) || [];
  existing.unshift(news);

  localStorage.setItem("news", JSON.stringify(existing));

  alert("News Published!");
}
</script>

</body>
</html>
