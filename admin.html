<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h2>Admin Dashboard</h2>
</header>

<div style="padding:20px; max-width:600px; margin:auto;">

<h3>Create News Post</h3>

<input id="title" placeholder="Title" style="width:100%; margin:5px 0;">
<input id="image" placeholder="Image URL" style="width:100%; margin:5px 0;">
<textarea id="desc" placeholder="Description" style="width:100%; margin:5px 0;"></textarea>

<button onclick="addNews()">Publish</button>

<h3>Top Stories</h3>
<input id="topStory" placeholder="Add headline">
<button onclick="addTop()">Add</button>

</div>

<script src="admin.js"></script>

</body>
</html>
