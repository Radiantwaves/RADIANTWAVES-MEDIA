<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article - RadiantWaves</title>
<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; padding: 20px; }
h1 { font-size: 28px; }
p { line-height: 1.6; }
img.article-image { max-width: 100%; margin: 15px 0; border-radius: 5px; }
.back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: #0047AB; }
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="article">
  <p>Loading article...</p>
</div>

<a href="index.html" class="back-link">← Back to Home</a>

<script>
// Get the ID from URL
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

fetch('news.json')
  .then(res => res.json())
  .then(articles => {
    const articleDiv = document.getElementById('article');
    if(id !== null && articles[id]) {
      const a = articles[id];

      articleDiv.innerHTML = `
        <h1>${a.title} ${a.live ? '<span style="color:red;font-size:14px;">LIVE</span>' : ''}</h1>
        ${a.image ? `<img class="article-image" src="${a.image}" alt="${a.title}">` : ''}
        <p>${a.content}</p>
      `;
    } else {
      articleDiv.innerHTML = '<p>Article not found.</p>';
    }
  })
  .catch(err => {
    document.getElementById('article').innerHTML = '<p>Error loading article.</p>';
    console.error(err);
  });
</script>

</body>
</html>
