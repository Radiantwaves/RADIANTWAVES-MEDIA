<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Article</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 5px;
  margin-bottom: 15px;
}

h1 { margin-top: 0; }

.back {
  display: inline-block;
  margin-bottom: 15px;
  color: #0047AB;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back to Home</a>

<h1 id="title">Loading...</h1>

<img id="image" style="display:none;">

<p id="content">Loading article...</p>

</div>

<script>
// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// LOAD NEWS
fetch("news.json")
.then(res => res.json())
.then(data => {

  const article = data[id];

  if(!article){
    document.getElementById("title").textContent = "Article not found";
    return;
  }

  document.getElementById("title").textContent = article.title;
  document.getElementById("content").textContent = article.content;

  // IMAGE
  if(article.image){
    const img = document.getElementById("image");
    img.src = article.image;
    img.style.display = "block";
  }

})
.catch(()=>{
  document.getElementById("content").textContent = "Error loading article.";
});
</script>

</body>
</html>
