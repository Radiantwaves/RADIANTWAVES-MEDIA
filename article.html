<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves Article</title>

<style>

body{
font-family: Arial, sans-serif;
max-width:900px;
margin:auto;
padding:20px;
line-height:1.6;
}

h1{
color:#222;
}

.date{
color:gray;
font-size:14px;
margin-bottom:20px;
}

.external-link{
display:inline-block;
margin-top:20px;
padding:10px 16px;
background:#007BFF;
color:white;
text-decoration:none;
border-radius:4px;
}

.external-link:hover{
background:#0056b3;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div class="date" id="date"></div>

<p id="description"></p>

<div id="content"></div>

<a id="externalLink" class="external-link" target="_blank" style="display:none;">
Follow Official Source
</a>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("news.json")
.then(response => response.json())
.then(data => {

const article = data.articles[id];

document.getElementById("title").textContent = article.title;

document.getElementById("date").textContent = article.date;

document.getElementById("description").textContent = article.description;

document.getElementById("content").textContent = article.content;

if(article.link){

const link = document.getElementById("externalLink");

link.href = article.link;

link.style.display = "inline-block";

}

});

</script>

</body>
</html>
