<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves News</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
.header {
  text-align: center;
  background: white;
  padding: 15px;
}
.header img {
  width: 70px;
}
.title {
  font-size: 28px;
  font-weight: bold;
}

/* ARTICLE */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.article {
  background: white;
  padding: 20px;
  border-radius: 5px;
}

.article img {
  width: 100%;
  margin-bottom: 15px;
}

.article h1 {
  margin-top: 0;
}

.back {
  display: inline-block;
  margin-bottom: 15px;
  color: #0047AB;
  text-decoration: none;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
  <img src="images/icon-512.png">
  <div class="title">RadiantWaves</div>
</div>

<div class="container">
  <a href="index.html" class="back">← Back to Home</a>

  <div class="article" id="article"></div>
</div>

<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves</p>
</footer>

<script>
fetch("news.json")
.then(res => res.json())
.then(data => {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const article = data[id];

  const container = document.getElementById("article");

  container.innerHTML = `
    <h1>${article.title}</h1>
    ${article.image ? `<img src="${article.image}">` : ""}
    <p>${article.content.replace(/\\n/g, "<br><br>")}</p>
  `;
});
</script>

</body>
</html>
