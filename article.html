<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radiant Waves Article</title>

<link rel="icon" href="icon-512.png">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

img{
width:100%;
border-radius:5px;
}

h1{
margin-top:10px;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#0b3d91;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h2>Radiant Waves Global News</h2>

</header>

<div class="container" id="article"></div>

<script>

function getId(){

const params=new URLSearchParams(window.location.search)

return params.get("id")

}

const id=getId()

fetch("news.json")

.then(res=>res.json())

.then(data=>{

const article=data.articles[id]

let img=article.image?article.image:"icon-512.png"

document.getElementById("article").innerHTML=`

<img src="${img}">

<h1>${article.title}</h1>

<p>${article.description}</p>

<p><b>Date:</b> ${article.date}</p>

<a class="back" href="index.html">← Back to Home</a>

`

})

</script>

</body>
</html>
