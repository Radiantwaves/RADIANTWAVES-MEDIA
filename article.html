<!DOCTYPE html>
<html>
<head>
<title>Article</title>
<style>
body { font-family:Arial; padding:20px; }
img { width:100%; }
</style>
</head>

<body>

<h1 id="title"></h1>
<img id="image">
<p id="content"></p>

<script>
let article = JSON.parse(localStorage.getItem("selectedArticle"));

document.getElementById("title").textContent = article.title;
document.getElementById("image").src = article.image;
document.getElementById("content").textContent = article.content || article.description;
</script>

</body>
</html>
