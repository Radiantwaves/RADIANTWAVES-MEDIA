<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business - RadiantWaves</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}
header{background:#08364b;color:white;text-align:center;padding:20px;}
header h1{margin:10px;}
#news{max-width:900px;margin:auto;padding:20px;}
.news-card{background:white;padding:15px;margin-bottom:20px;border-radius:6px;box-shadow:0 0 5px rgba(0,0,0,0.2);}
.news-card img{width:100%;border-radius:4px;margin-bottom:10px;}
nav{background:black;text-align:center;padding:12px;}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>

<header>
<h1>Business News</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="world.html">World</a>
<a href="politics.html">Politics</a>
<a href="business.html">Business</a>
<a href="technology.html">Technology</a>
<a href="science.html">Science</a>
<a href="sports.html">Sports</a>
<a href="entertainment.html">Entertainment</a>
</nav>

<div id="news"></div>

<script>
const apiKey = "10618a434f80cc4ffe52717ea1bf2401";

function loadCategoryNews(articles){
  const container = document.getElementById("news");
  let hasNews = false;

  articles.forEach(article => {
    if(article.category === "business" || article.source?.name?.toLowerCase().includes("business")){
      const image = article.urlToImage || article.image || "images/business-1.jpg";
      const story = article.description || article.story || "Click to read more.";
      container.innerHTML += `
        <div class="news-card">
          <img src="${image}" alt="Business News Image">
          <h3>${article.title}</h3>
          <p>${story}</p>
        </div>
      `;
      hasNews = true;
    }
  });

  if(!hasNews){
    container.innerHTML = "<p>No business news available at the moment.</p>";
  }
}

// Try API first
fetch(`https://newsapi.org/v2/top-headlines?category=business&language=en&pageSize=10&apiKey=${apiKey}`)
.then(res => res.json())
.then(data => loadCategoryNews(data.articles))
.catch(err => {
  console.log("API failed, loading local news.json");
  fetch("news.json")
    .then(res => res.json())
    .then(data => loadCategoryNews(data.articles));
});
</script>

</body>
</html>
