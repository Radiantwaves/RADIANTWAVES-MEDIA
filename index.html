<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
}

nav{
display:flex;
gap:20px;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.breaking{
background:red;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 35s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:5px;
overflow:hidden;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-top:0;
}

.details{
display:none;
padding:15px;
background:#fafafa;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<header>

<h1>Radiant Waves News</h1>

<nav>

<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija Pulse')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>

<div class="search">
<input id="searchBar" placeholder="Search news..." onkeyup="searchNews()">
</div>

</nav>

</header>

<div class="breaking">
<span id="breakingNews"></span>
</div>

<div class="container" id="newsContainer"></div>

<footer>

Radiant Waves News © 2026  
Editor: Omotara How

</footer>

<script>

/* NEWS DATABASE */

const news=[

/* NAIJA PULSE */

{

},

{

synopsis:"Obi insists threats will not stop his travels.",
details:"Peter Obi reaffirmed his right to travel freely across Nigeria while addressing supporters. He said political intimidation cannot stop democratic participation and urged Nigerians to defend constitutional freedoms.",

},

{

title:"Sunday Igboho Speaks on Yoruba Unity Movement",
image:"images/igboho.jpg",

details:"Yoruba activist Sunday Igboho addressed supporters calling for stronger unity among Yoruba leaders. He emphasized peaceful advocacy and cultural preservation while encouraging dialogue.",

editor:"Omotara How"
},

{
category:"Naija Pulse",
title:"Fuel Price Increase Sparks Demonstrations in Lagos",
image:"images/fuel.jpg",

details:"Residents across Lagos staged demonstrations over rising petrol prices. Protesters say transportation costs and food prices have increased dramatically.",

},

{

title:"Nigeria Police Recruitment Receives Over 600,000 Applications",

},

/* WORLD */

{
category:"World",
title:"Global Oil Prices Rise Amid Middle East Conflict",
image:"images/oil.jpg",
synopsis:"Oil markets react to geopolitical tensions.",
details:"Global oil markets surged as geopolitical tensions intensified in the Middle East. Analysts warn supply disruptions could impact global inflation.",
source:"Reuters",
editor:"Omotara How"
},

{
category:"World",
title:"UN Calls for Immediate Ceasefire in Gaza Conflict",
image:"images/un.jpg",
synopsis:"Security Council urges diplomatic resolution.",
details:"The United Nations Security Council has urged an immediate ceasefire amid escalating violence in the Gaza region, citing humanitarian concerns.",
source:"BBC",
editor:"Omotara How"
},

{
category:"World",
title:"European Leaders Meet for Emergency Economic Summit",
image:"images/eu.jpg",
synopsis:"EU leaders discuss inflation response.",
details:"European Union leaders gathered in Brussels to discuss inflation control measures and economic recovery strategies.",
source:"Al Jazeera",
editor:"Omotara How"
},

/* TECHNOLOGY */

{
category:"Technology",
title:"New Artificial Intelligence Chip Promises Faster Processing",
image:"images/ai.jpg",
synopsis:"Tech firms unveil new AI chip technology.",
details:"Leading tech companies unveiled a new AI processor capable of significantly faster machine learning calculations.",
source:"TechCrunch",

},

{
category:"Technology",
title:"Cybersecurity Experts Warn of Global Cyber Threats",
image:"images/cyber.jpg",
synopsis:"Governments urged to strengthen cyber defense.",

source:"Wired",

},

/* SPORTS */

{
category:"Sports",
title:"Champions League Quarter-Final Draw Completed",
image:"images/championsleague.jpg",
synopsis:"Top clubs learn opponents.",
details:"UEFA confirmed the quarter-final matchups for the Champions League with major clubs preparing for decisive matches.",
source:"UEFA",
editor:"Omotara How"
},

{
category:"Sports",
title:"World Athletics Qualifiers Begin Worldwide",
image:"images/athletics.jpg",
synopsis:"Athletes compete for championship spots.",
details:"Qualifiers for the World Athletics Championships have begun across several continents as athletes aim to secure places in the global event.",
source:"World Athletics",
editor:"Omotara How"
},

/* ELECTION WATCH */

{
category:"Election",
title:"US Presidential Campaign Intensifies",
image:"images/us-election.jpg",
synopsis:"Candidates intensify nationwide campaigns.",
details:"Presidential candidates intensified campaigning across several key states as election debates dominate national politics.",
source:"CNN",
editor:"Omotara How"
},

{
category:"Election",
title:"UK Parties Prepare for Upcoming General Election",
image:"images/uk-election.jpg",
synopsis:"Political parties unveil campaign strategies.",
details:"Major UK political parties are unveiling campaign strategies as preparations begin for the next general election.",
source:"BBC",
editor:"Omotara How"
}

];

/* RENDER */

function render(list){

const container=document.getElementById("newsContainer");

container.innerHTML="";

list.forEach((n,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${n.image}">

<div class="card-content">

<h3>${n.title}</h3>

<p>${n.synopsis}</p>

<button onclick="toggle(${i})">Read More</button>

<div class="details" id="details${i}">

<p>${n.details}</p>

<p><b>Source:</b> ${n.source}</p>

<p><b>Editor:</b> ${n.editor}</p>

</div>

</div>

</div>

`;

});

}

/* FILTER */

function filterNews(cat){

if(cat==="all"){

render(news)

}else{

render(news.filter(n=>n.category===cat))

}

}

/* SEARCH */

function searchNews(){

let q=document.getElementById("searchBar").value.toLowerCase();

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

/* TOGGLE DETAILS */

function toggle(i){

let d=document.getElementById("details"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

/* BREAKING NEWS */

document.getElementById("breakingNews").innerText=

news.map(n=>n.title).join(" • ")

render(news)

</script>

</body>
</html>
