<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Radiant Waves News</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
text-align:center;
padding:15px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 16px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c40000;
}

.breaking{
background:black;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 35s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
padding:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:6px;
}

.card h3{
margin:10px 0;
}

.time{
color:gray;
font-size:13px;
margin-bottom:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

.social img{
width:30px;
margin:10px;
background:white;
padding:6px;
border-radius:6px;
}

audio{
margin-top:10px;
}

</style></head><body><header>Radiant Waves News</header><div class="breaking">
<span>
🔴 Macron Urges De-escalation in Middle East |
🔴 Global Oil Prices Surge |
🔴 Nigeria Reviews Economic Forecast |
🔴 US Raises Military Alert Worldwide |
🔴 Cybersecurity Agencies Warn of Attacks
</span>
</div><nav><button onclick="loadHome()">Home</button>
<button onclick="loadNigeria()">Naija Pulse</button>
<button onclick="loadTopic('world')">World</button>
<button onclick="loadTopic('business')">Business</button>
<button onclick="loadTopic('technology')">Technology</button>
<button onclick="loadTopic('sports')">Sports</button>

</nav><div class="container" id="news"></div><footer><div class="social"><a href="https://instagram.com/radiantwaves1">
<img src="instagram.png">
</a><a href="https://tiktok.com/@radiantwavesmedia">
<img src="tiktok.png">
</a><a href="https://facebook.com/radiantwavesnews">
<img src="facebook.png">
</a><a href="https://twitter.com/radiantwaves13528995">
<img src="twitter.png">
</a></div><audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio><p>© 2026 Radiant Waves News</p></footer><script>

const API_KEY="10618a434f80cc4ffe52717ea1bf2401"

function displayNews(articles){

let output=""

articles.forEach(article=>{

output+=`

<div class="card">

<img src="${article.image || 'https://picsum.photos/600/300'}">

<h3>${article.title}</h3>

<div class="time">
${new Date(article.publishedAt).toLocaleString()}
</div>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">Read Full Story</a>

</div>

`

})

document.getElementById("news").innerHTML=output

}

function loadHome(){

fetch(`https://gnews.io/api/v4/top-headlines?lang=en&max=10&apikey=${API_KEY}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadTopic(topic){

fetch(`https://gnews.io/api/v4/top-headlines?topic=${topic}&lang=en&max=10&apikey=${API_KEY}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadNigeria(){

fetch(`https://gnews.io/api/v4/search?q=Nigeria&lang=en&max=10&apikey=${API_KEY}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

loadHome()

</script></body>
</html>
