<script>

const apiKey = "10618a434f80cc4ffe52717ea1bf2401"

let page = 1
let currentCategory = "general"

function loadNews(category="general", reset=true){

if(reset){
page = 1
document.getElementById("news-container").innerHTML=""
}

currentCategory = category

fetch(`https://newsapi.org/v2/top-headlines?language=en&category=${category}&pageSize=12&page=${page}&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadNigeria(){

page = 1
currentCategory = "nigeria"

document.getElementById("news-container").innerHTML=""

fetch(`https://newsapi.org/v2/top-headlines?country=ng&pageSize=12&page=${page}&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadMore(){

page++

if(currentCategory === "nigeria"){

fetch(`https://newsapi.org/v2/top-headlines?country=ng&pageSize=12&page=${page}&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles,false))

}else{

fetch(`https://newsapi.org/v2/top-headlines?language=en&category=${currentCategory}&pageSize=12&page=${page}&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles,false))

}

}

function displayNews(articles){

const container = document.getElementById("news-container")

if(!articles || articles.length === 0){
container.innerHTML += "<p>No news available.</p>"
return
}

articles.forEach(article=>{

const news=document.createElement("div")

news.className="news"

news.innerHTML=`

<img src="${article.urlToImage || ''}" style="width:100%;max-height:200px;object-fit:cover">

<h2>
<a href="${article.url}" target="_blank">
${article.title}
</a>
</h2>

<p>${article.description || ""}</p>

`

container.appendChild(news)

})

}

loadNews()

</script>
