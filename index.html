<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves Global News</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

nav{
background:#111;
text-align:center;
padding:10px;
}

nav button{
background:#c40000;
color:white;
border:none;
padding:10px 14px;
margin:4px;
cursor:pointer;
}

nav button:hover{
background:red;
}

.ticker{
background:black;
color:white;
padding:8px;
font-size:14px;
overflow:hidden;
white-space:nowrap;
}

#searchBar{
width:90%;
padding:10px;
margin:15px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 10px 10px;
}

.readMore{
background:#c40000;
color:white;
border:none;
padding:8px 12px;
margin:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

.social img{
width:30px;
margin:5px;
}

audio{
margin-top:15px;
}

</style>

</head>

<body>

<header>
Radiant Waves Global News
</header>

<nav>

<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Naija')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election</button>

</nav>

<div class="ticker" id="ticker">
Loading global breaking news...
</div>

<center>
<input type="text" id="searchBar" placeholder="Search news..." onkeyup="searchNews()">
</center>

<div class="container" id="newsContainer"></div>

<footer>

<p>© 2026 Radiant Waves News Network</p>

<div class="social">

<a href="https://facebook.com">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://twitter.com">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
</a>

<a href="https://instagram.com">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="https://youtube.com">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

</div>

<audio controls>
<source src="news.mp3" type="audio/mpeg">
</audio>

</footer>

<script>

let allNews=[];

fetch("news.json?"+Date.now())

.then(response=>response.json())

.then(data=>{

allNews=data;

displayNews(data);

});

function displayNews(news){

const container=document.getElementById("newsContainer");

container.innerHTML="";

news.forEach(n=>{

container.innerHTML+=`

<div class="card">

<img src="${n.image}">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button class="readMore" onclick="alert('${n.details}')">Read More</button>

<p style="font-size:12px;padding:10px;">
${n.author} | Source: ${n.source}
</p>

</div>

`;

});

}

function filterNews(category){

if(category==="All"){

displayNews(allNews);

}else{

const filtered=allNews.filter(n=>n.category===category);

displayNews(filtered);

}

}

function searchNews(){

const search=document.getElementById("searchBar").value.toLowerCase();

const filtered=allNews.filter(n=>n.title.toLowerCase().includes(search));

displayNews(filtered);

}

const API_KEY="688936c0efcb471d8120682cea255d20";

fetch(`https://newsapi.org/v2/top-headlines?language=en&pageSize=5&apiKey=${API_KEY}`)

.then(res=>res.json())

.then(data=>{

let headlines="";

data.articles.forEach(a=>{

headlines+=a.title+"  •  ";

});

document.getElementById("ticker").innerText=headlines;

})

.catch(()=>{

document.getElementById("ticker").innerText="Global headlines updating soon on Radiant Waves.";

});

</script>

</body>

</html>
