<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RadiantWaves News Network</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

header img{
width:120px;
}

h1{
margin:10px 0;
font-size:36px;
}

.slogan{
color:#cfe8ff;
font-size:18px;
}

/* BREAKING NEWS */

.breaking{
background:#0d47a1;
color:white;
padding:10px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* NAVIGATION */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

/* NEWS */

#news{
max-width:900px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

.social img{
width:35px;
margin:8px;
}

</style></head><body><header><img src="images/icon-512.png" alt="RadiantWaves Logo"><h1>RadiantWaves</h1><p class="slogan">
Gateway to World News – Connecting You to the World
</p></header><div class="breaking">
<span id="breaking-news">RadiantWaves Global News Update</span>
</div><nav><a href="index.html">Home</a>
<a href="index.html">World</a>
<a href="index.html">Politics</a>
<a href="index.html">Business</a>
<a href="index.html">Technology</a>
<a href="index.html">Science</a>
<a href="index.html">Sports</a>
<a href="index.html">Entertainment</a>

</nav><div id="news"></div><footer><p>© 2026 RadiantWaves News Network</p><p>Truth • Insight • Global Perspective</p><div class="social"><a href="https://facebook.com/radiantwavesnews">
<img src="images/facebook.png">
</a><a href="https://instagram.com/radiantwaves1">
<img src="images/instagram.png">
</a><a href="https://twitter.com/radiant13528995">
<img src="images/twitter.png">
</a><a href="https://tiktok.com/@radiantwavesmedia">
<img src="images/tiktok.png">
</a></div></footer><script>

/* NEWS DATA API */

const apiKey="4183020c-43aa-40db-bebc-d1389f09d3cb";

/* AI rewrite */

function rewriteStory(title,text){

if(!text){
text="Global developments continue to unfold.";
}

return text + " RadiantWaves analysis suggests this development could have wider global implications.";

}

/* DISPLAY NEWS */

function showNews(articles){

let container=document.getElementById("news");
let breaking=document.getElementById("breaking-news");

container.innerHTML="";
let headlines=[];

articles.forEach(article=>{

let image=article.image_url || "images/world-1.jpg";

let story=rewriteStory(article.title,article.description);

container.innerHTML+=`

<div class="news-card">

<img src="${image}">

<h3>${article.title}</h3>

<p>${story}</p>

</div>

`;

headlines.push(article.title);

});

breaking.innerHTML=headlines.join(" • ");

}

/* LOAD LIVE NEWS */

fetch(`https://newsdata.io/api/1/news?apikey=${apiKey}&language=en`)

.then(res=>res.json())

.then(data=>{

if(data.results){

showNews(data.results);

}else{

loadLocalNews();

}

})

.catch(()=>loadLocalNews());

/* JSON BACKUP */

function loadLocalNews(){

fetch("news.json")

.then(res=>res.json())

.then(data=>showNews(data.articles));

}

</script></body></html>
