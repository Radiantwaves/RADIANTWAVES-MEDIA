<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
}

.breaking{
background:red;
color:white;
padding:10px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
padding-left:100%;
display:inline-block;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.section{
margin-bottom:40px;
}

.section h2{
border-left:5px solid #0b3d91;
padding-left:10px;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:5px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:4px;
}

.card h3{
font-size:18px;
margin-top:10px;
}

.card p{
font-size:14px;
color:#333;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<header>
<h1>Radiant Waves News</h1>
<p>Gateway to World News</p>
</header>

<div class="breaking">
<span id="breakingNews">Loading breaking news...</span>
</div>

<div class="container">

<div class="section">
<h2>🇳🇬 Naija Pulse</h2>
<div id="naijaNews" class="news-grid"></div>
</div>

<div class="section">
<h2>🌍 Global News</h2>
<div id="globalNews" class="news-grid"></div>
</div>

</div>

<footer>
© 2026 Radiant Waves News
</footer>

<script>

fetch("news.json")
.then(response => response.json())
.then(data => {

document.getElementById("breakingNews").innerText = data.breaking;

function displayNews(news, container){

let html="";

news.forEach(item =>{

html+=`
<div class="card">
<img src="${item.image}" alt="">
<h3>${item.title}</h3>
<p>${item.description}</p>
</div>
`;

});

document.getElementById(container).innerHTML = html;

}

displayNews(data.naija,"naijaNews");
displayNews(data.global,"globalNews");

})
.catch(error=>{
console.log("Error loading news:",error)
})

</script>

</body>
</html>
