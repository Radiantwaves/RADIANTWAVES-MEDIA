<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#000;}
header{background:#000;color:#fff;padding:15px;text-align:center;}
#breaking{background:orange;padding:8px;font-weight:bold;overflow:hidden;white-space:nowrap;}
#breaking span{display:inline-block;padding-left:100%;animation:scroll 15s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

#main{padding:15px;text-align:center;}
#main img{width:100%;max-height:400px;object-fit:cover;}

.card{
border:1px solid #ddd;
padding:10px;
margin:15px;
cursor:pointer;
}
.card img{width:100%;}
.card h3{color:#1e90ff;}

#social{text-align:center;padding:15px;}
#social img{width:30px;margin:5px;}
</style>
</head>
<body>

<header>
<h1>Radiant Waves Media</h1>
</header>

<div id="breaking"><span>Loading...</span></div>

<div id="main">
<img id="mainImage">
<h2 id="mainTitle"></h2>
<p id="mainSummary"></p>
<a id="mainLink" target="_blank">Read Full Story</a>
</div>

<div id="newsSection"></div>

<div id="social"></div>

<script>

fetch('news.json?v='+Date.now())
.then(res=>res.json())
.then(data=>{

// BREAKING
document.getElementById('breaking').innerHTML="<span>"+data.breaking+"</span>";

// MAIN
document.getElementById('mainImage').src=data.main.image;
document.getElementById('mainTitle').innerText=data.main.title;
document.getElementById('mainSummary').innerText=data.main.summary;
document.getElementById('mainLink').href=data.main.link;

// NEWS
let container=document.getElementById('newsSection');
container.innerHTML="";

data.news.forEach(item=>{
container.innerHTML+=`
<a href="${item.link}" target="_blank" style="text-decoration:none;color:inherit;">
<div class="card">
<img src="${item.image}">
<h3>${item.title}</h3>
<p>${item.summary}</p>
</div>
</a>
`;
});

// SOCIAL
let social=document.getElementById('social');
social.innerHTML="";
data.social.forEach(s=>{
social.innerHTML+=`<a href="${s.link}" target="_blank"><img src="${s.image}"></a>`;
});

});

</script>

</body>
</html>
