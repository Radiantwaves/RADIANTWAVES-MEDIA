<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiant Waves Global News</title>
  <link rel="icon" href="images/icon-512.png">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    header { background:#003366; color:white; padding:10px; display:flex; align-items:center; }
    header img { width:50px; margin-right:10px; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    nav a:hover { text-decoration:underline; }
    .breaking { background:#007bff; color:white; padding:5px; overflow:hidden; white-space:nowrap; }
    .breaking span { display:inline-block; padding-right:50px; animation:scroll 20s linear infinite; }
    @keyframes scroll { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }
    .container { display:flex; margin:20px; }
    .main { flex:3; margin-right:20px; }
    .sidebar { flex:1; background:#fff; padding:10px; }
    article { background:white; margin-bottom:20px; padding:10px; }
    article img { max-width:100%; }
    h2 { margin-top:0; }
    .footer { background:#003366; color:white; text-align:center; padding:10px; margin-top:20px; }
  </style>
</head>
<body>

<header>
  <img src="images/icon-512.png" alt="Radiant Waves Logo">
  <h1>Radiant Waves Global News</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="world.html">World</a>
    <a href="politics.html">Politics</a>
    <a href="business.html">Business</a>
    <a href="technology.html">Technology</a>
    <a href="science.html">Science</a>
    <a href="sports.html">Sports</a>
    <a href="entertainment.html">Entertainment</a>
  </nav>
</header>

<div class="breaking" id="breaking-news">
  <!-- Breaking news ticker -->
</div>

<div class="container">
  <div class="main" id="main-content">
    <!-- Main articles -->
  </div>
  <div class="sidebar" id="trending-news">
    <h3>Trending News</h3>
    <!-- Trending articles -->
  </div>
</div>

<div class="footer">
  <p>Follow us: 
    <a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a> | 
    <a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a> | 
    <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a> | 
    <a href="https://twitter.com/radiant13528995" target="_blank">Twitter</a>
  </p>
</div>

<script>
  // Set current category for each page
  const currentCategory = "all"; // Change to "world", "politics", etc. for category pages

  // Fetch news JSON
  fetch('news.json')
    .then(response => response.json())
    .then(news => {
      let filteredArticles = currentCategory === "all" 
        ? news.articles 
        : news.articles.filter(a => a.category === currentCategory);

      // Sort by date descending
      filteredArticles.sort((a,b) => new Date(b.date) - new Date(a.date));

      // Main content - first 5 articles
      const mainDiv = document.getElementById('main-content');
      filteredArticles.slice(0,5).forEach(article => {
        const art = document.createElement('article');
        art.innerHTML = `
          <h2>${article.title}</h2>
          <img src="${article.image || 'images/icon-512.png'}" alt="${article.title}">
          <p>${article.description}</p>
          <p><em>${article.date}</em></p>
        `;
        mainDiv.appendChild(art);
      });

      // Trending news - next 5 articles
      const trendingDiv = document.getElementById('trending-news');
      filteredArticles.slice(0,5).forEach(article => {
        const li = document.createElement('div');
        li.innerHTML = `<a href="#">${article.title}</a>`;
        trendingDiv.appendChild(li);
      });

      // Breaking news ticker - only latest 5
      const breakingDiv = document.getElementById('breaking-news');
      const ticker = filteredArticles.slice(0,5).map(a => `<span>${a.title}</span>`).join('');
      breakingDiv.innerHTML = ticker;
    })
    .catch(err => console.error("Failed to load news.json:", err));
</script>

</body>
</html>
