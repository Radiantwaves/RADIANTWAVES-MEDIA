<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { width: 100%; height: 250px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: red; color: white; padding: 8px; font-weight: bold; }

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 10px; text-decoration: none; cursor:pointer; }

/* LAYOUT */
.container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; padding: 15px; }
.main { flex: 3; min-width: 300px; }
.sidebar { flex: 1; padding-left: 15px; }

/* ARTICLE */
.article { background: white; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
.article img { width: 100%; height: 200px; object-fit: cover; margin-bottom: 10px; }
.readmore { color: red; font-weight: bold; text-decoration:none; }

/* LIVE */
.live { background: red; color: white; padding: 3px 6px; font-size: 10px; margin-right: 5px; }

/* FOOTER */
footer { background: #111; color: white; text-align: center; padding: 25px; margin-top: 20px; }
footer img { width: 50px; margin-bottom: 10px; }

/* SOCIAL */
.social a {
  display: inline-block;
  margin: 5px;
  padding: 8px 12px;
  background: #0047AB;
  color: white;
  text-decoration: none;
  border-radius: 3px;
}
.social a:hover { background: red; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/icon-512.png" alt="logo">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking" id="breakingNews">Loading breaking news...</div>

<!-- NAV -->
<nav>
  <a onclick="filterNews('All')">Home</a>
  <a onclick="filterNews('World')">World</a>
  <a onclick="filterNews('Politics')">Politics</a>
  <a onclick="filterNews('Business')">Business</a>
  <a onclick="filterNews('Technology')">Technology</a>
  <a onclick="filterNews('Science')">Science</a>
  <a onclick="filterNews('Sport')">Sport</a>
  <a onclick="filterNews('Entertainment')">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <img src="images/icon-512.png" alt="logo">

  <p><b>RadiantWaves Global News</b></p>
  <p>Truth. Insight. Global Perspective.</p>

  <div class="social">
    <a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a>
    <a href="https://twitter.com/radiant13528995" target="_blank">Twitter</a>
    <a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a>
    <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a>
    <a href="https://youtube.com/@radiantwave-wv6rg" target="_blank">YouTube</a>
  </div>

  <p style="margin-top:10px;">© 2026 RadiantWaves</p>
</footer>

<!-- SCRIPT -->
<script>
let allNews = [];

fetch("news.json")
.then(res => res.json())
.then(data => {
  allNews = data;
  displayNews(data);
});

function displayNews(data){
  const news = document.getElementById("news");
  const trending = document.getElementById("trending");

  news.innerHTML = "";
  trending.innerHTML = "";

  data.forEach((a,i)=>{
    const div = document.createElement("div");
    div.className = "article";

    if(a.image){
      div.innerHTML += `<img src="${a.image}">`;
    }

    div.innerHTML += `
      <h3>${a.live ? '<span class="live">LIVE</span>' : ''}${a.title}</h3>
      <p>${a.summary}</p>
      <a class="readmore" href="article.html?id=${i}">Read more</a>
    `;

    news.appendChild(div);
  });

  data.slice(0,5).forEach((a,i)=>{
    trending.innerHTML += `<p><a href="article.html?id=${i}">${a.title}</a></p>`;
  });

  document.getElementById("breakingNews").innerText = data[0].title;
}

function filterNews(category){
  if(category === "All"){
    displayNews(allNews);
  } else {
    displayNews(allNews.filter(n => n.category === category));
  }
}
</script>

</body>
</html>
