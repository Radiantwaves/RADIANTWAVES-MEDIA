<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#111; color:#fff; }
  header { background:#222; color:#fff; padding:10px; text-align:center; }
  #liveDateTime { font-size:0.9em; color:#ccc; }
  nav { display:flex; justify-content:center; flex-wrap:wrap; background:#333; }
  nav button { background:#444; color:#fff; border:none; padding:10px 15px; margin:5px; cursor:pointer; border-radius:4px; }
  nav button:hover { background:#555; }

  /* Main story styling */
  #mainStory { text-align:center; padding:15px; background:#222; margin:10px; border-radius:6px; box-shadow:0 0 6px #000; }
  #mainStory img { max-width:100%; border-radius:6px; margin-top:10px; }
  #mainTitle { color:#1e90ff; } /* Main headline blue */
  #mainSummary { color:#fff; }

  /* Sections */
  .section { display:none; padding:10px; }

  /* Cards */
  .card { background:#fff; padding:10px; margin:10px 0; border-radius:6px; box-shadow:0 0 4px #000; cursor:pointer; color:#000; }
  .card img { max-width:100%; border-radius:4px; display:block; margin-bottom:5px; }
  .card h3 { color:#1e90ff; } /* Card headline blue */
  .card p { color:#000; }

  /* Social icons */
  #social { display:flex; justify-content:center; margin:10px; }
  #social img { width:40px; height:40px; margin:0 5px; vertical-align:middle; }

  /* Scrolling Breaking news ticker */
  #breakingNews {
    background:#ffeb3b;
    color:#000;
    padding:5px 10px;
    margin:10px;
    border-radius:4px;
    font-weight:bold;
    overflow:hidden;
    white-space:nowrap;
    position: relative;
  }
  #breakingNews span.ticker {
    display: inline-block;
    padding-left: 100%;
    animation: scrollTicker 15s linear infinite;
  }
  @keyframes scrollTicker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  .camera-icon { display:inline-block; width:16px; height:16px; background:url('https://img.icons8.com/ios-glyphs/30/camera.png') no-repeat center center; background-size:contain; margin-right:4px; vertical-align:middle; }
</style>
</head>
<body>

<header>
  <h1>Radiant Waves Media</h1>
  <div id="liveDateTime"></div>
</header>

<nav>
  <button onclick="showSection('nigeria')">Nigeria</button>
  <button onclick="showSection('europe')">Europe</button>
  <button onclick="showSection('america')">America</button>
  <button onclick="showSection('africa')">Africa</button>
  <button onclick="showSection('asia')">Asia</button>
  <button onclick="showSection('politics')">Politics</button>
  <button onclick="showSection('business')">Business</button>
  <button onclick="showSection('music')">Music</button>
  <button onclick="showSection('movies')">Movies</button>
  <button onclick="showSection('sport')">Sport</button>
</nav>

<div id="mainStory">
  <h2 id="mainTitle">Loading headlines...</h2>
  <img id="mainImage" src="" alt="Main Story">
  <p id="mainSummary"></p>
</div>

<div id="breakingNews">Loading breaking news...</div>

<div id="nigeria" class="section"></div>
<div id="europe" class="section"></div>
<div id="america" class="section"></div>
<div id="africa" class="section"></div>
<div id="asia" class="section"></div>
<div id="politics" class="section"></div>
<div id="business" class="section"></div>
<div id="music" class="section"></div>
<div id="movies" class="section"></div>
<div id="sport" class="section"></div>

<div id="social">
  <img src="facebook.png" alt="Facebook">
  <img src="twitter.png" alt="Twitter">
  <img src="Instagram.png" alt="Instagram">
  <img src="tiktok.png" alt="TikTok">
</div>

<audio id="bgMusic" loop src="news-music.mp3"></audio>
<button onclick="toggleMusic()">Play / Pause Music</button>

<script>
let lastVersion = null;

// Load news
function loadNews() {
  fetch("news.json?v=" + Date.now())
    .then(response => response.json())
    .then(data => {
      // Main story
      document.getElementById("mainTitle").innerText = data.main[0].title;
      document.getElementById("mainSummary").innerText = data.main[0].summary;
      document.getElementById("mainImage").src = data.main[0].image;

      // Breaking news with scrolling ticker
      if(data.breaking){
        let breakingHTML = data.breaking.map(b => `<span class="camera-icon"></span>${b.title}`).join(" | ");
        document.getElementById("breakingNews").innerHTML = `<span class="ticker">${breakingHTML}</span>`;
      }

      // Load sections
      function loadSection(sectionName){
        if(data[sectionName]){
          let html = "";
          data[sectionName].forEach((item,index)=>{
            html += `<div class="card" onclick="showMainStory('${sectionName}', ${index})">
                      ${item.image ? `<img src="${item.image}">` : ""}
                      <h3>${item.title}</h3>
                      <p>${item.summary}</p>
                     </div>`;
          });
          document.getElementById(sectionName).innerHTML = html;
        }
      }
      ["nigeria","europe","africa","asia","america",
       "politics","business","music","movies","sport"].forEach(loadSection);

      // Alert if news updated
      if(lastVersion && lastVersion !== data.version){
        if(Notification.permission==="granted"){
          new Notification("Radiant Waves News", {
            body:"News has been updated! Click to view.",
            icon:data.main[0].image
          });
        } else { alert("News has been updated!"); }
      }
      lastVersion = data.version;
    }).catch(err => console.log("Failed to load news:", err));
}

// Show main story from section card
function showMainStory(section,index){
  fetch("news.json?v=" + Date.now())
    .then(res => res.json())
    .then(data=>{
      let story = data[section][index];
      document.getElementById("mainTitle").innerText = story.title;
      document.getElementById("mainSummary").innerText = story.summary;
      document.getElementById("mainImage").src = story.image || "main-story.jpg";
    });
}

// Navigation
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}
showSection("nigeria"); // default section

// Live clock & date
function updateClock(){
  const now=new Date();
  const options={ weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const date=now.toLocaleDateString(undefined,options);
  const time=now.toLocaleTimeString();
  document.getElementById("liveDateTime").innerHTML=date+" | "+time;
}
setInterval(updateClock,1000);
updateClock();

// Background music toggle
function toggleMusic(){
  const music=document.getElementById("bgMusic");
  if(music.paused){ music.play(); }else{ music.pause(); }
}

// Service Worker
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("service-worker.js")
      .then(()=>console.log("Service Worker Registered"));
  });
}

// Notification permission
if("Notification" in window){
  Notification.requestPermission().then(permission=>{
    if(permission==="granted") console.log("Notifications enabled");
  });
}

// Initial load
loadNews();
setInterval(loadNews, 300000);
</script>

</body>
</html>
