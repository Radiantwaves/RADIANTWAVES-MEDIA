<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
}

.breaking{
background:red;
color:white;
padding:10px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.section-title{
font-size:22px;
margin-top:30px;
border-bottom:3px solid #0b3d91;
padding-bottom:5px;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:15px;
}

.card{
background:white;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
margin:0;
}

.card p{
padding:0 10px 10px 10px;
font-size:14px;
color:#333;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>Radiant Waves News</h1>
<p>Gateway to World News</p>
</header>

<div class="breaking">
<strong>Breaking:</strong> <span id="breakingNews">Loading...</span>
</div>

<div class="container">

<div>
<h2 class="section-title">🇳🇬 Naija Pulse</h2>
<div id="naijaNews" class="news-grid"></div>
</div>

<div>
<h2 class="section-title">🌍 Global News</h2>
<div id="globalNews" class="news-grid"></div>
</div>

</div>

<footer>
© 2026 Radiant Waves News
</footer>

<script>

fetch("news.json")
.then(response => response.json())
.then(data => {

document.getElementById("breakingNews").textContent = data.breaking;

function showNews(list, elementId){

let output="";

list.forEach(news=>{

output+=`
<div class="card">
<img src="${news.image}" alt="">
<h3>${news.title}</h3>
<p>${news.description}</p>
</div>
`;

});

document.getElementById(elementId).innerHTML = output;

}

showNews(data.naija,"naijaNews");
showNews(data.global,"globalNews");

});

</script>

</body>
</html>
