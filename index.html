<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { width: 100%; height: 250px; overflow: hidden; position: relative; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* SOUND BUTTON */
.sound-btn {
  position:absolute;
  bottom:10px;
  right:10px;
  background:black;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

/* BREAKING */
.breaking { background:#0047AB; color:white; padding:8px; overflow:hidden; white-space:nowrap; }
.breaking span { display:inline-block; padding-left:100%; animation:scroll 20s linear infinite; }
@keyframes scroll { 100% { transform:translateX(-100%);} }

/* NAV */
nav { background:#111; text-align:center; padding:10px; }
nav a { color:white; margin:0 12px; cursor:pointer; }

/* LAYOUT */
.container { max-width:1200px; margin:auto; display:flex; flex-wrap:wrap; padding:20px; }
.main { flex:3; min-width:600px; }
.sidebar { flex:1; padding-left:20px; }

/* ARTICLE */
.article { background:white; padding:15px; margin-bottom:20px; }
.article img { width:80px; height:60px; object-fit:cover; margin-right:10px; }
.article h3 { display:flex; align-items:center; }

/* SOCIAL */
.social { text-align:center; padding:20px; }
.social img { width:28px; margin:5px; }

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:20px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/icon-512.png">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video id="bgVideo" autoplay loop playsinline>
    <source src="video1.mp4" type="video/mp4">
  </video>
  <button class="sound-btn" onclick="toggleSound()">🔊 Sound</button>
</div>

<!-- BREAKING -->
<div class="breaking">
  <span id="breakingNews">Loading...</span>
</div>

<!-- NAV -->
<nav>
  <a data-category="All">Home</a>
  <a data-category="World">World</a>
  <a data-category="Politics">Politics</a>
  <a data-category="Business">Business</a>
  <a data-category="Technology">Technology</a>
  <a data-category="Science">Science</a>
  <a data-category="Sport">Sport</a>
  <a data-category="Entertainment">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- SOCIAL MEDIA (WORKING ICONS ONLINE) -->
<div class="social">
  <a href="https://facebook.com/radiantwavesnews" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
  </a>
  <a href="https://twitter.com/radiant13528995" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/124/124021.png">
  </a>
  <a href="https://instagram.com/radiantwaves1" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
  </a>
  <a href="https://youtube.com/@radiantwave-wv6rg" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
  </a>
</div>

<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves Global News</p>
</footer>

<script>
// VIDEO SOUND FIX
function toggleSound(){
  const v = document.getElementById("bgVideo");
  v.muted = !v.muted;
}

// LOAD NEWS
fetch("news.json")
.then(res=>res.json())
.then(data=>{
  const news = document.getElementById("news");
  const trending = document.getElementById("trending");

  function render(cat){
    news.innerHTML="";
    trending.innerHTML="";

    const filtered = cat==="All" ? data : data.filter(a=>a.category===cat);

    filtered.forEach((a,i)=>{
      const div=document.createElement("div");
      div.className="article";

      const h3=document.createElement("h3");

      if(a.image){
        const img=document.createElement("img");
        img.src=a.image;
        h3.appendChild(img);
      }

      const link=document.createElement("a");
      link.href=`article.html?id=${i}`;
      link.innerHTML=(a.live?'<span style="background:red;color:white;font-size:10px;padding:2px;">LIVE</span> ':'')+a.title;

      h3.appendChild(link);
      div.appendChild(h3);

      const p=document.createElement("p");
      p.textContent=a.summary;

      div.appendChild(p);
      news.appendChild(div);
    });

    data.slice(0,5).forEach((a,i)=>{
      const t=document.createElement("a");
      t.href=`article.html?id=${i}`;
      t.textContent=a.title;
      trending.appendChild(t);
    });

    const b=data.find(a=>a.live)||data[0];
    const index=data.indexOf(b);
    document.getElementById("breakingNews").innerHTML =
      `<a href="article.html?id=${index}" style="color:white;">${b.title}</a>`;
  }

  render("All");

  document.querySelectorAll("nav a").forEach(btn=>{
    btn.onclick=()=>render(btn.dataset.category);
  });
});
</script>

</body>
</html>
