footer{background:#111;color:white;text-align:center;padding:20px;}

</head>

/* === INSERT YOUR API KEY HERE === */
const API_KEY = "10618a434f80cc4ffe52717ea1bf2401";

/* === Load API News per Category === */
async function loadNews(){
    try{
        const categories = ["world","technology","sports"];
        let apiNews = [];
        for(let cat of categories){
            const res = await fetch(`https://gnews.io/api/v4/top-headlines?token=${API_KEY}&lang=en&max=25&topic=${cat}`);
            const data = await res.json();
            if(data.articles){
                apiNews = apiNews.concat(data.articles.map(a=>({
                    category:capitalize(cat),
                    title:a.title,
                    synopsis:a.description || "Full story developing.",
                    details:a.content || a.description || "Full story developing.",
                    time:new Date(a.publishedAt).toLocaleDateString(),
                    image:a.image || "https://picsum.photos/800/400",
                    author:a.source.name,
                    url:a.url || ""
                })));
            }
        }
        allNews = apiNews;
        addNaijaPulse();
        addElectionNews();
        filteredNews = allNews;
        visibleCount = 10;
        updateBreakingNews();
        render();
    }catch(e){
        console.log("API failed, loading backup news.");
        loadBackup();
    }
}
