<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
.topbar {
  background:#cc0000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { display:flex; gap:10px; align-items:center; }
.logo img { height:40px; }

.slogan { font-size:12px; }

.topbar nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  position:relative;
  height:280px;
  background:black;
}

.hero-text {
  position:absolute;
  color:white;
  text-align:center;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  font-size:26px;
}

/* BREAKING */
.breaking {
  background:black;
  color:yellow;
  padding:10px;
  font-weight:bold;
}

/* CONTENT */
.section { padding:20px; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
}
.card img { width:100%; }

/* SOCIAL */
.social {
  text-align:center;
  padding:20px;
  background:white;
}
.social a {
  margin:10px;
  font-size:24px;
  color:#111;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.png">
    <div>
      <strong>RadiantWavesMedia</strong><br>
      <span class="slogan">Gateway to World News — Connecting You to the World</span>
    </div>
  </div>

  <nav>
    <a href="#">Home</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h2 id="hero-title"></h2>
  </div>
</div>

<!-- BREAKING -->
<div class="breaking">
  🔴 LIVE: <span id="breaking-text"></span>
</div>

<!-- FEATURED -->
<div class="section" id="featured"></div>

<!-- AUTO SECTIONS -->
<div id="sections"></div>

<!-- SOCIAL -->
<div class="social">
  <a href="https://facebook.com/Radiantwavesnews" target="_blank"><i class="fab fa-facebook"></i></a>
  <a href="https://twitter.com/radiant13528995" target="_blank"><i class="fab fa-x-twitter"></i></a>
  <a href="https://youtube.com/@radiantwave=wv6j" target="_blank"><i class="fab fa-youtube"></i></a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<footer>
  © 2026 RadiantWavesMedia<br>
  Connecting You Deeper to the World's Most Important Stories
</footer>

<script>
let allArticles = [];

async function loadNews() {
  const res = await fetch("news.json?v=" + new Date().getTime());
  const data = await res.json();

  allArticles = data.articles;

  setupBreaking(data.breaking);
  renderFeatured(allArticles[0]);
  renderSections();
}

/* BREAKING */
function setupBreaking(breaking) {
  let i = 0;
  function rotate() {
    document.getElementById("breaking-text").textContent = breaking[i];
    i = (i + 1) % breaking.length;
  }
  rotate();
  setInterval(rotate, 4000);
}

/* FEATURED */
function renderFeatured(article) {
  document.getElementById("hero-title").textContent = article.title;

  document.getElementById("featured").innerHTML = `
    <h2>${article.title}</h2>
    <img src="${article.image}">
    <p>${article.description || ""}</p>
  `;
}

/* AUTO SECTIONS */
function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  const categories = [...new Set(allArticles.map(a => a.category))];

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `
      <h2>${cat}</h2>
      <div class="grid"></div>
    `;

    const grid = section.querySelector(".grid");

    allArticles
      .filter(a => a.category === cat)
      .slice(0,4)
      .forEach(a => {
        grid.innerHTML += `
          <div class="card">
            <img src="${a.image}">
            <h4>${a.title}</h4>
          </div>
        `;
      });

    container.appendChild(section);
  });
}

loadNews();
</script>

</body>
</html>
