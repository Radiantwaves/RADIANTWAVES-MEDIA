<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{text-align:center;background:white;padding:20px;border-bottom:3px solid #c00;}
header img{width:120px;}
h1{color:#c00;margin:10px 0;}
.tagline{color:#333;font-size:16px;}
.breaking{background:#c00;color:white;padding:10px;font-weight:bold;overflow:hidden;white-space:nowrap;}
nav{background:#111;text-align:center;padding:12px;}
nav a{color:white;margin:0 12px;text-decoration:none;font-weight:bold;}
nav a:hover{color:#ffd700;}
#news{max-width:1000px;margin:auto;padding:20px;}
.card{background:white;margin-bottom:20px;padding:15px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.card img{width:100%;border-radius:4px;}
.card h3{color:#c00;}
.card p{color:#333;}
footer{background:#111;color:white;text-align:center;padding:30px;}
.social img{width:30px;margin:8px;}
</style>
</head>
<body>

<header>
<img src="images/logo.png" class="logo">
<h1>RadiantWaves</h1>
<p class="tagline">Gateway to World News</p>
<audio controls autoplay loop>
    <source src="audio/news-music.mp3" type="audio/mpeg">
</audio>
</header>

<div class="breaking">
<marquee id="breaking">Loading breaking news...</marquee>
</div>

<nav>
<a href="index.html">Home</a>
<a href="index.html#world">World</a>
<a href="index.html#politics">Politics</a>
<a href="index.html#business">Business</a>
<a href="index.html#technology">Technology</a>
<a href="index.html#sports">Sports</a>
<a href="index.html#entertainment">Entertainment</a>
</nav>

<section id="news"></section>

<footer>
<p>© 2026 RadiantWaves News Network</p>
<p>Truth • Insight • Global Perspective</p>
<div class="social">
<img src="social/facebook.png">
<img src="social/instagram.png">
<img src="social/twitter.png">
<img src="social/tiktok.png">
</div>
</footer>

<script>
// Inline JSON (optional) or fetch from news.json
const data = {
  "articles":[
    {
      "title":"France Faces New Transport Strike",
      "story":"Rail and metro workers across France have launched coordinated strikes over pension reforms. Millions of commuters affected while negotiations continue.",
      "image":"images/france.jpg",
      "category":"world"
    },
    {
      "title":"European Markets Close Higher",
      "story":"Technology stocks led gains across major European markets today as investors reacted to positive earnings forecasts.",
      "image":"images/business.jpg",
      "category":"business"
    },
    {
      "title":"Tech Innovations 2026",
      "story":"Global technology leaders unveil latest AI tools at the annual Tech Expo. The innovations promise to reshape industries.",
      "image":"images/placeholder.jpg",
      "category":"technology"
    }
  ]
};

let container = document.getElementById("news");
data.articles.forEach(article=>{
  container.innerHTML += `
  <div class="card">
    <img src="${article.image}">
    <h3>${article.title}</h3>
    <p>${article.story}</p>
  </div>
  `;
});

// Breaking news ticker
document.getElementById("breaking").innerHTML = data.articles[0].title;
</script>

</body>
</html>
