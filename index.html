<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { width: 100%; height: 250px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: #0047AB; color: white; padding: 8px; white-space: nowrap; overflow: hidden; }
.breaking span { display: inline-block; padding-left:100%; animation:scroll 20s linear infinite; }
@keyframes scroll { 0% { transform:translateX(0);} 100%{transform:translateX(-100%);} }

/* NAV */
nav { background:#111; text-align:center; padding:10px; }
nav a { color:white; margin:0 10px; cursor:pointer; }

/* LAYOUT */
.container { display:flex; flex-wrap:wrap; padding:20px; }
.main { flex:3; min-width:300px; }
.sidebar { flex:1; padding-left:20px; }

/* ARTICLE */
.article { background:white; padding:15px; margin-bottom:15px; border-radius:5px; }
.article img { width:100%; max-height:200px; object-fit:cover; }
.readmore { color:#0047AB; font-weight:bold; text-decoration:none; }

/* LIVE */
.live { background:red; color:white; padding:2px 6px; font-size:10px; margin-right:5px; }

/* SOCIAL */
.social { text-align:center; margin:20px; }
.social a { color:white; margin:0 8px; text-decoration:none; font-size:14px; }

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:20px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/icon-512.png" onerror="this.src='https://via.placeholder.com/70';">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video id="bgVideo" autoplay loop controls>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking">
  <span id="breakingNews">Loading breaking news...</span>
</div>

<!-- NAV -->
<nav>
  <a data-cat="All">Home</a>
  <a data-cat="World">World</a>
  <a data-cat="Politics">Politics</a>
  <a data-cat="Business">Business</a>
  <a data-cat="Technology">Technology</a>
  <a data-cat="Science">Science</a>
  <a data-cat="Sport">Sport</a>
  <a data-cat="Entertainment">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- SOCIAL (TEXT VERSION - WORKS ALWAYS) -->
<div class="social">
  <a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a> |
  <a href="https://twitter.com/radiant13528995" target="_blank">Twitter</a> |
  <a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a> |
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a> |
  <a href="https://youtube.com/@radiantwave-wv6rg" target="_blank">YouTube</a>
</div>

<!-- FOOTER -->
<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves Global News</p>
</footer>

<!-- SCRIPT -->
<script>
fetch("news.json")
.then(res => res.json())
.then(data => {

  const news = document.getElementById("news");
  const trending = document.getElementById("trending");

  function render(cat){
    news.innerHTML="";
    trending.innerHTML="";

    let filtered = (cat==="All") ? data : data.filter(a=>a.category===cat);

    filtered.forEach((a,i)=>{
      let div = document.createElement("div");
      div.className="article";

      if(a.image){
        let img = document.createElement("img");
        img.src = a.image;
        div.appendChild(img);
      }

      let h3 = document.createElement("h3");
      h3.innerHTML = (a.live ? '<span class="live">LIVE</span>' : '') + a.title;
      div.appendChild(h3);

      let p = document.createElement("p");
      p.textContent = a.summary;
      div.appendChild(p);

      let read = document.createElement("a");
      read.href = "article.html?id="+i;
      read.textContent="Read more";
      read.className="readmore";
      div.appendChild(read);

      news.appendChild(div);
    });

    // trending
    data.slice(0,5).forEach((a,i)=>{
      let t=document.createElement("a");
      t.href="article.html?id="+i;
      t.textContent=a.title;
      trending.appendChild(t);
    });

    // breaking
    let breaking = data.find(a=>a.live) || data[0];
    let idx = data.indexOf(breaking);
    document.getElementById("breakingNews").innerHTML =
      `<a href="article.html?id=${idx}" style="color:white;">${breaking.title}</a>`;
  }

  render("All");

  document.querySelectorAll("nav a").forEach(btn=>{
    btn.onclick=()=>render(btn.dataset.cat);
  });

});

// VIDEO ROTATION
const vids=["video1.mp4","video2.mp4","video3.mp4"];
let v=0;
setInterval(()=>{
  v=(v+1)%vids.length;
  document.getElementById("bgVideo").src=vids[v];
},12000);
</script>

</body>
</html>
