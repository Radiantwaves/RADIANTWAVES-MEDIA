<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves Global News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
text-align:center;
background:white;
padding:15px;
}

.header img{
width:70px;
}

.title{
font-size:32px;
font-weight:bold;
margin:5px;
}

.slogan{
color:#666;
font-size:14px;
}

/* AUDIO */

.audio-player{
margin-top:10px;
}

/* BREAKING NEWS */

.breaking{
background:#0047AB;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* NAV */

nav{
background:#111;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-size:14px;
}

/* LAYOUT */

.container{
max-width:1200px;
margin:auto;
display:flex;
padding:20px;
}

.main{
flex:3;
}

.sidebar{
flex:1;
padding-left:20px;
}

/* ARTICLES */

.article{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:4px;
}

.article h3{
margin-top:0;
}

.readmore{
color:#0047AB;
font-weight:bold;
text-decoration:none;
}

/* LIVE */

.live{
background:red;
color:white;
font-size:10px;
padding:3px 6px;
margin-right:5px;
border-radius:3px;
}

/* TRENDING */

.sidebar h3{
border-bottom:2px solid #ddd;
}

.sidebar a{
display:block;
margin:8px 0;
text-decoration:none;
color:#222;
}

/* SOCIAL */

.social{
text-align:center;
margin-top:20px;
}

.social img{
width:28px;
margin:5px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="images/icon-512.png">

<div class="title">RadiantWaves</div>

<div class="slogan">
Gateway to World News – Connecting You to the World
</div>

<div class="audio-player">
<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>
</div>

</div>

<!-- BREAKING -->

<div class="breaking">
<span id="breakingNews">Loading breaking news...</span>
</div>

<!-- NAVIGATION -->

<nav>

<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Politics</a>
<a href="#">Business</a>
<a href="#">Technology</a>
<a href="#">Science</a>
<a href="#">Sport</a>
<a href="#">Entertainment</a>

</nav>

<!-- CONTENT -->

<div class="container">

<div class="main" id="news"></div>

<div class="sidebar">

<h3>Trending News</h3>

<div id="trending"></div>

</div>

</div>

<!-- SOCIAL MEDIA -->

<div class="social">

<a href="#"><img src="images/facebook.png"></a>
<a href="#"><img src="images/twitter.png"></a>
<a href="#"><img src="images/tiktok.png"></a>
<a href="#"><img src="images/youtube.png"></a>

</div>

<!-- FOOTER -->

<footer>

<p>Truth. Insight. Global Perspective.</p>

<p>© 2026 RadiantWaves Global News</p>

</footer>

<!-- SCRIPT -->

<script>

fetch("news.json")

.then(res=>res.json())

.then(data=>{

const articles=data.articles;

const news=document.getElementById("news");

const trending=document.getElementById("trending");

/* MAIN NEWS */

articles.forEach((a,i)=>{

const live=a.live?'<span class="live">LIVE</span>':'';

news.innerHTML+=`

<div class="article">

<h3>${live}${a.title}</h3>

<p>${a.description}</p>

<a class="readmore" href="article.html?id=${i}">Read more</a>

</div>

`;

});

/* TRENDING */

articles.slice(0,10).forEach((a,i)=>{

trending.innerHTML+=`<a href="article.html?id=${i}">${a.title}</a>`;

});

/* BREAKING */

let breaking=articles.find(a=>a.live===true)||articles[0];

document.getElementById("breakingNews").textContent=breaking.title;

});

</script>

</body>
</html>
