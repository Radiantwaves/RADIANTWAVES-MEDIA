<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:26px;
text-align:center;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 18px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c40000;
}

.breaking{
background:black;
color:white;
padding:8px;
white-space:nowrap;
overflow:hidden;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
padding:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:5px;
}

.time{
color:gray;
font-size:13px;
}

.details{
display:none;
margin-top:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:32px;
margin:0 6px;
}

</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span id="breaking-news">
🔴 Middle East tensions rise | 🔴 Oil prices surge | 🔴 France election next week | 🔴 Global markets cautious
</span>
</div>

<nav>

<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('Nigeria')">Naija Pulse</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>
<button onclick="showCategory('Election')">🗳 Election Watch</button>

</nav>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="https://instagram.com">
<img src="https://cdn-icons-png.flaticon.com/32/174/174855.png">
</a>

<a href="https://facebook.com">
<img src="https://cdn-icons-png.flaticon.com/32/145/145802.png">
</a>

<a href="https://tiktok.com">
<img src="https://cdn-icons-png.flaticon.com/32/3046/3046121.png">
</a>

<a href="https://twitter.com">
<img src="https://cdn-icons-png.flaticon.com/32/733/733579.png">
</a>

</div>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

let allNews=[];

fetch("news.json")
.then(res=>res.json())
.then(data=>{
allNews=data;
render(allNews);
});

function render(list){

const container=document.getElementById("news");

let html="";

list.forEach((n,i)=>{

html+=`

<div class="card" onclick="toggle(${i})">

<img src="${n.image}">

<h3>${n.title}</h3>

<div class="time">${n.time}</div>

<div class="details" id="d${i}">

<p>${n.content}</p>

<p><em>${n.author}</em></p>

</div>

</div>

`;

});

container.innerHTML=html;

}

function toggle(i){

const d=document.getElementById("d"+i);

d.style.display=d.style.display==="block"?"none":"block";

}

function showCategory(cat){

if(cat==="All"){render(allNews);return;}

render(allNews.filter(n=>n.category===cat));

}

</script>

</body>
</html>
