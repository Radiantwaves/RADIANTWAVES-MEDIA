<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* INTRO */
#introScreen {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
}

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.title a { text-decoration: none; color: black; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { width: 100%; height: 250px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: #0047AB; color: white; padding: 8px; overflow: hidden; white-space: nowrap; }
.breaking span { display: inline-block; padding-left:100%; animation:scroll 20s linear infinite; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 12px; text-decoration: none; cursor:pointer; }

/* LAYOUT */
.container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; padding: 20px; }
.main { flex: 3; min-width: 600px; }
.sidebar { flex: 1; padding-left: 20px; }

/* ARTICLE */
.article { background: white; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
.readmore { color: #0047AB; font-weight: bold; text-decoration:none; }

/* LIVE */
.live { background: red; color: white; font-size: 10px; padding: 3px 6px; margin-right: 5px; }

/* FOOTER */
footer { background: #111; color: white; text-align: center; padding: 20px; }
</style>
</head>

<body>

<!-- TV INTRO -->
<div id="introScreen">
  <video id="introVideo" playsinline style="width:100%; height:100%; object-fit:cover;">
    <source src="video1.mp4" type="video/mp4">
  </video>

  <button onclick="startIntro()" style="
    position:absolute;
    bottom:40px;
    padding:12px 20px;
    font-size:16px;
    background:#0047AB;
    color:white;
    border:none;
    border-radius:5px;">
    ▶ Watch Breaking News
  </button>
</div>

<!-- HEADER -->
<div class="header">
  <a href="index.html"><img src="images/icon-512.png"></a>
  <div class="title"><a href="index.html">RadiantWaves</a></div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO BACKGROUND -->
<div class="video-bg">
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking">
  <span id="breakingNews">Loading breaking news...</span>
</div>

<!-- NAV -->
<nav>
  <a data-category="All">Home</a>
  <a data-category="World">World</a>
  <a data-category="Politics">Politics</a>
  <a data-category="Business">Business</a>
  <a data-category="Technology">Technology</a>
  <a data-category="Science">Science</a>
  <a data-category="Sport">Sport</a>
  <a data-category="Entertainment">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p><strong>RadiantWaves Global News</strong></p>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves</p>
</footer>

<!-- SCRIPT -->
<script>

// INTRO CONTROL
function startIntro(){
  const video = document.getElementById("introVideo");
  video.muted = false;
  video.play();

  setTimeout(() => {
    document.getElementById("introScreen").style.display = "none";
  }, 5000);
}

// LOAD NEWS
fetch("news.json")
.then(res => res.json())
.then(articles => {

  const news = document.getElementById("news");
  const trending = document.getElementById("trending");

  function render(category){
    news.innerHTML = '';
    trending.innerHTML = '';

    const filtered = category === 'All'
      ? articles
      : articles.filter(a => a.category === category);

    filtered.forEach((a,i)=>{
      const div = document.createElement('div');
      div.className = 'article';

      div.innerHTML = `
        <h3>${a.live ? '<span class="live">LIVE</span>' : ''} ${a.title}</h3>
        <p>${a.summary}</p>
        <a href="article.html?id=${i}" class="readmore">Read more</a>
      `;

      news.appendChild(div);
    });

    // trending
    articles.slice(0,5).forEach((a,i)=>{
      const t = document.createElement('a');
      t.href = `article.html?id=${i}`;
      t.textContent = a.title;
      t.style.display = "block";
      trending.appendChild(t);
    });

    // breaking
    const breaking = articles.find(a => a.live) || articles[0];
    const index = articles.indexOf(breaking);
    document.getElementById("breakingNews").innerHTML =
      `<a href="article.html?id=${index}" style="color:white;text-decoration:none;">${breaking.title}</a>`;
  }

  render('All');

  document.querySelectorAll("nav a").forEach(btn=>{
    btn.onclick = () => render(btn.dataset.category);
  });

})
.catch(()=>{
  document.getElementById("news").innerHTML = "<p>Error loading news</p>";
});

// VIDEO ROTATION
const vids = ["video1.mp4","video2.mp4","video3.mp4"];
let v = 0;

setInterval(()=>{
  v = (v+1) % vids.length;
  document.getElementById("bgVideo").src = vids[v];
}, 12000);

</script>

</body>
</html>
