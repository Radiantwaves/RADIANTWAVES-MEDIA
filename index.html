<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#c40000;color:white;padding:15px;text-align:center;font-size:28px;font-weight:bold;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 60s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
nav{background:#111;padding:10px;text-align:center;}
nav button{background:#c40000;color:white;border:none;padding:10px 14px;margin:4px;cursor:pointer;}
#searchBar{width:90%;padding:10px;margin:15px;font-size:16px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:20px;}
.card{background:white;border-radius:6px;box-shadow:0 0 5px rgba(0,0,0,0.2);overflow:hidden;}
.card img{width:100%;height:180px;object-fit:cover;}
.card h3{padding:10px;margin:0;cursor:pointer;}
.card p{padding:0 10px 10px 10px;}
.readMore{background:#c40000;color:white;border:none;padding:8px 12px;margin:10px;cursor:pointer;}
footer{background:#111;color:white;text-align:center;padding:20px;margin-top:20px;}
.social img{width:30px;margin:0 5px;}
audio{width:90%;margin-top:10px;}
.region-section{margin-top:20px;}
.region-section h2{margin-left:10px;color:#c40000;}
.country-section h3{margin-left:15px;color:#111;}
</style>
</head>
<body>

<header>Radiant Waves News</header>

<div class="breaking"><span id="ticker"></span></div>

<nav>
<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Naija')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election</button>
</nav>

<center>
<input type="text" id="searchBar" placeholder="Search news..." onkeyup="searchNews()">
</center>

<div class="container" id="newsContainer"></div>

<footer>
<p>© 2026 Radiant Waves</p>
<div class="social">
<a href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
<a href="https://twitter.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>
<a href="https://instagram.com"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a href="https://youtube.com"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
</div>
<div>
<audio controls>
<source src="news.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>
</div>
</footer>

<script>
let allNews = [];
const API_KEY = "688936c0efcb471d8120682cea255d20";

// Load local news
fetch("news.json")
.then(res=>res.json())
.then(localNews=>{
    allNews = localNews;
    fetchGlobalNews().then(apiNews=>{
        allNews = [...apiNews, ...allNews];
        displayNews(allNews);
        updateTicker();
    });
});

// Fetch global news by countries
async function fetchGlobalNews(){
    const countries = ["fr","us","gb","ng","in"];
    let newsArr = [];
    for(const c of countries){
        try{
            let res = await fetch(`https://gnews.io/api/v4/top-headlines?lang=en&country=${c}&max=5&token=${API_KEY}`);
            let data = await res.json();
            if(data.articles){
                let articles = data.articles.map(a=>({
                    title:a.title,
                    summary:a.description||"Latest news update.",
                    details:a.content||a.description,
                    image:a.image||"https://picsum.photos/400/250",
                    author:a.source.name,
                    source:a.source.name,
                    category:"World",
                    region:getRegionByCountry(c),
                    country:getCountryName(c)
                }));
                newsArr.push(...articles);
            }
        }catch(e){}
    }
    return newsArr;
}

// Map country codes to region and country names
function getRegionByCountry(code){
    switch(code){
        case "fr": return "Europe";
        case "gb": return "Europe";
        case "us": return "Americas";
        case "ng": return "Africa";
        case "in": return "Asia";
        default: return "World";
    }
}
function getCountryName(code){
    switch(code){
        case "fr": return "France";
        case "gb": return "UK";
        case "us": return "USA";
        case "ng": return "Nigeria";
        case "in": return "India";
        default: return "Global";
    }
}

// Display news cards
function displayNews(news){
    const container = document.getElementById("newsContainer");
    container.innerHTML="";

    let regions = {};
    news.forEach(n=>{
        if(n.region) regions[n.region] = regions[n.region]||[];
        if(n.region) regions[n.region].push(n);
    });

    if(currentCategory==="Election"){
        // Show Election Watch by country
        ["France","USA","UK","Nigeria","India"].forEach(c=>{
            const countryNews = news.filter(n=>n.country===c || (n.category==="Election" && n.country===c));
            if(countryNews.length){
                container.innerHTML += `<div class="region-section"><h2>Election Watch: ${c}</h2></div>`;
                countryNews.forEach(n=>{
                    container.innerHTML += cardHTML(n);
                });
            }
        });
    } else if(currentCategory==="World"){
        // Show World by region
        for(const r in regions){
            container.innerHTML += `<div class="region-section"><h2>${r}</h2></div>`;
            regions[r].forEach(n=>{
                container.innerHTML += cardHTML(n);
            });
        }
    } else {
        // Other categories
        news.forEach(n=>{
            container.innerHTML += cardHTML(n);
        });
    }
}

// Generate card HTML
function cardHTML(n){
    return `
    <div class="card">
        <img src="${n.image}">
        <h3 onclick="openArticle('${n.title.replace(/'/g,"\\'")}','${(n.details||"").replace(/'/g,"\\'")}','${n.image}','${n.author}','${n.source}')">${n.title}</h3>
        <p>${n.summary}</p>
        <button class="readMore" onclick="openArticle('${n.title.replace(/'/g,"\\'")}','${(n.details||"").replace(/'/g,"\\'")}','${n.image}','${n.author}','${n.source}')">Read More</button>
        <p style="font-size:12px;padding:10px;">${n.author} | Source: ${n.source}</p>
    </div>`;
}

let currentCategory = "All";
function filterNews(category){
    currentCategory = category;
    if(category==="All"){ displayNews(allNews); }
    else{ displayNews(allNews.filter(n=>n.category===category)); }
}

function searchNews(){
    const search = document.getElementById("searchBar").value.toLowerCase();
    displayNews(allNews.filter(n=>n.title.toLowerCase().includes(search)));
}

function openArticle(title,details,image,author,source){
    document.body.innerHTML = `
    <div style="padding:20px;">
        <h1>${title}</h1>
        <img src="${image}" style="width:80%;max-width:600px;">
        <p>${details}</p>
        <p><strong>${author}</strong> | Source: ${source}</p>
        <br>
        <button onclick="location.reload()">⬅ Back to Homepage</button>
    </div>`;
}

function updateTicker(){
    const ticker = document.getElementById("ticker");
    const latestTitles = allNews.slice(0,10).map(n=>n.title);
    ticker.innerText = latestTitles.join(" • ");
}
setInterval(updateTicker,30000);
</script>
</body>
</html>
