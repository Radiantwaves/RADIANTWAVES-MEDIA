<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:28px;
text-align:center;
font-weight:bold;
}

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 18px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c40000;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.search{
text-align:center;
padding:10px;
}

.search input{
padding:8px;
width:60%;
max-width:400px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
padding:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:5px;
}

.time{
color:gray;
font-size:13px;
}

.details{
display:none;
margin-top:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:32px;
margin:0 6px;
}

</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span id="breaking-news">
🔴 Global tensions rise | 🔴 Oil prices surge | 🔴 France election approaching | 🔴 Markets react worldwide
</span>
</div>

<nav>

<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>
<button onclick="showCategory('Election')">🗳 Election Watch</button>

</nav>

<div class="search">
<input type="text" placeholder="Search news..." onkeyup="searchNews(this.value)">
</div>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="#"><img src="https://cdn-icons-png.flaticon.com/32/174/174855.png"></a>
<a href="#"><img src="https://cdn-icons-png.flaticon.com/32/145/145802.png"></a>
<a href="#"><img src="https://cdn-icons-png.flaticon.com/32/733/733579.png"></a>
<a href="#"><img src="https://cdn-icons-png.flaticon.com/32/3046/3046121.png"></a>

</div>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

let allNews=[];
let filteredNews=[];

const API_KEY="10618a434f80cc4ffe52717ea1bf2401";

async function loadNews(){

try{

const res=await fetch(`https://gnews.io/api/v4/top-headlines?token=${API_KEY}&lang=en&max=25`);

const data=await res.json();

allNews=data.articles.map(a=>({

category:"World",

title:a.title,

time:new Date(a.publishedAt).toLocaleDateString(),

image:a.image || "https://picsum.photos/800/400",

content:a.description || "Full story developing.",

author:a.source.name

}));

addElectionNews();

filteredNews=allNews;

render();

}catch(e){

console.log("API failed loading backup");

loadBackup();

}

}

function addElectionNews(){

allNews.push(

{
category:"Election",
title:"France Prepares for Municipal Elections",
time:"7 March 2026",
image:"https://picsum.photos/800/400?501",
content:"France prepares for municipal elections scheduled next week which could influence national political momentum.",
author:"Radiant Waves News"
},

{
category:"Election",
title:"Nigeria Political Parties Prepare for 2027 Elections",
time:"7 March 2026",
image:"https://picsum.photos/800/400?502",
content:"Political alliances and strategies are already forming ahead of Nigeria’s 2027 national elections.",
author:"Radiant Waves News"
},

{
category:"Election",
title:"UK Local Elections Expected to Test Major Parties",
time:"7 March 2026",
image:"https://picsum.photos/800/400?503",
content:"Upcoming local elections will test support for political parties across the UK.",
author:"Radiant Waves News"
},

{
category:"Election",
title:"US Midterm Elections Expected to Reshape Congress",
time:"7 March 2026",
image:"https://picsum.photos/800/400?504",
content:"The United States prepares for midterm elections that could reshape the balance of power in Congress.",
author:"Radiant Waves News"
},

{
category:"Election",
title:"India State Elections Draw Global Attention",
time:"7 March 2026",
image:"https://picsum.photos/800/400?505",
content:"State elections in India are closely watched as indicators of national political trends.",
author:"Radiant Waves News"
}

);

}

function loadBackup(){

allNews=[

{
category:"World",
title:"Global Markets React to Rising Oil Prices",
time:"7 March 2026",
image:"https://picsum.photos/800/400?1",
content:"Markets around the world reacted cautiously as oil prices climbed amid geopolitical tensions.",
author:"Radiant Waves News"
}

];

filteredNews=allNews;

render();

}

function render(){

const container=document.getElementById("news");

container.innerHTML="";

filteredNews.forEach((n,i)=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${n.image}">

<h3>${n.title}</h3>

<div class="time">${n.time}</div>

<div class="details" id="d${i}">

<p>${n.content}</p>

<p><em>${n.author}</em></p>

</div>

`;

card.onclick=()=>{

const d=document.getElementById("d"+i);

d.style.display=d.style.display==="block"?"none":"block";

};

container.appendChild(card);

});

}

function showCategory(cat){

if(cat==="All"){

filteredNews=allNews;

}else{

filteredNews=allNews.filter(n=>n.category===cat);

}

render();

}

function searchNews(text){

filteredNews=allNews.filter(n=>

title.toLowerCase().includes(text.toLowerCase())

);

render();

}

loadNews();

</script>

</body>
</html>
