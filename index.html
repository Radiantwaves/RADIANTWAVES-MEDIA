<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Global News</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:12px 15px;
cursor:pointer;
}

nav button:hover{
background:#0b3d91;
}

.search{
margin-left:auto;
padding:8px;
}

.search input{
padding:6px;
width:200px;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 60s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:20px;
}

.card{
background:white;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:15px;
}

.details{
display:none;
margin-top:10px;
}

.read{
background:#0b3d91;
color:white;
border:none;
padding:6px 10px;
margin-top:8px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:26px;
margin:6px;
}

</style>

</head>

<body>

<header>

<h1>Radiant Waves Global News</h1>

<p>Gateway to World News – Connecting You to the World</p>

</header>


<div class="breaking">

<span id="ticker"></span>

</div>


<nav>

<button onclick="filterNews('all')">Home</button>

<button onclick="filterNews('Naija')">Naija Pulse</button>

<button onclick="filterNews('Africa')">Africa</button>

<button onclick="filterNews('World')">World</button>

<button onclick="filterNews('Tech')">Technology</button>

<button onclick="filterNews('Business')">Business</button>

<button onclick="filterNews('Sports')">Sports</button>

<button onclick="filterNews('Election')">Election Watch</button>

<div class="search">

<input id="search" placeholder="Search news..." onkeyup="searchNews()">

</div>

</nav>


<div class="container" id="news"></div>


<footer>

<div class="social">

<a href="https://instagram.com/radiantwaves1"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>

<a href="https://tiktok.com/@radiantwavesmedia"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>

<a href="https://facebook.com/radiantwavesnews"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>

<a href="https://twitter.com/radiantwaves13528995"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>

</div>

<p>© 2026 Radiant Waves Global News</p>

</footer>


<script>


const breakingNews=[

"Nigeria expands electricity meter rollout",

"Kenya launches regional tech hub",

"Global oil prices fluctuate amid supply pressure",

"Artificial intelligence transforming global healthcare",

"European leaders meet to discuss economic recovery"

];

document.getElementById("ticker").innerText=breakingNews.join(" • ");


// SAMPLE NEWS (you will add more later)

const news=[

{
title:"Nigeria Expands Electricity Meter Rollout",
category:"Naija",
image:"https://picsum.photos/400/250?1",
summary:"Government expands national electricity metering.",
details:"Nigeria continues its nationwide electricity meter rollout to reduce estimated billing and improve transparency in power distribution.",
author:"Editor: Omotara How",
source:"Radiant Waves"
},

{
title:"Kenya Launches New Technology Hub",
category:"Africa",
image:"https://picsum.photos/400/250?2",
summary:"East Africa boosts startup innovation.",
details:"Kenya opened a new technology innovation hub aimed at supporting startups across East Africa and expanding digital entrepreneurship.",
author:"Editor: Omotara How",
source:"Radiant Waves"
},

{
title:"Global Climate Talks Focus on Renewable Energy",
category:"World",
image:"https://picsum.photos/400/250?3",
summary:"Countries push renewable energy plans.",
details:"Leaders at global climate talks emphasized renewable energy investments to accelerate the transition away from fossil fuels.",
author:"Editor: Omotara How",
source:"Radiant Waves"
},

{
title:"Artificial Intelligence Expands Healthcare Diagnostics",
category:"Tech",
image:"https://picsum.photos/400/250?4",
summary:"AI tools help doctors detect disease faster.",
details:"Healthcare providers worldwide are adopting artificial intelligence technologies to improve disease detection and patient care.",
author:"Editor: Omotara How",
source:"Radiant Waves"
},

{
title:"Champions League Quarter Final Draw Announced",
category:"Sports",
image:"https://picsum.photos/400/250?5",
summary:"European clubs prepare for knockout battles.",
details:"Major European clubs learned their Champions League quarter final opponents in a draw held this week.",
author:"Editor: Omotara How",
source:"Radiant Waves"
}

];



function render(list){

let html="";

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p><b>${n.category}</b></p>

<p>${n.summary}</p>

<div id="d${i}" class="details">

<p>${n.details}</p>

<p><b>${n.author}</b></p>

<p><i>${n.source}</i></p>

</div>

<button class="read" onclick="toggle(${i})">Read More</button>

</div>

</div>

`;

});

document.getElementById("news").innerHTML=html;

}


function toggle(i){

let d=document.getElementById("d"+i);

d.style.display=d.style.display==="block"?"none":"block";

}


function filterNews(cat){

if(cat==="all"){

render(news);

}

else{

render(news.filter(n=>n.category===cat));

}

}


function searchNews(){

let q=document.getElementById("search").value.toLowerCase();

render(news.filter(n=>n.title.toLowerCase().includes(q)));

}


render(news);

</script>


</body>

</html>
