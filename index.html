/* ===== Display functions ===== */
function displayNews(data){
  const container = document.getElementById("newsContainer");
  container.innerHTML = "";
  data.forEach((news,index)=>{
    container.innerHTML += `
      <div class="card" onclick="toggleDetails(${index})">
        <img src="${news.image}">
        <h3>${news.title}</h3>
        <div class="time">${new Date(news.time).toLocaleString()}</div>
        <div class="details" id="details${index}">
          <p>${news.content}</p>
          <p><em>By: ${news.author}</em></p>
        </div>
      </div>
    `;
  });
}

function toggleDetails(index){
  const detail = document.getElementById("details"+index);
  detail.style.display = detail.style.display==="block"?"none":"block";
}

function filterNews(category){
  if(category==="All"){
    displayNews(newsData);
  }else{
    displayNews(newsData.filter(n=>n.category===category));
  }
}
