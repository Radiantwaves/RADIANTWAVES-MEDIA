<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves News Network</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#002b45;
color:white;
padding:15px;
text-align:center;
}

.logo img{
width:120px;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

.breaking{
background:red;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
}

main{
max-width:1000px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
margin-bottom:15px;
padding:15px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
max-height:200px;
object-fit:cover;
border-radius:4px;
}

footer{
background:#002b45;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:35px;
margin:5px;
}
</style>
</head>

<body>

<header>

<div class="logo">
<img src="main-story.jpg">
<h1>RadiantWaves</h1>
<p>Gateway to World News, connecting you to the World</p>
</div>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking" id="breaking">
Loading global headlines...
</div>

<nav>
<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Politics</a>
<a href="#">Business</a>
<a href="#">Technology</a>
<a href="#">Sports</a>
</nav>

<main>

<div id="news"></div>

</main>

<footer>

<p>© 2026 RadiantWaves News Network</p>
<p>Truth. Insight. Global Perspective</p>

<div class="social">
<img src="facebook.png">
<img src="instagram.png">
</div>

</footer>

<script>

const apiKey="10618a434f80cc4ffe52717ea1bf2401";

const url=`https://gnews.io/api/v4/top-headlines?lang=en&max=10&apikey=${apiKey}`;

fetch(url)
.then(res=>res.json())
.then(data=>{

const newsContainer=document.getElementById("news");
const breaking=document.getElementById("breaking");

if(data.articles){

breaking.innerHTML=data.articles[0].title;

data.articles.forEach(article=>{

let card=document.createElement("div");
card.className="news-card";

card.innerHTML=`

<img src="${article.image || 'main-story.jpg'}">

<h3>${article.title}</h3>

<p>${article.description || ''}</p>

<a href="${article.url}" target="_blank">Read full story</a>

`;

newsContainer.appendChild(card);

});

}

})
.catch(err=>{
document.getElementById("breaking").innerHTML="Global headlines updating soon";
});

</script>

</body>
</html>
