<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
html { scroll-behavior: smooth; }

body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
.topbar {
  background:#cc0000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  height:40px;
}

.topbar a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  position:relative;
  height:300px;
  overflow:hidden;
}

#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-text {
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  text-shadow:2px 2px 6px black;
}

/* BREAKING */
.breaking {
  background:black;
  color:yellow;
  overflow:hidden;
  white-space:nowrap;
}

.ticker {
  display:inline-block;
  padding-left:100%;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.main-news img {
  width:100%;
  border-radius:6px;
}

.sidebar article {
  background:white;
  padding:10px;
  margin-bottom:10px;
}

/* SECTIONS */
.section {
  padding:20px;
}

.section h2 {
  border-bottom:3px solid #cc0000;
  padding-bottom:5px;
}

/* VIDEO */
.video-section {
  padding:20px;
}

.video-section iframe {
  width:100%;
  height:400px;
}

/* SOCIAL */
.social {
  text-align:center;
  padding:20px;
  background:white;
}

.social i {
  font-size:25px;
  margin:10px;
  cursor:pointer;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.png" alt="logo">
    <span>RadiantWavesMedia</span>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#world">World</a>
    <a href="#politics">Politics</a>
    <a href="#business">Business</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop id="bgVideo">
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>

  <div class="hero-text">
    <h2 id="hero-title"></h2>
  </div>
</section>

<!-- BREAKING -->
<div class="breaking">
  <div class="ticker">
    🔴 LIVE: <span id="breaking-text"></span>
  </div>
</div>

<!-- MAIN -->
<main class="container">

<section class="main-news" id="main-news"></section>

<aside class="sidebar" id="sidebar-news"></aside>

</main>

<!-- WORLD -->
<section id="world" class="section">
  <h2>World</h2>
  <p>Global updates and international news.</p>
</section>

<!-- POLITICS -->
<section id="politics" class="section">
  <h2>Politics</h2>
  <p>Latest political developments worldwide.</p>
</section>

<!-- BUSINESS -->
<section id="business" class="section">
  <h2>Business</h2>
  <p>Market trends and economic insights.</p>
</section>

<!-- VIDEO -->
<section class="video-section">
  <h2>Featured Video</h2>
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
</section>

<!-- SOCIAL -->
<div class="social">
  <i class="fab fa-facebook"></i>
  <i class="fab fa-x-twitter"></i>
  <i class="fab fa-youtube"></i>
  <i class="fab fa-instagram"></i>
</div>

<footer>
© 2026 RadiantWavesMedia
</footer>

<script>
const data = {
  breaking: "Global leaders meet amid AI revolution",
  main: {
    title: "AI is Transforming the World Economy",
    image: "https://picsum.photos/800/400",
    description: "Artificial intelligence is reshaping industries, markets, and global innovation."
  },
  topStories: [
    "Markets surge worldwide",
    "New tech revolution emerging",
    "Climate summit updates",
    "Global politics shift"
  ]
};

document.getElementById("hero-title").textContent = data.main.title;
document.getElementById("breaking-text").textContent = data.breaking;

document.getElementById("main-news").innerHTML = `
  <h2>${data.main.title}</h2>
  <img src="${data.main.image}">
  <p>${data.main.description}</p>
`;

const sidebar = document.getElementById("sidebar-news");
data.topStories.forEach(t => {
  sidebar.innerHTML += `<article><h4>${t}</h4></article>`;
});
</script>

</body>
</html>
