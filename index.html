<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Newsroom</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#c40000;color:white;padding:15px;font-size:28px;text-align:center;font-weight:bold;}
nav{background:#111;display:flex;flex-wrap:wrap;overflow:auto;}
nav button{background:none;border:none;color:white;padding:14px 18px;cursor:pointer;font-size:15px;}
nav button:hover{background:#c40000;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 60s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.search{text-align:center;padding:10px;}
.search input{padding:8px;width:60%;max-width:400px;border-radius:5px;border:1px solid #ccc;}
.container{padding:15px;}
.card{background:white;margin-bottom:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:5px;}
.time{color:gray;font-size:13px;}
.details{display:none;margin-top:10px;}
.load-more{padding:10px 20px;margin:10px;cursor:pointer;background:#c40000;color:white;border:none;border-radius:5px;font-size:14px;}
footer{background:#111;color:white;text-align:center;padding:20px;}
.social img{width:32px;margin:0 6px;}
</style>
</head>
<body>

<header>Radiant Waves Newsroom</header>

<div class="breaking">
<span id="breaking-news">🔴 Loading breaking news...</span>
</div>

<nav>
<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('Naija Pulse')">Naija Pulse</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>
<button onclick="showCategory('Election')">🗳 Election Watch</button>
</nav>

<div class="search">
<input type="text" placeholder="Search news..." onkeyup="searchNews(this.value)">
</div>

<div class="container" id="news">
<p style="text-align:center;">Loading news...</p>
</div>

<footer>
<div class="social">
<img src="https://cdn-icons-png.flaticon.com/32/174/174855.png">
<img src="https://cdn-icons-png.flaticon.com/32/145/145802.png">
<img src="https://cdn-icons-png.flaticon.com/32/733/733579.png">
<img src="https://cdn-icons-png.flaticon.com/32/3046/3046121.png">
</div>
<p>© 2026 Radiant Waves News</p>
</footer>

<script>
let allNews=[];
let filteredNews=[];
let visibleCount=10;

const API_KEY = "10618a434f80cc4ffe52717ea1bf2401";

/* === Naija Pulse JSON === */
const naijaPulse = [
{category:"Naija Pulse",title:"Tinubu Nominates Oyedele as Finance Minister",synopsis:"President Bola Tinubu nominates Taiwo Oyedele.",details:"This nomination is part of government’s 2026 economic reform plan.",time:"7 March 2026",image:"https://picsum.photos/600/300?1",author:"Editor: Omotara How",url:""},
{category:"Naija Pulse",title:"Yobe APC Chairman Re-elected",synopsis:"Yobe APC chairman wins re-election.",details:"Delegates voted overwhelmingly during the party congress.",time:"7 March 2026",image:"https://picsum.photos/600/300?2",author:"Editor: Omotara How",url:""},
// add remaining 18 stories...
];

/* === Election Watch JSON === */
const electionNews = [
{category:"Election",title:"France Municipal Elections",synopsis:"France prepares municipal elections next week.",details:"Voters across France will elect local councils and mayors.",time:"7 March 2026",image:"https://picsum.photos/800/400?501",author:"Editor: Omotara How",url:""},
{category:"Election",title:"Nigeria Prepares 2027 Elections",synopsis:"Political parties prepare for 2027 national elections.",details:"Campaigns and candidate registration underway.",time:"7 March 2026",image:"https://picsum.photos/800/400?502",author:"Editor: Omotara How",url:""},
{category:"Election",title:"UK Local Elections",synopsis:"Upcoming UK local elections.",details:"Councils vote for new representatives.",time:"7 March 2026",image:"https://picsum.photos/800/400?503",author:"Editor: Omotara How",url:""},
{category:"Election",title:"US Midterms Update",synopsis:"Midterms may shift balance of power.",details:"Analysts monitor key swing states.",time:"7 March 2026",image:"https://picsum.photos/800/400?504",author:"Editor: Omotara How",url:""},
{category:"Election",title:"India State Elections",synopsis:"State elections across India.",details:"Results expected to influence national policies.",time:"7 March 2026",image:"https://picsum.photos/800/400?505",author:"Editor: Omotara How",url:""}
];

/* === Static fallback stories for World, Tech, Sports === */
const fallbackStories=[
{category:"World",title:"Middle East Conflict Escalates",synopsis:"Tensions rise in Middle East.",details:"Military activity reported in multiple regions.",time:"7 March 2026",image:"https://picsum.photos/800/400?101",author:"Editor: Omotara How",url:""},
{category:"Technology",title:"AI Breakthrough Announced",synopsis:"New AI system released.",details:"Global tech companies invest heavily in AI.",time:"7 March 2026",image:"https://picsum.photos/800/400?201",author:"Editor: Omotara How",url:""},
{category:"Sports",title:"Champions League Updates",synopsis:"Latest football results.",details:"Top teams advance to next stage.",time:"7 March 2026",image:"https://picsum.photos/800/400?301",author:"Editor: Omotara How",url:""}
];

/* === Load API Stories === */
async function loadAPIStories(){
  const apiNews=[];
  try{
    const categories=["world","technology","sports"];
    for(let cat of categories){
      const res=await fetch(`https://gnews.io/api/v4/top-headlines?token=${API_KEY}&lang=en&max=5&topic=${cat}`);
      const data=await res.json();
      if(data.articles){
        data.articles.forEach(a=>{
          apiNews.push({
            category:capitalize(cat),
            title:a.title,
            synopsis:a.description||"Full story developing.",
            details:a.content||a.description||"Full story developing.",
            time:new Date(a.publishedAt).toLocaleDateString(),
            image:a.image||`https://picsum.photos/800/400?topic=${cat}`,
            author:a.source.name||"Unknown",
            url:a.url||""
          });
        });
      }
    }
  }catch(e){
    console.log("API failed, using fallback stories.");
    fallbackStories.forEach(s=>apiNews.push(s));
  }finally{
    allNews=naijaPulse.concat(apiNews).concat(electionNews);
    filteredNews=allNews;
    visibleCount=10;
    updateBreakingNews();
    render();
  }
}

/* === Render Function === */
function render(){
  const container=document.getElementById("news");
  container.innerHTML="";
  const toShow=filteredNews.slice(0,visibleCount);
  toShow.forEach((n,i)=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${n.image}">
      <h3>${n.title}</h3>
      <div class="time">${n.time}</div>
      <p>${n.synopsis}</p>
      <div class="details" id="d${i}">
        <p>${n.details}</p>
        <p><em>${n.author}</em></p>
      </div>
    `;
    card.onclick=()=>{
      if(n.url && n.url!=="") window.open(n.url,"_blank");
      else{
        const d=document.getElementById("d"+i);
        d.style.display=d.style.display==="block"?"none":"block";
      }
    };
    container.appendChild(card);
  });
  if(visibleCount<filteredNews.length){
    const btn=document.createElement("button");
    btn.className="load-more";
    btn.innerText="Load More";
    btn.onclick=()=>{visibleCount+=10;render();}
    container.appendChild(btn);
  }
}

/* === Show Category === */
function showCategory(cat){
  visibleCount=10;
  filteredNews=(cat==="All")?allNews:allNews.filter(n=>n.category===cat);
  render();
}

/* === Search === */
let searchTimeout;
function searchNews(text){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{
    visibleCount=10;
    filteredNews=allNews.filter(n=>n.title.toLowerCase().includes(text.toLowerCase())||n.synopsis.toLowerCase().includes(text.toLowerCase())||n.details.toLowerCase().includes(text.toLowerCase()));
    render();
  },200);
}

/* === Breaking News === */
function updateBreakingNews(){
  const breaking=document.getElementById("breaking-news");
  breaking.innerText=allNews.slice(0,20).map(n=>"🔴 "+n.title).join(" | ");
}

/* === Capitalize Helper === */
function capitalize(str){return str.charAt(0).toUpperCase()+str.slice(1);}

/* === Initial Load === */
loadAPIStories();
setInterval(loadAPIStories,300000); // Refresh every 5 minutes
</script>
</body>
</html>
