
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:white;
}

/* Header */
header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ffcc;
}

/* Live Clock */
#liveDateTime{
  text-align:center;
  padding:8px;
  font-size:14px;
  background:#222;
  color:#00ffcc;
}

/* Breaking News */
#breaking{
  background:red;
  padding:8px;
  overflow:hidden;
  white-space:nowrap;
}

#breakingContent{
  display:inline-block;
  padding-left:100%;
  animation:scroll 20s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}

/* Main Story */
.main{
  padding:20px;
  text-align:center;
}

.main img{
  width:100%;
  max-height:350px;
  object-fit:cover;
}

.main h2{
  color:#00ffcc;
}

/* Social Media */
.social{
  text-align:center;
  padding:15px;
  background:#000;
}

.social img{
  width:28px;
  margin:0 10px;
}

/* Footer */
footer{
  text-align:center;
  padding:10px;
  background:#000;
  font-size:12px;
}
</style>
</head>

<body>

<header>Radiant Waves Media</header>

<div id="liveDateTime"></div>

<div id="breaking">
  <span id="breakingContent">Loading breaking news...</span>
</div>

<div class="main">
  <img id="mainImage" src="main-story.jpg">
  <h2 id="mainTitle">Loading headline...</h2>
  <p id="mainSummary"></p>
</div>

<div class="social">
  <a href="#"><img src="facebook.png"></a>
  <a href="#"><img src="twitter.png"></a>
  <a href="#"><img src="Instagram.png"></a>
  <a href="#"><img src="tiktok.png"></a>
</div>

<footer>
© 2026 Radiant Waves Media
</footer>

<audio id="bgMusic" src="news-music.mp3" loop></audio>

<script>
// LIVE CLOCK
function updateClock() {
  const now = new Date();
  const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const date = now.toLocaleDateString(undefined, options);
  const time = now.toLocaleTimeString();
  document.getElementById("liveDateTime").innerHTML = date + " | " + time;
}
setInterval(updateClock,1000);
updateClock();


// LOAD NEWS FROM JSON
fetch("news.json")
.then(response => response.json())
.then(data => {

  let index = 0;

  function showHeadline() {
    const story = data.mainHeadlines[index];

    const today = new Date();
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    const formattedDate = today.toLocaleDateString(undefined, options);

    document.getElementById("mainTitle").innerText =
      story.title + " - " + formattedDate;

    document.getElementById("mainSummary").innerText = story.summary;
    document.getElementById("mainImage").src = story.image;

    index++;
    if(index >= data.mainHeadlines.length){
      index = 0;
    }
  }

  showHeadline();
  setInterval(showHeadline, 8000);

  const breakingItems = data.breaking.map(item => item.title).join(" ⚡ ");
  document.getElementById("breakingContent").innerText = breakingItems;

});


// BACKGROUND MUSIC TOGGLE (optional use later)
function toggleMusic(){
  const music = document.getElementById("bgMusic");
  if(music.paused){ music.play(); }
  else{ music.pause(); }
}


// REGISTER SERVICE WORKER (PWA)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker Registered"));
  });
}
</script>

</body>
</html>
