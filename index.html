<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Radiant Waves News</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:12px 16px;
cursor:pointer;
}

nav button:hover{
background:#c40000;
}

.search{
margin-left:auto;
padding:8px;
}

.search input{
padding:6px;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:18px;
}

.card{
background:white;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:15px;
}

.details{
display:none;
margin-top:10px;
line-height:1.6;
}

footer{
background:#111;
color:white;
padding:25px;
text-align:center;
margin-top:30px;
}

.social a{
color:white;
margin:0 10px;
text-decoration:none;
}

</style></head><body><header>
Radiant Waves Global News
</header><div class="breaking">
<span id="ticker"></span>
</div><nav><button onclick="filter('all')">Home</button>
<button onclick="filter('Naija')">Naija Pulse</button>
<button onclick="filter('World')">World</button>
<button onclick="filter('Tech')">Technology</button>
<button onclick="filter('Sports')">Sports</button>

<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div></nav><div class="container" id="news"></div><footer><div class="social"><a href="https://instagram.com/radiantwaves1">Instagram</a>

<a href="https://facebook.com/radiantwavesnews">Facebook</a>

<a href="https://twitter.com/radiantwaves13528995">X</a>

</div><br>© 2026 Radiant Waves News
Editor: Omotara How

</footer><script>

const news=[

{
title:"Peter Obi Calls for Electoral Reform in Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?politics",
summary:"Former presidential candidate renews call for transparent elections.",
details:"Peter Obi has renewed calls for electoral reforms across Nigeria, urging political leaders and institutions to strengthen transparency and credibility within the voting system. Speaking during a civic engagement event, Obi emphasized that democratic trust depends heavily on free and fair elections. Analysts believe his remarks are part of broader conversations ahead of Nigeria’s future political cycles."
},

{
title:"Nasir El Rufai Speaks on Future of Nigerian Politics",
category:"Naija",
image:"https://picsum.photos/800/500?nigeria",
summary:"Former Kaduna governor comments on national political direction.",
details:"Nasir El-Rufai has again entered the national political conversation, discussing governance challenges and economic reforms needed across Nigeria. The former governor argued that long-term development requires stronger institutional frameworks and transparent leadership. Political analysts say his comments continue to shape debates within the country’s political landscape."
},

{
title:"Sunday Igboho Calls for Unity in Southwest Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?africa",
summary:"Yoruba activist encourages dialogue and regional stability.",
details:"Yoruba activist Sunday Igboho has called for unity among communities in southwestern Nigeria, encouraging peaceful dialogue and collaboration among regional leaders. Igboho emphasized the importance of maintaining cultural identity while also promoting stability and development across the region."
},

{
title:"Global Leaders Monitor Middle East Tensions",
category:"World",
image:"https://picsum.photos/800/500?middleeast",
summary:"Diplomatic discussions continue amid regional tensions.",
details:"World leaders are closely monitoring developments in the Middle East as diplomatic negotiations continue to reduce escalating tensions. International organizations are urging restraint while exploring diplomatic solutions that could stabilize the region."
},

{
title:"Artificial Intelligence Expands Across Global Markets",
category:"Tech",
image:"https://picsum.photos/800/500?ai",
summary:"Technology firms increase investment in AI innovation.",
details:"Major technology companies worldwide are accelerating investments in artificial intelligence systems designed to improve productivity, automation, and data analysis. Industry experts believe AI will significantly reshape sectors including healthcare, finance, and education."
},

{
title:"European Football Clubs Prepare for Major Tournament",
category:"Sports",
image:"https://picsum.photos/800/500?football",
summary:"Teams begin preparations ahead of continental competitions.",
details:"European football clubs are intensifying preparations ahead of major continental tournaments scheduled later this year. Coaches say pre-season performance and player fitness will determine which teams can compete at the highest level."
}

]

function render(list){

let html=""

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<p><b>Editor:</b> Omotara How</p>

</div>

</div>

</div>

`

})

document.getElementById("news").innerHTML=html

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filter(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ")

render(news)

</script></body>
</html>
