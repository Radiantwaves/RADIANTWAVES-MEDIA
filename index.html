<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Radiant Waves News</title><style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
}

header p{
margin:6px;
font-size:14px;
}

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:12px 16px;
cursor:pointer;
}

nav button:hover{
background:#c40000;
}

.search{
margin-left:auto;
padding:8px;
}

.search input{
padding:6px;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:20px;
}

.card{
background:white;
margin-bottom:22px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
overflow:hidden;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.content{
padding:16px;
}

.details{
display:none;
margin-top:10px;
line-height:1.7;
}

audio{
margin-top:10px;
width:100%;
}

footer{
background:#111;
color:white;
padding:30px;
text-align:center;
}

.social img{
width:28px;
margin:8px;
}

</style></head><body><header><h1>Radiant Waves Global News</h1><p><b>Gateway to World News – Connecting You to the World</b></p></header><div class="breaking">
<span id="ticker"></span>
</div><nav><button onclick="filter('all')">Home</button>
<button onclick="filter('Naija')">Naija Pulse</button>
<button onclick="filter('World')">World</button>
<button onclick="filter('Tech')">Technology</button>
<button onclick="filter('Sports')">Sports</button>

<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div></nav><div class="container" id="news"></div><footer><div class="social"><a href="https://instagram.com/radiantwaves1">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a><a href="https://tiktok.com/@radiantwavesmedia">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</a><a href="https://facebook.com/radiantwavesnews">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a><a href="https://twitter.com/radiantwaves13528995">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
</a></div><br>@2026Radiant Waves

</footer><script>

const news=[

{
title:"Peter Obi Calls for Electoral Reform in Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?politics",
summary:"The former presidential candidate calls for stronger electoral transparency.",
details:"Peter Obi has renewed his call for electoral reforms across Nigeria, emphasizing that democratic systems can only thrive when citizens trust the electoral process. During a public engagement with youth leaders and policy experts, Obi stressed that electoral institutions must remain transparent, independent, and accountable. According to analysts, the discussion reflects wider debates about governance and democratic development in Nigeria.",
audio:""
},

{
title:"Nasir El-Rufai Speaks on Future of Nigerian Politics",
category:"Naija",
image:"https://picsum.photos/800/500?nigeria",
summary:"The former Kaduna governor discusses policy and governance challenges.",
details:"Nasir El-Rufai has once again drawn attention within Nigeria's political landscape after discussing governance challenges and economic development strategies. The former governor emphasized the need for stronger institutions, improved infrastructure planning, and consistent economic policies that support long-term growth.",
audio:""
},

{
title:"Global Leaders Monitor Middle East Tensions",
category:"World",
image:"https://picsum.photos/800/500?middleeast",
summary:"Diplomatic talks continue amid regional tensions.",
details:"International leaders are closely monitoring developments in the Middle East as diplomatic discussions continue to reduce tensions. Governments and global institutions are urging dialogue and restraint while exploring diplomatic solutions that could stabilize the region and prevent further escalation.",
audio:""
}

]

function render(list){

let html=""

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<audio controls src="${n.audio}"></audio>

</div>

</div>

</div>

`

})

document.getElementById("news").innerHTML=html

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filter(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ")

render(news)

</script></body>
</html>
