<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves News</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c00;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 18px;
font-size:15px;
cursor:pointer;
}

nav button:hover{
background:#c00;
}

.breaking{
background:black;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
padding:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:5px;
}

.card h3{
margin:10px 0 5px 0;
}

.time{
color:gray;
font-size:13px;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.social img{
width:28px;
margin:10px;
}

audio{
margin-top:10px;
}

</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span>
🔴 Global tensions rise in Middle East |
🔴 Oil prices surge worldwide |
🔴 Nigeria reviews economic policies |
🔴 Cyber security agencies warn of attacks
</span>
</div>

<nav>

<button onclick="loadAll()">Home</button>
<button onclick="loadNigeria()">Naija Pulse</button>
<button onclick="loadCategory('world')">World</button>
<button onclick="loadCategory('technology')">Technology</button>
<button onclick="loadCategory('sports')">Sports</button>

</nav>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="https://instagram.com/radiantwaves1" target="_blank">
<img src="instagram.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia" target="_blank">
<img src="tiktok.png">
</a>

<a href="https://facebook.com/radiantwavesnews" target="_blank">
<img src="facebook.png">
</a>

<a href="https://twitter.com/radiantwaves13528995" target="_blank">
<img src="twitter.png">
</a>

</div>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

const API_KEY="10618a434f80cc4ffe52717ea1bf2401"

function createCard(article){

return `

<div class="card">

<img src="${article.image}">

<h3>${article.title}</h3>

<p>${article.description || ""}</p>

<div class="time">${new Date(article.publishedAt).toLocaleString()}</div>

<a href="${article.url}" target="_blank">Read Full Story</a>

</div>

`

}

function loadAll(){

fetch(`https://gnews.io/api/v4/top-headlines?lang=en&max=10&apikey=${API_KEY}`)

.then(res=>res.json())

.then(data=>{

let html=""

data.articles.forEach(article=>{
html+=createCard(article)
})

document.getElementById("news").innerHTML=html

})

}

function loadCategory(category){

fetch(`https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&max=10&apikey=${API_KEY}`)

.then(res=>res.json())

.then(data=>{

let html=""

data.articles.forEach(article=>{
html+=createCard(article)
})

document.getElementById("news").innerHTML=html

})

}

function loadNigeria(){

let html=`

<div class="card">

<img src="https://picsum.photos/600/300?1">

<h3>Tinubu Administration Reviews Economic Strategy</h3>

<p>Government officials say Nigeria is evaluating new fiscal measures aimed at stabilizing inflation and strengthening investor confidence.</p>

<div class="time">March 5 2026</div>

</div>

<div class="card">

<img src="https://picsum.photos/600/300?2">

<h3>Yobe APC Chairman Re-elected After Party Congress</h3>

<p>The ruling party in Yobe State concluded its congress with the re-election of the state chairman amid renewed political alliances.</p>

<div class="time">March 5 2026</div>

</div>

`

document.getElementById("news").innerHTML=html

}

loadAll()

</script>

</body>
</html>
