<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 30px; font-weight: bold; }
.slogan { color: gray; font-size: 14px; }

/* VIDEO */
.video-bg { height: 220px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: #0047AB; color: white; padding: 8px; }

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 10px; cursor:pointer; }

/* LAYOUT */
.container { max-width: 1100px; margin:auto; padding: 15px; }
.article { background: white; padding: 15px; margin-bottom: 15px; border-radius: 5px; }

.article img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  margin-bottom: 10px;
}

.readmore { color:#0047AB; text-decoration:none; font-weight:bold; }

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
}

.social a {
  color:white;
  margin:0 6px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <img src="images/icon-512.png">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News</div>
</div>

<div class="video-bg">
  <video autoplay loop controls>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<div class="breaking" id="breaking">Loading breaking news...</div>

<nav>
  <a onclick="filterNews('All')">Home</a>
  <a onclick="filterNews('World')">World</a>
  <a onclick="filterNews('Politics')">Politics</a>
  <a onclick="filterNews('Business')">Business</a>
  <a onclick="filterNews('Technology')">Technology</a>
  <a onclick="filterNews('Sport')">Sport</a>
</nav>

<div class="container" id="news"></div>

<<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves Global News</p>
</footer>
  <div class="social">
    <a href="https://facebook.com/radiantwavesnews">Facebook</a>
    <a href="https://twitter.com/radiant13528995">Twitter</a>
    <a href="https://instagram.com/radiantwaves1">Instagram</a>
    <a href="https://tiktok.com/@radiantwavesmedia">TikTok</a>
    <a href="https://youtube.com/@radiantwave-wv6rg">YouTube</a>
  </div>
</footer>

<script>
let allNews = [];

fetch("news.json")
.then(res => res.json())
.then(data => {
  allNews = data;
  displayNews(data);

  // breaking news
  document.getElementById("breaking").innerText =
    data.find(n => n.live)?.title || data[0].title;
})
.catch(err => {
  document.getElementById("news").innerHTML =
    "<p style='color:red;'>⚠️ News failed to load. Check news.json</p>";
});

function displayNews(data){
  const container = document.getElementById("news");
  container.innerHTML = "";

  data.forEach((a,i)=>{
    container.innerHTML += `
      <div class="article">
        ${a.image ? `<img src="${a.image}">` : ""}
        <h3>${a.title}</h3>
        <p>${a.summary}</p>
        <a class="readmore" href="article.html?id=${i}">Read more</a>
      </div>
    `;
  });
}

function filterNews(cat){
  if(cat === "All"){
    displayNews(allNews);
  } else {
    displayNews(allNews.filter(n => n.category === cat));
  }
}
</script>

</body>
</html>
