<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:white;
}
header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ffcc;
  position:relative; /* not sticky to prevent blocking */
  z-index:1000;
}
#liveDateTime{
  text-align:center;
  padding:8px;
  background:#222;
  color:#00ffcc;
  font-size:14px;
  position:relative; /* not sticky */
  pointer-events:none; /* allow clicks through */
}
#breaking{
  background:red;
  padding:8px;
  overflow:hidden;
  white-space:nowrap;
  position:relative; /* not sticky */
  pointer-events:none; /* allow clicks through */
}
#breakingContent{
  display:inline-block;
  padding-left:100%;
  animation:scroll 25s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}
.main{
  padding:20px;
  text-align:center;
}
.main img{
  width:100%;
  max-height:350px;
  object-fit:cover;
}
.main h2{
  color:#00ffcc;
}
.section-wrapper{
  padding:20px;
}
.section-wrapper h2{
  border-bottom:2px solid #00ffcc;
  padding-bottom:5px;
  color:#00ffcc;
}
.section{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}
.card{
  background:#222;
  margin:0;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
  transition:0.2s;
  pointer-events:auto; /* ensure clickable */
}
.card:hover{
  background:#333;
}
.card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
}
.card h3{
  margin:5px 0;
}
.card p{
  margin:0;
}
.article-panel{
  display:none;
  background:#111;
  padding:20px;
  margin:10px 0;
  border:1px solid #00ffcc;
  border-radius:5px;
}
.article-panel h2{
  color:#00ffcc;
}
.social{
  text-align:center;
  padding:15px;
  background:#000;
}
.social img{
  width:28px;
  margin:0 10px;
}
footer{
  text-align:center;
  padding:10px;
  background:#000;
  font-size:12px;
}
</style>
</head>
<body>

<header>Radiant Waves Media</header>
<div id="liveDateTime"></div>

<div id="breaking">
<span id="breakingContent">Loading breaking news...</span>
</div>

<div class="main">
<img id="mainImage" src="main-story.jpg">
<h2 id="mainTitle">Loading headline...</h2>
<p id="mainSummary"></p>
</div>

<div id="sectionsContainer">
  <div class="section-wrapper" id="nigeriaWrapper"><h2>Nigeria</h2><div id="nigeriaNews" class="section"></div></div>
  <div class="section-wrapper" id="europeWrapper"><h2>Europe</h2><div id="europeNews" class="section"></div></div>
  <div class="section-wrapper" id="americaWrapper"><h2>America</h2><div id="americaNews" class="section"></div></div>
  <div class="section-wrapper" id="africaWrapper"><h2>Africa</h2><div id="africaNews" class="section"></div></div>
  <div class="section-wrapper" id="asiaWrapper"><h2>Asia</h2><div id="asiaNews" class="section"></div></div>
  <div class="section-wrapper" id="politicsWrapper"><h2>Politics</h2><div id="politicsNews" class="section"></div></div>
  <div class="section-wrapper" id="businessWrapper"><h2>Business</h2><div id="businessNews" class="section"></div></div>
  <div class="section-wrapper" id="sportWrapper"><h2>Sport</h2><div id="sportNews" class="section"></div></div>
  <div class="section-wrapper" id="musicWrapper"><h2>Music</h2><div id="musicNews" class="section"></div></div>
  <div class="section-wrapper" id="moviesWrapper"><h2>Movies</h2><div id="moviesNews" class="section"></div></div>
</div>

<div id="articlePanel" class="article-panel">
  <h2 id="articleTitle"></h2>
  <img id="articleImage" src="" style="width:100%;max-height:350px;object-fit:cover;">
  <p id="articleSummary"></p>
  <button onclick="closeArticle()" style="margin-top:10px;padding:8px;background:#00ffcc;border:none;border-radius:5px;color:#000;cursor:pointer;">Close</button>
</div>

<div class="social">
<a href="#"><img src="facebook.png"></a>
<a href="#"><img src="twitter.png"></a>
<a href="#"><img src="Instagram.png"></a>
<a href="#"><img src="tiktok.png" style="background:white;padding:4px;border-radius:6px;"></a>
</div>

<footer>© 2026 Radiant Waves Media</footer>
<audio id="bgMusic" src="news-music.mp3" loop></audio>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // LIVE CLOCK
  function updateClock(){
    const now = new Date();
    const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("liveDateTime").innerHTML =
      now.toLocaleDateString(undefined, options) + " | " +
      now.toLocaleTimeString();
  }
  setInterval(updateClock,1000);
  updateClock();

  // CLOSE ARTICLE PANEL
  window.closeArticle = function(){
    document.getElementById("articlePanel").style.display="none";
  }

  // LOAD NEWS
  fetch("news.json")
  .then(response => response.json())
  .then(data => {
    // MAIN ROTATION
    let index = 0;
    function rotateMain(){
      const story = data.main[index];
      document.getElementById("mainTitle").innerText = story.title;
      document.getElementById("mainSummary").innerText = story.summary;
      document.getElementById("mainImage").src = story.image;
      index = (index + 1) % data.main.length;
    }
    rotateMain();
    setInterval(rotateMain,8000);

    // BREAKING NEWS
    document.getElementById("breakingContent").innerText =
      data.breaking.map(item=>item.title).join(" ⚡ ");

    // LOAD SECTIONS
    ["nigeria","europe","america","africa","asia","politics","business","sport","music","movies"]
    .forEach(sectionName=>{
      const container = document.getElementById(sectionName+"News");
      data[sectionName].forEach(item=>{
        let card = document.createElement("div");
        card.className = "card";
        if(item.image){
          let img = document.createElement("img");
          img.src = item.image;
          card.appendChild(img);
        }
        let h3 = document.createElement("h3"); h3.innerText=item.title; card.appendChild(h3);
        let p = document.createElement("p"); p.innerText=item.summary; card.appendChild(p);

        // store data for click
        card.dataset.title = item.title;
        card.dataset.summary = item.summary;
        card.dataset.image = item.image || "main-story.jpg";

        container.appendChild(card);
      });
    });

    // DELEGATED CLICK EVENT
    document.getElementById("sectionsContainer").addEventListener("click", function(e){
      const card = e.target.closest(".card");
      if(card){
        document.getElementById("articleTitle").innerText = card.dataset.title;
        document.getElementById("articleSummary").innerText = card.dataset.summary;
        document.getElementById("articleImage").src = card.dataset.image;
        document.getElementById("articlePanel").style.display="block";
        window.scrollTo({top:0, behavior:"smooth"});
      }
    });

  });

  // MUSIC TOGGLE
  window.toggleMusic = function(){
    const music=document.getElementById("bgMusic");
    if(music.paused){ music.play(); } else { music.pause(); }
  }

  // SERVICE WORKER
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(()=>console.log("Service Worker Registered"));
  }

});
</script>

</body>
</html>
