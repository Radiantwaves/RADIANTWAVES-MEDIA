<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title><style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#c00;color:white;padding:15px;text-align:center;font-size:26px;font-weight:bold;}
.clock{text-align:center;background:#222;color:white;padding:5px;font-size:14px;}
.breaking{background:black;color:white;padding:8px;font-weight:bold;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
nav{background:#111;display:flex;overflow:auto;}
nav button{background:none;border:none;color:white;padding:14px 16px;cursor:pointer;font-size:15px;white-space:nowrap;}
nav button:hover{background:#c00;}
.container{padding:15px;}
.card{background:white;margin-bottom:20px;padding:10px;border-radius:6px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.card img{width:100%;border-radius:6px;}
.card h3{margin:10px 0 5px 0;}
.time{color:gray;font-size:13px;margin-bottom:10px;}
footer{background:#111;color:white;padding:20px;text-align:center;}
.social img{width:30px;margin:8px;background:white;padding:6px;border-radius:6px;}
audio{margin-top:10px;}
</style></head>
<body><header>Radiant Waves News</header>
<div class="clock" id="clock"></div><div class="breaking">
<span>
🔴 Macron Urges De-escalation in Middle East |
🔴 Global Oil Prices Surge |
🔴 Nigeria Reviews Economic Forecast |
🔴 US Raises Military Alert |
🔴 Cybersecurity Agencies Warn of Attacks
</span>
</div><nav>
<button onclick="filterNews('Home')">Home</button>
<button onclick="filterNews('Nigeria')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
</nav><div class="container" id="news"></div><footer>
<div class="social">
<a href="https://instagram.com/radiantwaves1" target="_blank"><img src="instagram.png"></a>
<a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><img src="tiktok.png"></a>
<a href="https://facebook.com/radiantwavesnews" target="_blank"><img src="facebook.png"></a>
<a href="https://twitter.com/radiantwaves13528995" target="_blank"><img src="twitter.png"></a>
</div><audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>
<p>© 2026 Radiant Waves News</p>
</footer><script>
const API="10618a434f80cc4ffe52717ea1bf2401";
let allNews=[];

// Update live clock
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerHTML = now.toDateString()+" | "+now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// Load local JSON fallback
async function loadLocalJSON(){
  try{
    const res=await fetch("news.json?v="+Date.now());
    const data=await res.json();
    return data;
  }catch(e){
    return [];
  }
}

// Display news cards
function showNews(articles){
  let output="";
  articles.forEach(a=>{
    output+=`
    <div class="card">
      <img src="${a.image || 'https://picsum.photos/600/300'}">
      <h3>${a.title}</h3>
      <div class="time">${new Date(a.time || a.publishedAt).toLocaleString()}</div>
      <p>${a.content || a.description || ""}</p>
      <a href="${a.url || "#"}" target="_blank">Read Full Story</a>
    </div>
    `;
  });
  document.getElementById("news").innerHTML=output;
}

// Load API news, fallback to JSON if fails
async function loadNews(apiUrl){
  try{
    const res=await fetch(apiUrl);
    const data=await res.json();
    if(data.articles && data.articles.length>0){
      allNews=data.articles;
      showNews(allNews);
    }else{
      allNews=await loadLocalJSON();
      showNews(allNews);
    }
  }catch(e){
    allNews=await loadLocalJSON();
    showNews(allNews);
  }
}

// Menu filters
async function filterNews(category){
  if(category==="Home"){
    await loadNews(`https://gnews.io/api/v4/top-headlines?lang=en&max=10&apikey=${API}`);
  }else if(category==="Nigeria"){
    await loadNews(`https://gnews.io/api/v4/search?q=Nigeria&lang=en&max=10&apikey=${API}`);
  }else{
    await loadNews(`https://gnews.io/api/v4/top-headlines?topic=${category.toLowerCase()}&lang=en&max=10&apikey=${API}`);
  }
}

// Initial load
filterNews("Home");

// Auto refresh every 10 minutes
setInterval(()=>filterNews("Home"),600000);

</script></body>
</html>
