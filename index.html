<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:#c00;color:white;padding:15px;text-align:center;font-size:26px;font-weight:bold;}
nav{background:#111;display:flex;overflow:auto;}
nav button{background:none;border:none;color:white;padding:14px 18px;cursor:pointer;font-size:15px;}
nav button:hover{background:#c00;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 20s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}} 
.container{padding:15px;}
.card{background:white;margin-bottom:18px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:5px;}
.card h3{margin:10px 0 6px 0;}
.time{color:gray;font-size:13px;}
.details{display:none;margin-top:10px;}
footer{background:#111;color:white;padding:20px;text-align:center;margin-top:20px;}
.social a{color:white;margin:0 10px;text-decoration:none;font-size:18px;}
</style>
</head>
<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span id="breaking-news">🔴 Macron urges de-escalation in Middle East | 🔴 Nigeria reviews economic forecast | 🔴 Global oil prices surge</span>
</div>

<nav>
<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('Nigeria')">Naija Pulse</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>
</nav>

<div class="container" id="news"></div>

<footer>
<div class="social">
<a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a>
<a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a>
<a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a>
<a href="https://twitter.com/radiantwaves13528995" target="_blank">X</a>
</div>
<br>
<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>
<p>© 2026 Radiant Waves News</p>
</footer>

<script>
// ===== Local news for all categories =====
const localNews=[
{category:"Nigeria",title:"Tinubu Nominates Oyedele as Finance Minister",time:"March 6, 2026",image:"https://picsum.photos/800/400?101",content:"President Tinubu announced the nomination of Oyedele as Minister of State for Finance.",author:"Editor: Omotara How"},
{category:"Nigeria",title:"Yobe APC Chairman Re-elected",time:"March 6, 2026",image:"https://picsum.photos/800/400?102",content:"The Yobe APC chairman secured re-election at the recent party congress.",author:"Editor: Omotara How"},
{category:"Technology",title:"Global AI Companies Race to Release New Models",time:"March 6, 2026",image:"https://picsum.photos/800/400?103",content:"Tech companies invest billions into AI development across US, Europe, and Asia.",author:"Editor: Omotara How"},
{category:"Sports",title:"Champions League Quarter-Final Draw Completed",time:"March 6, 2026",image:"https://picsum.photos/800/400?104",content:"UEFA conducted the Champions League quarter-final draw.",author:"Editor: Omotara How"},
{category:"Sports",title:"FIFA Announces New International Tournament Calendar",time:"March 6, 2026",image:"https://picsum.photos/800/400?105",content:"FIFA confirmed new international football schedules.",author:"Editor: Omotara How"}
];

// ===== Render function =====
let allNews=[...localNews];
function render(list){
  const container=document.getElementById("news");
  let html="";
  list.forEach((n,i)=>{
    html+=`
    <div class="card" onclick="toggle(${i})">
      <img src="${n.image}">
      <h3>${n.title}</h3>
      <div class="time">${n.time}</div>
      <div class="details" id="d${i}">
        <p>${n.content}</p>
        <p><em>${n.author}</em></p>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

function toggle(i){
  const d=document.getElementById("d"+i);
  d.style.display=d.style.display==="block"?"none":"block";
}

function showCategory(cat){
  if(cat==="All"){render(allNews);return;}
  render(allNews.filter(n=>n.category===cat));
}

render(allNews);

// ===== Optional: Load global news via API (only updates World category) =====
const apiKey="10618a434f80cc4ffe52717ea1bf2401; // Replace with your NewsAPI key
async function fetchGlobalNews(){
  try{
    const res=await fetch(`https://newsapi.org/v2/top-headlines?language=en&pageSize=10&apiKey=${apiKey}`);
    const data=await res.json();
    if(!data.articles) return;
    // Add to allNews array
    const globalNews=data.articles.map((a,i)=>({
      category:"World",
      title:a.title || "No title",
      time:a.publishedAt?new Date(a.publishedAt).toLocaleString():"Unknown time",
      image:a.urlToImage || "https://picsum.photos/800/400?random="+i,
      content:a.description || "Read full article on source",
      author:"Editor: NewsAPI"
    }));
    allNews=[...localNews,...globalNews];
    render(allNews);
    // Update breaking news with first global headline
    if(globalNews.length>0)document.getElementById("breaking-news").textContent="🔴 "+globalNews[0].title;
  }catch(err){
    console.error("API error:",err);
  }
}

// Optional call to API
fetchGlobalNews();
</script>
</body>
</html>
