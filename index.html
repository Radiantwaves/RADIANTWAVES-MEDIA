</style></head><body><header><h1>Radiant Waves Global News</h1><p><b>Gateway to World News – Connecting You to the World</b></p></header><div class="breaking"><span id="ticker"></span>

</div><nav><button onclick="filter('all')">Home</button>
<button onclick="filter('Naija')">Naija Pulse</button>

const news=[

{
title:"Peter Obi Calls for Electoral Reform in Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?politics",
summary:"The former presidential candidate has again emphasized the need for transparent elections.",
details:"Peter Obi has renewed calls for comprehensive electoral reforms in Nigeria, arguing that credible elections remain the cornerstone of democratic governance. Speaking during a civic engagement forum attended by youth leaders and policy analysts, Obi stressed that electoral institutions must remain independent and transparent in order to build public trust in democratic processes. He noted that many Nigerians, particularly young voters, are increasingly demanding accountability from political leaders. Obi also encouraged civil society organizations to continue advocating for reforms that would strengthen voter participation and improve the credibility of election results. Analysts say the renewed debate could influence preparations for Nigeria's future electoral cycles."
},

{
title:"Nasir El-Rufai Speaks on Future of Nigerian Politics",
category:"Naija",
image:"https://picsum.photos/800/500?nigeria",
summary:"The former Kaduna State governor shared his views on governance and national development.",
details:"Nasir El-Rufai has reentered national political discussions by commenting on Nigeria's evolving political environment and the importance of long-term institutional reforms. In recent remarks during a policy dialogue, the former governor highlighted economic restructuring, education reform, and improved governance as priorities for national development. El-Rufai also emphasized that political leaders must focus on policies that address unemployment, infrastructure gaps, and national security challenges. Observers say his comments reflect broader conversations among political stakeholders about the direction of governance in Nigeria and the policies that could shape the country's political future."
},

{
title:"Sunday Igboho Calls for Unity in Southwest Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?africa",
summary:"The Yoruba activist urged communities to prioritize peace and cooperation.",
details:"Yoruba activist Sunday Igboho has called on leaders and residents across southwestern Nigeria to prioritize unity and peaceful cooperation. In a statement circulated among community groups, Igboho stressed that regional stability depends on constructive dialogue and collaboration between local leaders, traditional authorities, and youth organizations. He noted that economic growth and social development can only occur when communities work together to address security concerns and promote regional development. Analysts say the appeal for unity reflects growing efforts by community leaders to maintain stability and encourage constructive civic participation."
},

{
title:"Global Leaders Monitor Middle East Tensions",
category:"World",
image:"https://picsum.photos/800/500?middleeast",
summary:"International leaders continue diplomatic efforts amid rising tensions.",
details:"World leaders are closely monitoring developments in the Middle East as diplomatic negotiations intensify to prevent further escalation. International organizations and regional partners have urged restraint while exploring diplomatic channels aimed at reducing tensions. Analysts note that developments in the region have significant geopolitical implications, particularly for global energy markets and international security cooperation. Governments across Europe, Asia, and North America have called for dialogue and peaceful resolution of disputes."
},

{
title:"Artificial Intelligence Expands Across Global Markets",
category:"Tech",
image:"https://picsum.photos/800/500?ai",
summary:"Technology companies accelerate AI investment worldwide.",
details:"Artificial intelligence technologies are rapidly expanding across global markets as major technology firms increase investment in automation and data analysis systems. Industry experts believe AI could significantly transform sectors such as healthcare, finance, logistics, and education. Governments are also examining regulatory frameworks to ensure ethical and responsible use of advanced AI technologies. Analysts say the rapid pace of innovation is creating both economic opportunities and policy challenges for countries around the world."
}

]

function render(list){

let html=""

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<p><b>Editor:</b> Omotara How</p>

</div>

</div>

</div>

`

})

document.getElementById("news").innerHTML=html

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filter(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ")

render(news)

</script></body>
</html>
