<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves News</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c00;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 18px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c00;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
font-weight:bold;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:18px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
padding:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:5px;
}

.card h3{
margin:10px 0 6px 0;
}

.time{
color:gray;
font-size:13px;
}

.details{
display:none;
margin-top:10px;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
margin-top:20px;
}

.social img{
width:28px;
margin:8px;
}

</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span>
🔴 Macron urges de-escalation in Middle East |
🔴 Global oil prices surge |
🔴 Nigeria reviews economic forecast |
🔴 Cybersecurity agencies warn of attacks |
🔴 US raises global military alert
</span>
</div>

<nav>

<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('Nigeria')">Naija Pulse</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>

</nav>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="https://instagram.com/radiantwaves1">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</a>

<a href="https://facebook.com/radiantwavesnews">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://twitter.com/radiantwaves13528995">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
</a>

</div>

<br>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

const news=[

{
category:"World",
title:"Macron Calls for De-escalation in Middle East Conflict",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?1",
content:"French President Emmanuel Macron urged restraint as tensions continue rising across the Middle East.",

},

{
category:"World",
title:"Oil Prices Surge as Tensions Rise",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?2",
content:"Energy markets reacted quickly to geopolitical developments affecting global oil supply.",
author:"Editor: Omotara How"
},

{
category:"Nigeria",
title:"Federal Government Reviews Economic Forecast",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?3",
content:"Nigeria’s finance ministry is reassessing projections amid changing global oil prices.",
author:"Editor: Omotara How"
},

{
category:"Nigeria",
title:"Lagos Expands Digital Traffic Monitoring",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?4",
content:"New smart traffic systems aim to improve transportation management in Nigeria's largest city.",
author:"Editor: Omotara How"
},

{
category:"Nigeria",
title:"Central Bank Considers Currency Stability Measures",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?5",
content:"Financial regulators discuss new policies designed to stabilize the naira.",
author:"Editor: Omotara How"
},

{
category:"Technology",
title:"Artificial Intelligence Investment Surges",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?6",
content:"Technology companies worldwide continue heavy investments in artificial intelligence research.",
author:"Editor: Omotara How"
},

{
category:"Technology",
title:"Cybersecurity Agencies Warn of Global Threats",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?7",
content:"Experts warn that hackers may target global financial systems and infrastructure.",
author:"Editor: Omotara How"
},

{
category:"Sports",
title:"Super Eagles Begin Training for International Matches",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?8",
content:"Nigeria's national football team prepares for upcoming international tournaments.",
author:"Editor: Omotara How"
},

{
category:"Sports",
title:"Champions League Quarter-Final Fixtures Confirmed",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?9",
content:"Europe's biggest football clubs prepare for crucial Champions League knockout matches.",
author:"Editor: Omotara How"
}

];

function render(list){

let html="";

list.forEach((n,i)=>{

html+=`

<div class="card" onclick="toggle(${i})">

<img src="${n.image}">

<h3>${n.title}</h3>

<div class="time">${n.time}</div>

<div class="details" id="d${i}">

<p>${n.content}</p>

<p><em>${n.author}</em></p>

</div>

</div>

`;

});

document.getElementById("news").innerHTML=html;

}

function toggle(i){

let d=document.getElementById("d"+i);

d.style.display=d.style.display=="block"?"none":"block";

}

function showCategory(cat){

if(cat=="All"){render(news);return;}

render(news.filter(n=>n.category==cat));

}

render(news);

</script>

</body>
</html>
