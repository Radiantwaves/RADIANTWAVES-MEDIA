<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RadiantWaves News Network</title><style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

header img{
width:120px;
}

h1{
margin:10px 0;
font-size:36px;
}

.slogan{
color:#cfe8ff;
font-size:18px;
}

/* AUDIO BUTTON */

#audioBox{
text-align:center;
margin:10px;
}

#audioBox button{
padding:8px 15px;
font-weight:bold;
background:#0d47a1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* BREAKING NEWS */

.breaking{
background:#0d47a1;
color:white;
padding:10px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* NAV */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

/* MAIN STORY */

#main-story{
max-width:1000px;
margin:auto;
padding:20px;
}

/* NEWS LIST */

#news{
max-width:900px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

.social img{
width:35px;
margin:8px;
}

</style></head><body><header><img src="images/icon-512.png" alt="RadiantWaves Logo"><h1>RadiantWaves</h1><p class="slogan">
Gateway to World News – Connecting You to the World
</p></header><!-- AUDIO --><div id="audioBox"><button id="playNews">🔊 Listen to RadiantWaves</button>

<audio id="newsAudio" loop><source src="news-music.mp3" type="audio/mpeg"></audio></div><!-- BREAKING --><div class="breaking"><span id="breaking-news">Loading global headlines...</span>

</div><!-- NAVIGATION --><nav><a href="index.html?cat=general">Home</a>

<a href="index.html?cat=world">World</a>

<a href="index.html?cat=politics">Politics</a>

<a href="index.html?cat=business">Business</a>

<a href="index.html?cat=technology">Technology</a>

<a href="index.html?cat=science">Science</a>

<a href="index.html?cat=sports">Sports</a>

<a href="index.html?cat=entertainment">Entertainment</a>

</nav><!-- MAIN STORY --><div id="main-story"></div><!-- NEWS --><div id="news"></div><footer><p>© 2026 RadiantWaves News Network</p><p>Truth • Insight • Global Perspective</p><div class="social"><a href="https://facebook.com/radiantwavesnews">
<img src="images/facebook.png">
</a><a href="https://instagram.com/radiantwaves1">
<img src="images/instagram.png">
</a><a href="https://twitter.com/radiant13528995">
<img src="images/twitter.png">
</a><a href="https://tiktok.com/@radiantwavesmedia">
<img src="images/tiktok.png">
</a></div></footer><script>

/* AUDIO CONTROL */

const playButton=document.getElementById("playNews");

const audio=document.getElementById("newsAudio");

playButton.onclick=function(){

if(audio.paused){

audio.play();

playButton.innerHTML="⏸ Pause RadiantWaves";

}else{

audio.pause();

playButton.innerHTML="🔊 Listen to RadiantWaves";

}

}

/* CATEGORY */

const params=new URLSearchParams(window.location.search);

const category=params.get("cat")||"general";

/* DEFAULT IMAGES */

const defaultImages={

world:"images/world-1.jpg",

business:"images/business-1.jpg",

politics:"images/politics-1.jpg",

technology:"images/tech-1.jpg",

science:"images/science-1.jpg",

sports:"images/sports-1.jpg",

entertainment:"images/entertainment-1.jpg",

general:"images/world-1.jpg"

};

/* AI STORY */

function rewriteStory(title,text,category){

if(!text) text="Global developments continue to unfold.";

const endings=[

"RadiantWaves brings you the latest global perspective.",

"Our newsroom continues monitoring the situation.",

"More updates will follow as events develop.",

"RadiantWaves correspondents are tracking the story."

];

const ending=endings[Math.floor(Math.random()*endings.length)];

return text+" "+ending;

}

/* SHOW NEWS */

function showNews(articles){

const container=document.getElementById("news");

const mainStory=document.getElementById("main-story");

const breaking=document.getElementById("breaking-news");

container.innerHTML="";

mainStory.innerHTML="";

let headlines=[];

/* MAIN STORY */

const first=articles[0];

const mainImage=first.image||defaultImages[first.category]||defaultImages.general;

mainStory.innerHTML=`

<div style="background:white;padding:20px;border-radius:8px;margin-bottom:20px;">

<img src="${mainImage}" style="width:100%;border-radius:6px;">

<h2 style="font-size:28px;margin-top:15px;">${first.title}</h2>

<p>${rewriteStory(first.title,first.description,first.category)}</p>

</div>

`;

/* OTHER STORIES */

articles.slice(1).forEach(article=>{

const image=article.image||defaultImages[article.category]||defaultImages.general;

const story=rewriteStory(article.title,article.description,article.category);

container.innerHTML+=`

<div class="news-card">

<img src="${image}">

<h3>${article.title}</h3>

<p>${story}</p>

</div>

`;

headlines.push(article.title);

});

/* BREAKING */

breaking.innerHTML=headlines.join(" • ");

}

/* LOAD JSON NEWS */

fetch("news.json")

.then(res=>res.json())

.then(data=>{

const filtered=data.articles.filter(a=>a.category===category||category==="general");

showNews(filtered.length?filtered:data.articles);

});

</script></body></html>
