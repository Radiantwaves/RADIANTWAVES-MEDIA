<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
/* ===== GENERAL STYLES ===== */
body{margin:0;font-family:Arial, sans-serif;background:#f4f4f4;}
header{background:#c00;color:white;padding:15px;text-align:center;font-size:26px;font-weight:bold;}
.clock{text-align:center;background:#222;color:white;padding:5px;font-size:14px;}
.breaking{background:black;color:white;padding:8px;font-weight:bold;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
nav{background:#111;display:flex;overflow:auto;flex-wrap:wrap;}
nav button{background:none;border:none;color:white;padding:14px 16px;cursor:pointer;font-size:15px;white-space:nowrap;}
nav button:hover{background:#c00;}
.main-feature{display:flex;flex-wrap:wrap;margin:15px;}
.main-feature img{flex:1 1 100%;border-radius:6px;}
.main-feature h2{margin-top:10px;}
.container{display:flex;flex-wrap:wrap;gap:15px;padding:15px;}
.card{background:white;width:calc(33% - 10px);min-width:250px;border-radius:6px;box-shadow:0 2px 5px rgba(0,0,0,0.1);cursor:pointer;overflow:hidden;}
.card img{width:100%;height:150px;object-fit:cover;}
.card h3{margin:10px 5px 5px 5px;font-size:16px;}
.time{color:gray;font-size:12px;margin:5px;}
.card p{margin:5px;font-size:14px;}
footer{background:#111;color:white;padding:20px;text-align:center;}
footer .social img{width:30px;margin:8px;background:white;padding:6px;border-radius:6px;}
audio{margin-top:10px;}
@media(max-width:900px){.card{width:calc(50% - 10px);}}
@media(max-width:600px){.card{width:100%;}}
</style>
</head>
<body>

<header>Radiant Waves News</header>
<div class="clock" id="clock"></div>

<div class="breaking">
<span>
🔴 Macron Urges De-escalation in Middle East | 🔴 Global Oil Prices Surge | 🔴 Nigeria Reviews Economic Forecast | 🔴 US Raises Military Alert | 🔴 Cybersecurity Agencies Warn of Attacks
</span>
</div>

<nav>
<button data-cat="Home">Home</button>
<button data-cat="World">World</button>
<button data-cat="Africa">Africa</button>
<button data-cat="Europe">Europe</button>
<button data-cat="Asia">Asia</button>
<button data-cat="America">America</button>
<button data-cat="Technology">Technology</button>
<button data-cat="Sports">Sports</button>
</nav>

<div class="main-feature" id="featured"></div>
<div class="container" id="news"></div>

<footer>
<div class="social">
<a href="https://instagram.com/radiantwaves1" target="_blank"><img src="instagram.png"></a>
<a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><img src="tiktok.png"></a>
<a href="https://facebook.com/radiantwavesnews" target="_blank"><img src="facebook.png"></a>
<a href="https://twitter.com/radiantwaves13528995" target="_blank"><img src="twitter.png"></a>
</div>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>
<p>© 2026 Radiant Waves News</p>
</footer>

<script>
const API = "10618a434f80cc4ffe52717ea1bf2401"; // replace with your GNews API key
let allNews = [];

// ===== LIVE CLOCK =====
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText = now.toDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// ===== FETCH NEWS =====
async function loadNews(category="Home"){
  try{
    let url;
    if(category==="Home") url = `https://gnews.io/api/v4/top-headlines?lang=en&max=10&apikey=${API}`;
    else url = `https://gnews.io/api/v4/top-headlines?topic=${category.toLowerCase()}&lang=en&max=10&apikey=${API}`;
    const res = await fetch(url);
    const data = await res.json();
    allNews = data.articles || [];
  }catch(e){
    console.log("API failed, fallback to local JSON");
    allNews = await loadLocalJSON();
  }
  displayNews(category);
}

// ===== LOCAL JSON FALLBACK =====
async function loadLocalJSON(){
  try{
    const res = await fetch("news.json?v="+Date.now());
    return await res.json();
  }catch(e){ return []; }
}

// ===== DISPLAY NEWS =====
function displayNews(category){
  const featuredEl = document.getElementById("featured");
  const container = document.getElementById("news");
  const filtered = category==="Home" ? allNews : allNews.filter(n=>n.category && n.category.toLowerCase()===category.toLowerCase());
  if(filtered.length===0){ container.innerHTML="<p>No news available.</p>"; featuredEl.innerHTML=""; return; }

  // Featured story
  featuredEl.innerHTML = `
    <img src="${filtered[0].image || 'https://picsum.photos/800/400'}">
    <h2>${filtered[0].title}</h2>
    <p>${filtered[0].content || ""}</p>
    <a href="${filtered[0].url||'#'}" target="_blank">Read Full Story</a>
  `;

  // Other news
  container.innerHTML = "";
  filtered.slice(1).forEach(n=>{
    container.innerHTML += `
      <div class="card">
        <img src="${n.image || 'https://picsum.photos/600/300'}">
        <h3>${n.title}</h3>
        <div class="time">${new Date(n.publishedAt||n.time).toLocaleString()}</div>
        <p>${n.content||""}</p>
        <a href="${n.url||'#'}" target="_blank">Read Full Story</a>
      </div>
    `;
  });
}

// ===== BUTTON EVENTS =====
document.querySelectorAll("nav button").forEach(btn=>{
  btn.addEventListener("click",()=>loadNews(btn.dataset.cat));
});

// ===== INITIAL LOAD =====
loadNews("Home");
</script>
</body>
</html>
