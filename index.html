<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
text-align:center;
}

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:12px 16px;
cursor:pointer;
}

nav button:hover{
background:#c40000;
}

.search{
margin-left:auto;
padding:8px;
}

.search input{
padding:6px;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:18px;
}

.card{
background:white;
margin-bottom:18px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:14px;
}

.details{
display:none;
margin-top:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
Radiant Waves Global News
</header>

<div class="breaking">
<span id="ticker"></span>
</div>

<nav>

<button onclick="filter('all')">Home</button>
<button onclick="filter('Naija')">Naija Pulse</button>
<button onclick="filter('World')">World</button>
<button onclick="filter('Tech')">Technology</button>
<button onclick="filter('Sports')">Sports</button>

<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div>

</nav>

<div class="container" id="news"></div>

<footer>

Radiant Waves News  
Editor: Omotara How

</footer>

<script>

/* ONLY EDIT THIS PART */

const headlines=[

"Peter Obi Calls for Electoral Reform in Nigeria",

"Nasir El Rufai Speaks on Future of Nigerian Politics",

"Sunday Igboho Calls for Unity in Southwest Nigeria",

"Nigeria Economic Debate Intensifies",

"Global Leaders Monitor Middle East Tensions",

"Artificial Intelligence Expands Across Global Markets",

"Cybersecurity Experts Warn of Rising Digital Threats",

"European Football Clubs Prepare for Major Tournament",

"US Election Campaign Season Intensifies",

"UK Political Parties Prepare for Future Election",

"China Economic Growth Signals Mixed Outlook",

"UN Warns About Climate Crisis Impact Worldwide"

]

/* AUTOMATIC SYSTEM */

function category(title){

let t=title.toLowerCase()

if(t.includes("obi")||t.includes("igboho")||t.includes("rufai")||t.includes("nigeria"))
return "Naija"

if(t.includes("ai")||t.includes("cyber")||t.includes("technology"))
return "Tech"

if(t.includes("football")||t.includes("sports")||t.includes("tournament"))
return "Sports"

return "World"

}

function details(title){

return `Radiant Waves News — ${title}.

Analysts say this development is drawing significant attention among political observers and international stakeholders. Experts note that the issue reflects broader discussions around governance, economic direction, and global cooperation.

Observers believe the situation could influence future policy decisions and public debate. More updates are expected as officials, analysts, and community leaders respond to the evolving situation.

Radiant Waves News will continue monitoring developments and provide further verified updates as more information becomes available.`

}

function generate(){

return headlines.map(h=>({

title:h,

category:category(h),

image:"https://picsum.photos/800/500?random="+Math.random(),

summary:"Breaking development reported by Radiant Waves News.",

details:details(h)

}))

}

const news=generate()

function render(list){

let html=""

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<p><b>Editor:</b> Omotara How</p>

</div>

</div>

</div>

`

})

document.getElementById("news").innerHTML=html

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display=="block"?"none":"block"

}

function filter(cat){

if(cat=="all") render(news)

else render(news.filter(n=>n.category==cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("ticker").innerText=headlines.join(" • ")

render(news)

</script>

</body>
</html>
