<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; }

/* VIDEO */
.video-bg { width: 100%; height: 220px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking {
  background: #0047AB;
  color: white;
  padding: 10px;
  overflow: hidden;
}
.breaking span {
  display: inline-block;
  white-space: nowrap;
  animation: scroll 15s linear infinite;
}
@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* NAV */
nav { background: #111; padding: 10px; text-align: center; }
nav a { color: white; margin: 10px; cursor: pointer; }

/* LAYOUT */
.container { max-width: 1100px; margin: auto; display: flex; padding: 20px; }
.main { flex: 3; }
.sidebar { flex: 1; padding-left: 20px; }

/* ARTICLE */
.article { background: white; padding: 15px; margin-bottom: 20px; }
.article img { width: 100%; height: 180px; object-fit: cover; }
.readmore { color: blue; font-weight: bold; }

/* SOCIAL */
.social {
  text-align: center;
  padding: 15px;
  background: #111;
}
.social a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* FOOTER */
footer {
  background: black;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- AUDIO -->
<audio autoplay loop>
  <source src="news-music.mp3" type="audio/mp3">
</audio>

<!-- BREAKING -->
<div class="breaking">
  <span id="breakingNews">Loading news...</span>
</div>

<!-- NAV -->
<nav>
  <a onclick="filterNews('All')">Home</a>
  <a onclick="filterNews('World')">World</a>
  <a onclick="filterNews('Politics')">Politics</a>
  <a onclick="filterNews('Business')">Business</a>
  <a onclick="filterNews('Technology')">Technology</a>
  <a onclick="filterNews('Sport')">Sport</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="#">Facebook</a>
  <a href="#">Twitter</a>
  <a href="#">Instagram</a>
  <a href="#">YouTube</a>
</div>

<footer>
  <p>© 2026 RadiantWaves Global News</p>
</footer>

<script>
let allArticles = [];

fetch("news.json")
.then(res => res.json())
.then(data => {
  allArticles = data;
  displayNews(data);
});

function displayNews(articles) {
  const news = document.getElementById("news");
  const trending = document.getElementById("trending");
  news.innerHTML = "";
  trending.innerHTML = "";

  articles.forEach((a, i) => {
    news.innerHTML += `
      <div class="article">
        <img src="${a.image}" onerror="this.style.display='none'">
        <h3>${a.title}</h3>
        <p>${a.summary}</p>
        <a href="#" class="readmore" onclick="openArticle(${i})">Read more</a>
      </div>
    `;
  });

  articles.slice(0,5).forEach((a,i)=>{
    trending.innerHTML += `<p onclick="openArticle(${i})">${a.title}</p>`;
  });

  document.getElementById("breakingNews").innerText =
    articles[0]?.title || "Breaking news";
}

function filterNews(category) {
  if(category === "All"){
    displayNews(allArticles);
  } else {
    const filtered = allArticles.filter(a => a.category === category);
    displayNews(filtered);
  }
}

function openArticle(index){
  const a = allArticles[index];
  alert(a.title + "\n\n" + a.content);
}
</script>

</body>
</html>
