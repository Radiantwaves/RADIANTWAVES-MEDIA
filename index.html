<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves News</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

/* HEADER */
.header { text-align:center; background:white; padding:15px; }
.title { font-size:30px; font-weight:bold; }

/* VIDEO */
.video-bg video { width:100%; height:220px; object-fit:cover; }

/* BREAKING */
.breaking { background:#0047AB; color:white; padding:8px; }

/* NAV */
nav { background:#111; text-align:center; padding:10px; }
nav a { color:white; margin:0 10px; cursor:pointer; }

/* LAYOUT */
.container { display:flex; flex-wrap:wrap; padding:10px; }
.main { flex:3; min-width:300px; }
.sidebar { flex:1; padding:10px; }

/* ARTICLE */
.article { background:white; margin:10px; padding:10px; }
.readmore { color:#0047AB; font-weight:bold; }

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:15px; }

/* SOCIAL */
.social a { color:white; margin:0 6px; text-decoration:none; }

/* BOX */
.box { background:white; padding:10px; margin-bottom:10px; }
</style>
</head>

<body>

<div class="header">
  <div class="title">RadiantWaves News</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking" id="breaking">Loading...</div>

<!-- NAV -->
<nav>
  <a onclick="loadNews('All')">Home</a>
  <a onclick="loadNews('World')">World</a>
  <a onclick="loadNews('Politics')">Politics</a>
  <a onclick="loadNews('Business')">Business</a>
  <a onclick="loadNews('Sport')">Sport</a>
</nav>

<!-- CONTENT -->
<div class="container">

<div class="main" id="news"></div>

<div class="sidebar">

<div class="box">
<h3>🎂 Birthday</h3>
<p>Happy Birthday to our readers 🎉</p>
</div>

<div class="box">
<h3>📢 Advertisement</h3>
<p>Your advert here</p>
</div>

<div class="box">
<h3>🔥 Trending</h3>
<div id="trending"></div>
</div>

</div>

</div>

<!-- FOOTER -->
<footer>

<div class="social">
<a href="#">Facebook</a>
<a href="#">Twitter</a>
<a href="#">Instagram</a>
<a href="#">YouTube</a>
</div>

<p>© 2026 RadiantWaves Global News</p>

</footer>

<script>
let allNews = [];

fetch("news.json")
.then(res => res.json())
.then(data => {
  allNews = data;
  loadNews("All");
});

function loadNews(category){
  const newsDiv = document.getElementById("news");
  const trending = document.getElementById("trending");

  newsDiv.innerHTML = "";
  trending.innerHTML = "";

  let filtered = category === "All"
    ? allNews
    : allNews.filter(n => n.category === category);

  filtered.forEach((n,i)=>{
    newsDiv.innerHTML += `
      <div class="article">
        <h3>${n.live ? "🔴 " : ""}${n.title}</h3>
        <p>${n.summary}</p>
        <p>${n.content}</p>
      </div>
    `;
  });

  filtered.slice(0,5).forEach(n=>{
    trending.innerHTML += `<p>${n.title}</p>`;
  });

  let breaking = allNews.find(n => n.live) || allNews[0];
  document.getElementById("breaking").innerText = breaking.title;
}
</script>

</body>
</html>
