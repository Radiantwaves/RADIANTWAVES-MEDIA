<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Global News</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f8f8f8; }
  
  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#222; color:#fff; flex-wrap:wrap; }
  .logo { display:flex; align-items:center; }
  .logo img { margin-right:10px; }
  .nav a { margin:0 10px; color:#fff; text-decoration:none; }
  .nav a:hover { text-decoration:underline; }
  
  /* Slogan */
  .slogan { width:100%; text-align:center; background:#444; color:#fff; font-size:16px; font-weight:bold; padding:5px 0; }
  
  /* Breaking news */
  .breaking-news { background:#ff0000; color:#fff; padding:5px 10px; white-space:nowrap; overflow:hidden; font-weight:bold; }
  #breaking-ticker a { color:#fff; margin-right:20px; text-decoration:none; }
  #breaking-ticker a:hover { text-decoration:underline; }
  
  /* Main content */
  .main-content { display:flex; flex-wrap:wrap; gap:20px; padding:20px; }
  .article { flex:1 1 300px; border:1px solid #ccc; padding:10px; background:#fff; }
  .article img { width:100%; height:auto; }
  
  /* Trending sidebar */
  .trending { position:fixed; right:0; top:170px; width:250px; background:#f5f5f5; padding:10px; max-height:80vh; overflow-y:auto; }
  .trending h3 { margin-top:0; }
  
  /* Footer & social media icons */
  footer { background:#222; color:#fff; padding:10px 20px; text-align:center; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:10px; }
  footer a img { margin-right:10px; vertical-align:middle; transition: transform 0.2s; }
  footer a img:hover { transform: scale(1.2); }

  @media(max-width:800px){
    .trending { position:static; width:100%; max-height:none; margin-top:20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/icon-512.png" alt="Radiant Waves Global News" width="60" height="60">
    <span>Radiant Waves Global News</span>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="world.html">World</a>
    <a href="politics.html">Politics</a>
    <a href="business.html">Business</a>
    <a href="technology.html">Technology</a>
    <a href="science.html">Science</a>
    <a href="sports.html">Sport</a>
    <a href="entertainment.html">Entertainment</a>
  </nav>
  <div class="slogan">
    <p>Your Daily Dose of Accurate & Breaking Global News</p>
  </div>
</header>

<div class="breaking-news">
  <strong>Breaking News:</strong>
  <div id="breaking-ticker"></div>
</div>

<main class="main-content">
  <div id="articles-container"></div>
</main>

<aside class="trending">
  <h3>Trending News</h3>
  <ul id="trending-list"></ul>
</aside>

<footer>
  <p>Follow us:</p>
  <a href="https://facebook.com/radiantwavesnews" target="_blank"><img src="images/facebook.png" alt="Facebook" width="24" height="24"></a>
  <a href="https://instagram.com/radiantwaves1" target="_blank"><img src="images/instagram.png" alt="Instagram" width="24" height="24"></a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><img src="images/tiktok.png" alt="TikTok" width="24" height="24"></a>
  <a href="https://twitter.com/radiant13528995" target="_blank"><img src="images/twitter.png" alt="Twitter" width="24" height="24"></a>
</footer>

<script>
// Fetch news.json and populate main articles
fetch('news.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('articles-container');
    data.articles.forEach(a => {
      const articleDiv = document.createElement('div');
      articleDiv.className = 'article';
      articleDiv.innerHTML = `
        <img src="${a.image}" alt="${a.title}">
        <h2>${a.title}</h2>
        <p>${a.description}</p>
        <a href="article.html?id=${encodeURIComponent(a.title)}">Read more</a>
      `;
      container.appendChild(articleDiv);
    });

    // Populate breaking news ticker
    const ticker = document.getElementById('breaking-ticker');
    data.articles.slice(0,5).forEach(a => {
      const link = document.createElement('a');
      link.href = `article.html?id=${encodeURIComponent(a.title)}`;
      link.textContent = a.title;
      ticker.appendChild(link);
      ticker.appendChild(document.createTextNode("  |  "));
    });

    // Populate trending news
    const trendingList = document.getElementById('trending-list');
    data.articles.slice(0,5).forEach(a => {
      const li = document.createElement('li');
      const link = document.createElement('a');
      link.href = `article.html?id=${encodeURIComponent(a.title)}`;
      link.textContent = a.title;
      li.appendChild(link);
      trendingList.appendChild(li);
    });
  });
</script>

</body>
</html>
