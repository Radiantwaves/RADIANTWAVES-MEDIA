<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#c40000;
  color:white;
  padding:20px;
  text-align:center;
}
header p{
  margin:5px;
  font-size:14px;
}

/* RADIO BAR */
.radio-bar{
  background:#222;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  font-weight:bold;
}
.radio-bar audio{
  width:220px;
}

/* NAVIGATION */
nav{
  background:#111;
  display:flex;
  flex-wrap:wrap;
}
nav button{
  background:none;
  border:none;
  color:white;
  padding:12px 16px;
  cursor:pointer;
}
nav button:hover{
  background:#c40000;
}
.search{
  margin-left:auto;
  padding:8px;
}
.search input{
  padding:6px;
}

/* BREAKING NEWS */
.breaking{
  background:black;
  color:white;
  padding:8px;
  overflow:hidden;
  white-space:nowrap;
  font-weight:bold;
}
.breaking span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 45s linear infinite;
}
@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* NEWS CARDS */
.container{
  padding:20px;
}
.card{
  background:white;
  margin-bottom:20px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  overflow:hidden;
}
.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}
.content{
  padding:15px;
}
.details{
  display:none;
  margin-top:10px;
  line-height:1.7;
}

/* FOOTER */
footer{
  background:#111;
  color:white;
  padding:25px;
  text-align:center;
}
.social img{
  width:28px;
  margin:8px;
}
</style>
</head>
<body>

<header>
<h1>Radiant Waves Global News</h1>
<p><b>Gateway to World News – Connecting You to the World</b></p>
</header>

<!-- RADIO BAR -->
<div class="radio-bar">
<span>🎧 Radiant Waves Radio — Listen Live</span>
<audio controls loop>
  <source src="news-music.mp3" type="audio/mpeg">
</audio>
</div>

<!-- BREAKING NEWS -->
<div class="breaking">
<span id="ticker"></span>
</div>

<!-- NAVIGATION -->
<nav>
  <button onclick="filterNews('all')">Home</button>
  <button onclick="filterNews('Naija')">Naija Pulse</button>
  <button onclick="filterNews('World')">World</button>
  <button onclick="filterNews('Tech')">Technology</button>
  <button onclick="filterNews('Sports')">Sports</button>
  <div class="search">
    <input id="search" placeholder="Search news..." onkeyup="searchNews()">
  </div>
</nav>

<!-- NEWS CONTAINER -->
<div class="container" id="news"></div>

<!-- FOOTER -->
<footer>
  <div class="social">
    <a href="https://instagram.com/radiantwaves1">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </a>
    <a href="https://tiktok.com/@radiantwavesmedia">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>
    <a href="https://facebook.com/radiantwavesnews">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>
    <a href="https://twitter.com/radiantwaves13528995">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
    </a>
  </div>
  <br>
  @2026Radiant Waves
</footer>

<script>
const news=[
  {
    title:"Peter Obi Calls for Electoral Reform in Nigeria",
    category:"Naija",
    image:"https://picsum.photos/800/500?politics",
    summary:"Former presidential candidate calls for transparent elections.",
    details:"Peter Obi has renewed calls for electoral reforms in Nigeria, emphasizing that democratic systems depend heavily on credible elections and transparent institutions."
  },
  {
    title:"Nasir El-Rufai Discusses Future of Nigerian Politics",
    category:"Naija",
    image:"https://picsum.photos/800/500?nigeria",
    summary:"Former Kaduna governor comments on governance reforms.",
    details:"Nasir El-Rufai has continued to shape political debate in Nigeria after discussing economic reforms and national policy priorities during a recent public policy forum."
  },
  {
    title:"Middle East Tensions Draw Global Diplomatic Attention",
    category:"World",
    image:"https://picsum.photos/800/500?middleeast",
    summary:"International leaders urge restraint.",
    details:"Governments across Europe, Asia, and North America are monitoring developments in the Middle East closely as diplomatic discussions continue."
  },
  {
    title:"Artificial Intelligence Expands Across Global Technology Sector",
    category:"Tech",
    image:"https://picsum.photos/800/500?ai",
    summary:"AI investment increases worldwide.",
    details:"Major technology companies are investing heavily in artificial intelligence systems designed to automate industries and improve productivity."
  },
  {
    title:"Cybersecurity Experts Warn of Increasing Global Cyber Attacks",
    category:"Tech",
    image:"https://picsum.photos/800/500?cybersecurity",
    summary:"Digital security becomes global priority.",
    details:"Security analysts warn that cyber attacks targeting financial institutions and infrastructure are becoming more sophisticated."
  },
  {
    title:"European Football Clubs Prepare for Major Tournament",
    category:"Sports",
    image:"https://picsum.photos/800/500?football",
    summary:"Teams intensify training ahead of competition.",
    details:"Clubs across Europe are preparing for upcoming continental tournaments with focus on player fitness and tactical discipline."
  }
];

let currentNews=[...news];

function render(list){
  let html="";
  list.forEach((n,i)=>{
    html+=`
    <div class="card">
      <img src="${n.image}">
      <div class="content">
        <h3>${n.title}</h3>
        <p>${n.summary}</p>
        <button onclick="toggle(${i})">Read Full Story</button>
        <div class="details" id="d${i}">
          <p>${n.details}</p>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("news").innerHTML=html;
}

function toggle(i){
  let d=document.getElementById("d"+i);
  d.style.display=d.style.display==="block"?"none":"block";
}

function filterNews(cat){
  if(cat==="all"){currentNews=[...news];}
  else{currentNews=news.filter(n=>n.category===cat);}
  render(currentNews);
}

function searchNews(){
  let q=document.getElementById("search").value.toLowerCase();
  let results=news.filter(n=>n.title.toLowerCase().includes(q));
  render(results);
}

// Set breaking ticker
document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ");

// Initial render
render(news);
</script>

</body>
</html>
