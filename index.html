<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>

<style>
body {margin:0; font-family:Arial, sans-serif; background:#fff; color:#000;}
header {background:#000; color:#fff; padding:15px; text-align:center;}
nav {background:#111; color:#fff; padding:10px; text-align:center;}
nav a {color:#fff; text-decoration:none; margin:0 10px; font-weight:bold; cursor:pointer;}
nav a:hover {color:yellow;}

#breaking {background:orange; padding:8px; font-weight:bold; overflow:hidden; white-space:nowrap;}
#breaking span {display:inline-block; padding-left:100%; animation:scroll 15s linear infinite;}
@keyframes scroll {0% {transform:translateX(0);} 100% {transform:translateX(-100%);}}

#main {padding:15px; text-align:center;}
#main img {width:100%; max-height:400px; object-fit:cover;}
#main h2 {margin:10px 0;}
#main p {margin:10px 0;}
#main button {background:#1e90ff; color:#fff; border:none; padding:8px 12px; cursor:pointer;}

.section {padding:15px;}
.card {border:1px solid #ddd; padding:10px; margin-bottom:15px; cursor:pointer;}
.card img {width:100%; height:auto;}
.card h3 {color:#1e90ff; margin:5px 0;}
.card p {margin:5px 0; color:#333;}

#articlePage {display:none; padding:20px;}
#backBtn {background:#1e90ff; color:#fff; border:none; padding:8px 12px; margin-bottom:10px; cursor:pointer;}

#social {text-align:center; padding:10px;}
#social img {width:30px; margin:5px;}
</style>
</head>
<body>

<header>
<h1>Radiant Waves Media</h1>
</header>

<nav>
<a data-category="Home">Home</a>
<a data-category="Nigeria">Nigeria</a>
<a data-category="Europe">Europe</a>
<a data-category="Africa">Africa</a>
<a data-category="Asia">Asia</a>
<a data-category="America">America</a>
<a data-category="Politics">Politics</a>
<a data-category="Business">Business</a>
<a data-category="Music">Music</a>
<a data-category="Movies">Movies</a>
<a data-category="Olympics">Olympics</a>
</nav>

<div id="breaking"><span>Loading headlines...</span></div>

<div id="main">
<img id="mainImage">
<h2 id="mainTitle"></h2>
<p id="mainSummary"></p>
<button id="readMain">Read Full Story</button>
</div>

<div id="newsSection" class="section"></div>

<div id="articlePage">
<button id="backBtn">Back</button>
<h2 id="articleTitle"></h2>
<img id="articleImage" style="width:100%; max-height:400px; object-fit:cover;">
<p id="articleContent"></p>
</div>

<div id="social"></div>

<script>
let mainArticle = null;
let allArticles = [];

// Load news
fetch('news.json?v='+Date.now())
.then(res => res.json())
.then(data => {
    // Breaking news
    const breakingEl = document.getElementById('breaking');
    breakingEl.innerHTML = "<span>"+data.breaking+"</span>";

    // Simple alert on phone when breaking news changes
    if (Notification && Notification.permission === "granted") {
        new Notification("Breaking News", {body: data.breaking});
    } else if (Notification && Notification.permission !== "denied") {
        Notification.requestPermission().then(permission=>{
            if(permission==="granted") new Notification("Breaking News",{body:data.breaking});
        });
    }

    // Main article
    mainArticle = data.main;
    document.getElementById('mainImage').src = mainArticle.image;
    document.getElementById('mainTitle').innerText = mainArticle.title;
    document.getElementById('mainSummary').innerText = mainArticle.summary;
    document.getElementById('readMain').addEventListener('click', ()=>openArticle(mainArticle));

    // All articles
    allArticles = data.news;
    displayNews('Home');

    // Social icons
    const social = document.getElementById('social');
    social.innerHTML = '';
    data.social.forEach(s=>{
        social.innerHTML += `<a href="${s.link}" target="_blank"><img src="${s.image}"></a>`;
    });

    // Category filtering
    document.querySelectorAll('nav a').forEach(link=>{
        link.addEventListener('click', e=>{
            e.preventDefault();
            let category = link.getAttribute('data-category');
            displayNews(category);
        });
    });
});

// Function to display news filtered by category
function displayNews(category){
    let container = document.getElementById('newsSection');
    container.innerHTML = '';
    allArticles.forEach(item=>{
        if(category==='Home' || item.category===category){
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.image}">
                <h3>${item.title}</h3>
                <p>${item.summary}</p>
            `;
            card.addEventListener('click', ()=>openArticle(item));
            container.appendChild(card);
        }
    });
}

// Open article
function openArticle(article){
    document.getElementById('main').style.display = 'none';
    document.getElementById('newsSection').style.display = 'none';
    document.getElementById('articlePage').style.display = 'block';
    document.getElementById('articleTitle').innerText = article.title;
    document.getElementById('articleImage').src = article.image;
    document.getElementById('articleContent').innerText = article.content;
}

// Back button
document.getElementById('backBtn').addEventListener('click', ()=>{
    document.getElementById('articlePage').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('newsSection').style.display = 'block';
});
</script>

</body>
</html>
