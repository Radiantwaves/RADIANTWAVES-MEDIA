<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

header{
background:#c00;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 16px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c00;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
font-weight:bold;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:18px;
padding:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
border-radius:5px;
}

.card h3{
margin:10px 0 5px 0;
}

.time{
color:gray;
font-size:13px;
}

.details{
display:none;
margin-top:10px;
color:#333;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
margin-top:20px;
}

.social a{
margin:0 10px;
color:white;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span>
🔴 Macron urges de-escalation in Middle East |
🔴 Global oil prices surge |
🔴 Nigeria reviews economic forecast |
🔴 Cybersecurity agencies warn of attacks |
🔴 US raises global military alert
</span>
</div>

<nav>
<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Nigeria')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
</nav>

<div class="container" id="newsContainer"></div>

<footer>

<div class="social">
<a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a>
<a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a>
<a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a>
<a href="https://twitter.com/radiantwaves13528995" target="_blank">X</a>
</div>

<br>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

const newsData = [

{
category:"World",
title:"Macron Urges De-escalation in Middle East Conflict",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?1",
content:"French President Emmanuel Macron urged restraint as tensions rise across the Middle East following recent military developments.",
author:"Editor: Omotara How"
},

{
category:"Nigeria",
title:"Tinubu Nominates Oyedele as Finance Minister",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?2",
content:"President Bola Tinubu nominated tax expert Taiwo Oyedele as Minister of State for Finance as Nigeria pushes forward economic reforms.",
author:"Editor: Omotara How"
},

{
category:"Nigeria",
title:"Yobe APC Chairman Re-elected After Party Congress",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?3",
content:"Delegates at the APC congress in Yobe voted overwhelmingly to retain the party chairman in a move aimed at strengthening leadership.",
author:"Editor: Omotara How"
},

{
category:"Technology",
title:"Global AI Companies Race to Release New Models",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?4",
content:"Technology companies across the US, Europe and Asia are investing billions into artificial intelligence development.",
author:"Editor: Omotara How"
},

{
category:"Technology",
title:"Cybersecurity Experts Warn of Possible Global Attacks",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?5",
content:"Security agencies warn of potential cyber attacks targeting financial and infrastructure systems worldwide.",
author:"Editor: Omotara How"
},

{
category:"Sports",
title:"FIFA Announces New International Tournament Calendar",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?6",
content:"FIFA confirmed new international football schedules as teams prepare for upcoming global tournaments.",
author:"Editor: Omotara How"
},

{
category:"Sports",
title:"Champions League Quarter-Final Draw Completed",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?7",
content:"European football giants learned their opponents after UEFA conducted the Champions League quarter-final draw.",
author:"Editor: Omotara How"
},

{
category:"World",
title:"Oil Prices Surge as Middle East Tensions Rise",
time:"March 6, 2026",
image:"https://picsum.photos/800/400?8",
content:"Energy markets jumped sharply after geopolitical tensions raised fears of supply disruptions.",
author:"Editor: Omotara How"
}

];

function displayNews(data){
const container=document.getElementById("newsContainer");
container.innerHTML="";
data.forEach((news,index)=>{
container.innerHTML+=`
<div class="card" onclick="toggleDetails(${index})">
<img src="${news.image}">
<h3>${news.title}</h3>
<div class="time">${news.time}</div>
<div class="details" id="details${index}">
<p>${news.content}</p>
<p><em>${news.author}</em></p>
</div>
</div>
`;
});
}

function toggleDetails(index){
const detail=document.getElementById("details"+index);
detail.style.display=detail.style.display==="block"?"none":"block";
}

function filterNews(category){
if(category==="All"){
displayNews(newsData);
}else{
displayNews(newsData.filter(n=>n.category===category));
}
}

displayNews(newsData);

</script>

</body>
</html>
