<!DOCTYPE html>
<html>

<head>

<title>Radiant Waves News</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#0b0f1a;
color:white;
}

/* HEADER */
header{
background:#111;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}

.logo img{
height:40px;
}

nav{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
cursor:pointer;
}

nav button:hover{
color:#00bfff;
}

.search{
margin-left:auto;
}

.search input{
padding:6px;
border:none;
border-radius:4px;
}
<audio id="bgAudio" autoplay loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleAudio()" style="position:fixed;bottom:20px;right:20px;">
🔊
</button>
/* BREAKING */
.breaking{
background:red;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* MAIN */
.main{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

/* NEWS GRID */
.news{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#111;
box-shadow:0 0 8px rgba(0,0,0,0.5);
border-radius:6px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.content h3{
margin:0 0 10px;
}

.content p{
color:#ccc;
font-size:14px;
}

.details{
display:none;
margin-top:10px;
}

/* SIDEBAR */
.sidebar{
background:#111;
padding:15px;
box-shadow:0 0 8px rgba(0,0,0,0.5);
}

.sidebar h3{
margin-top:0;
}

/* SOCIAL */
.social{
margin-top:20px;
text-align:center;
}

.social i{
font-size:20px;
margin:10px;
cursor:pointer;
}

.social i:hover{
color:#00bfff;
}

/* FOOTER */
footer{
background:#000;
text-align:center;
padding:20px;
margin-top:20px;
}

.footer-slogan{
color:#aaa;
font-size:13px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<nav>

<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija Pulse')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>

<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div>

</nav>

</header>

<div class="breaking">
<span id="breaking"></span>
</div>

<div class="main">

<div class="news" id="news"></div>

<div class="sidebar">

<h3>Trending Stories</h3>
<ul id="trending"></ul>

div class="social">
  <a href="https://facebook.com/radiantwavesnews" target="_blank">
    <i class="fab fa-facebook"></i>
  </a>
  <a href="https://twitter.com/@radiant13528995" target="_blank">
    <i class="fab fa-x-twitter"></i>
  </a>
  <a href="https://youtube.com/@radiantwave-wv6rj" target="_blank">
    <i class="fab fa-youtube"></i>
  </a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>
</div>

</div>

<footer>
  © 2026 RadiantWavesMedia
  <div class="footer-slogan">Connecting You Deeper to the World's Most Important Stories</div>
</footer>

<script>

/* HEADLINES */
const headlines=[

"Peter Obi Calls for Electoral Reform in Nigeria",
"El-Rufai Speaks on Future of Nigerian Politics",
"Sunday Igboho Calls for Unity in Southwest Nigeria",
"Tinubu Economic Reform Debate Continues",
"Global Leaders Monitor Middle East Tensions",
"Artificial Intelligence Investment Expands Worldwide",
"Cybersecurity Experts Warn of Rising Digital Threats",
"European Football Clubs Prepare for Major Tournament",
"US Election Campaign Season Intensifies",
"UK Political Parties Prepare for Future Election"

]

function getCategory(title){

let t=title.toLowerCase()

if(t.includes("obi")||t.includes("igboho")||t.includes("tinubu")||t.includes("rufai"))
return "Naija Pulse"

if(t.includes("election"))
return "Election"

if(t.includes("ai")||t.includes("cyber")||t.includes("technology"))
return "Technology"

if(t.includes("football")||t.includes("sports")||t.includes("tournament"))
return "Sports"

return "World"

}

function createNews(){

return headlines.map(title=>({

title:title,
category:getCategory(title),
image:"https://picsum.photos/600/400?random="+Math.random(),
synopsis:"Developing report from Radiant Waves News.",
details:"Radiant Waves News is monitoring this developing story. More updates coming.",
editor:"RadiantWaves Desk"

}))

}

const news=createNews()

function render(list){

let container=document.getElementById("news")
container.innerHTML=""

list.forEach((n,i)=>{

container.innerHTML+=`
<div class="card">
<img src="${n.image}">
<div class="content">
<h3>${n.title}</h3>
<p>${n.synopsis}</p>
<button onclick="toggle(${i})">Read More</button>
<div class="details" id="d${i}">
<p>${n.details}</p>
<p><b>Editor:</b> ${n.editor}</p>
</div>
</div>
</div>
`

})

}

function toggle(i){
let d=document.getElementById("d"+i)
d.style.display=d.style.display==="block"?"none":"block"
}

function filterNews(cat){
if(cat==="all") render(news)
else render(news.filter(n=>n.category===cat))
}

function searchNews(){
let q=document.getElementById("search").value.toLowerCase()
render(news.filter(n=>n.title.toLowerCase().includes(q)))
}

document.getElementById("breaking").innerText=headlines.join("  •  ")

let trending=document.getElementById("trending")
headlines.slice(0,6).forEach(h=>{
trending.innerHTML+=`<li>${h}</li>`
})

render(news)

</script>

</body>
</html>
