<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves News Network</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

header{
background:#0b3c5d;
color:white;
text-align:center;
padding:20px;
}

header img{
width:140px;
border-radius:6px;
}

h1{
margin:10px 0;
}

.slogan{
font-size:16px;
}

audio{
margin-top:10px;
}

.breaking{
background:red;
color:white;
padding:10px;
font-weight:bold;
}

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

#news{
max-width:900px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:5px;
margin-bottom:10px;
}

footer{
background:#0b3c5d;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:35px;
margin:8px;
}

</style>

</head>

<body>

<header>

<img src="main-story.jpg">

<h1>RadiantWaves</h1>

<p class="slogan">Gateway to World News, connecting you to the World</p>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking">
<marquee id="breaking">Loading global headlines...</marquee>
</div>

<nav>

<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Politics</a>
<a href="#">Business</a>
<a href="#">Technology</a>
<a href="#">Sports</a>

</nav>

<div id="news"></div>

<footer>

<p>© 2026 RadiantWaves News Network</p>

<p>Truth • Insight • Global Perspective</p>

<div class="social">

<img src="facebook.png">
<img src="instagram.png">
<img src="twitter.png">
<img src="tiktok.png">

</div>

</footer>

<<script>

fetch("news.json")
.then(res => res.json())
.then(data => {

let newsContainer = document.getElementById("news");
let breaking = document.getElementById("breaking");

/* Breaking News Scrolling */

breaking.innerHTML = data.articles.map(a => a.title).join(" • ");

/* Load News */

data.articles.forEach(article => {

newsContainer.innerHTML += `

<div class="news-card">

<h3>${article.title}</h3>

<p>${article.summary}</p>

</div>

`;

});

})
.catch(error => {

document.getElementById("news").innerHTML = "News loading...";

});

</script>

</body>
</html>
