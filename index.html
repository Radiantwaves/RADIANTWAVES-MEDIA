<!DOCTYPE html>
<html>

<head>

<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#111;
color:white;
padding:15px;
}

nav{
display:flex;
gap:15px;
align-items:center;
}

nav button{
background:none;
border:none;
color:white;
font-size:15px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
padding:6px;
}

.breaking{
background:red;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 45s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.main{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.news{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.details{
display:none;
margin-top:10px;
}

.sidebar{
background:white;
padding:15px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h2>Radiant Waves News</h2>

<nav>

<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija Pulse')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>

<div class="search">
<input id="search" placeholder="Search..." onkeyup="searchNews()">
</div>

</nav>

</header>

<div class="breaking">
<span id="breaking"></span>
</div>

<div class="main">

<div class="news" id="news"></div>

<div class="sidebar">

<h3>Trending</h3>
<ul id="trending"></ul>

</div>

</div>

<footer>

Radiant Waves News © 2026  
Editor: Omotara How

</footer>

<script>

const news=[

{
category:"Naija Pulse",
title:"Peter Obi Calls for Electoral Reform",
image:"images/peter-obi.jpg",
synopsis:"Former presidential candidate urges electoral transparency.",
details:"Peter Obi has renewed his call for stronger electoral reforms in Nigeria, stressing that transparent elections are essential for restoring public trust in democratic institutions. According to Obi, credible elections remain one of the most important pillars of democratic governance. Political observers say his comments reflect growing national conversations about institutional reform ahead of future election cycles."
},

{
category:"Naija Pulse",
title:"El-Rufai Remains Influential in National Politics",
image:"images/el-rufai.jpg",
synopsis:"Former Kaduna governor continues shaping debate.",
details:"Nasir El-Rufai continues to influence national political discussions even after leaving office. Analysts say his views on governance, economic policy and security issues still resonate across political circles. Observers believe his political experience and strong opinions make him an important voice in Nigeria's evolving political environment."
},

{
category:"Naija Pulse",
title:"Sunday Igboho Calls for Yoruba Unity",
image:"images/sunday-igboho.jpg",
synopsis:"Activist encourages cooperation in the southwest.",
details:"Yoruba activist Sunday Igboho has once again emphasized unity among Yoruba communities. Supporters say his message highlights cooperation, cultural identity and peaceful dialogue as communities across southwestern Nigeria discuss development and security concerns."
},

{
category:"World",
title:"Global Leaders Monitor Middle East Tensions",
image:"https://picsum.photos/600/400?world",
synopsis:"Diplomatic efforts continue worldwide.",
details:"International leaders are closely watching developments in the Middle East as diplomatic efforts continue to prevent escalation. Governments across multiple continents have urged calm while humanitarian organizations prepare contingency plans."
},

{
category:"World",
title:"United Nations Appeals for Humanitarian Support",
image:"https://picsum.photos/600/400?un",
synopsis:"Aid groups warn of growing needs.",
details:"The United Nations has appealed for expanded humanitarian assistance in several regions experiencing conflict and economic hardship. Aid agencies warn that millions of civilians depend on continued international support."
},

{
category:"Technology",
title:"Artificial Intelligence Investment Expands Globally",
image:"https://picsum.photos/600/400?technology",
synopsis:"Tech companies accelerate AI development.",
details:"Major technology companies are rapidly increasing investment in artificial intelligence systems designed to improve automation and data analysis. Experts say AI innovation could transform industries from healthcare to finance."
},

{
category:"Technology",
title:"Cybersecurity Experts Warn of Digital Threats",
image:"https://picsum.photos/600/400?cyber",
synopsis:"Governments urged to strengthen systems.",
details:"Cybersecurity specialists are warning governments and companies about rising cyber threats as digital infrastructure becomes increasingly important to national economies."
},

{
category:"Sports",
title:"European Football Clubs Prepare for Major Tournaments",
image:"https://picsum.photos/600/400?sports",
synopsis:"Teams intensify training for competitions.",
details:"Top European football clubs are intensifying preparations for upcoming continental tournaments. Coaches say the coming weeks will determine qualification for major championships."
},

{
category:"Sports",
title:"Athletics Qualifiers Begin Across Continents",
image:"https://picsum.photos/600/400?athletics",
synopsis:"Athletes aim for world championships.",
details:"Athletes from several countries have begun qualification events ahead of global athletics championships. Organizers say the competitions will determine the strongest contenders for international titles."
},

{
category:"Election",
title:"United States Campaign Season Intensifies",
image:"https://picsum.photos/600/400?election",
synopsis:"Candidates expand campaign activities.",
details:"Political campaigns across the United States are intensifying as candidates increase travel, speeches and policy announcements ahead of the upcoming election season."
},

{
category:"Election",
title:"UK Parties Prepare for Future Elections",
image:"https://picsum.photos/600/400?uk",
synopsis:"Political parties outline strategies.",
details:"Major political parties in the United Kingdom are beginning preparations for the next election cycle, outlining policy priorities and campaign strategies."
}

]

function render(list){

let container=document.getElementById("news")

container.innerHTML=""

list.forEach((n,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.synopsis}</p>

<button onclick="toggle(${i})">Read More</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<p><b>Editor:</b> Omotara How</p>

</div>

</div>

</div>

`

})

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filterNews(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("breaking").innerText=

news.map(n=>n.title).join("  •  ")

let trending=document.getElementById("trending")

news.slice(0,6).forEach(n=>{

trending.innerHTML+=`<li>${n.title}</li>`

})

render(news)

</script>

</body>

</html>
