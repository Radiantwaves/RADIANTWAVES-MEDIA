<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Newsroom</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#c40000;color:white;padding:15px;font-size:28px;text-align:center;font-weight:bold;}
nav{background:#111;display:flex;flex-wrap:wrap;}
nav button{background:none;border:none;color:white;padding:14px 18px;cursor:pointer;font-size:15px;}
nav button:hover{background:#c40000;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 20s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.search{text-align:center;padding:10px;}
.search input{padding:8px;width:60%;max-width:400px;border-radius:5px;border:1px solid #ccc;}
.container{padding:15px;}
.card{background:white;margin-bottom:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:5px;}
.time{color:gray;font-size:13px;}
.details{display:none;margin-top:10px;}
footer{background:#111;color:white;text-align:center;padding:20px;}
.social img{width:32px;margin:0 6px;}
</style>
</head>
<body>

<header>Radiant Waves Newsroom</header>

<div class="breaking">
<span id="breaking-news">
🔴 Loading breaking news...
</span>
</div>

<nav>
<button onclick="showCategory('All')">Home</button>
<button onclick="showCategory('World')">World</button>
<button onclick="showCategory('Technology')">Technology</button>
<button onclick="showCategory('Sports')">Sports</button>
<button onclick="showCategory('Election')">🗳 Election Watch</button>
</nav>

<div class="search">
<input type="text" placeholder="Search news..." onkeyup="searchNews(this.value)">
</div>

<div class="container" id="news"></div>

<footer>
<div class="social">
<img src="https://cdn-icons-png.flaticon.com/32/174/174855.png">
<img src="https://cdn-icons-png.flaticon.com/32/145/145802.png">
<img src="https://cdn-icons-png.flaticon.com/32/733/733579.png">
<img src="https://cdn-icons-png.flaticon.com/32/3046/3046121.png">
</div>
<p>© 2026 Radiant Waves News</p>
</footer>

<script>
let allNews = [];
let filteredNews = [];

/* === INSERT YOUR API KEY HERE === */
const API_KEY = "10618a434f80cc4ffe52717ea1bf2401";

/* === Load API News === */
async function loadNews(){
    try{
        const categories = ["world","technology","sports"];
        let apiNews = [];
        for(let cat of categories){
            const res = await fetch(`https://gnews.io/api/v4/top-headlines?token=${API_KEY}&lang=en&max=10&topic=${cat}`);
            const data = await res.json();
            if(data.articles){
                apiNews = apiNews.concat(data.articles.map(a=>({
                    category:capitalize(cat),
                    title:a.title,
                    time:new Date(a.publishedAt).toLocaleDateString(),
                    image:a.image || "https://picsum.photos/800/400",
                    content:a.description || "Full story developing.",
                    author:a.source.name
                })));
            }
        }
        allNews = apiNews;
        addElectionNews();
        filteredNews = allNews;
        updateBreakingNews();
        render();
    }catch(e){
        console.log("API failed, loading backup news.");
        loadBackup();
    }
}

/* === Add Election Watch Stories === */
function addElectionNews(){
    allNews.push(
        {category:"Election",title:"France Prepares Municipal Elections",time:"7 March 2026",image:"https://picsum.photos/800/400?501",content:"France prepares nationwide municipal elections next week.",author:"Editor: Omotara How"},
        {category:"Election",title:"Nigeria Prepares 2027 Elections",time:"7 March 2026",image:"https://picsum.photos/800/400?502",content:"Political parties prepare for 2027 national elections.",author:"Editor: Omotara How"},
        {category:"Election",title:"UK Local Elections Test Parties",time:"7 March 2026",image:"https://picsum.photos/800/400?503",content:"Upcoming UK local elections will test major parties.",author:"Editor: Omotara How"},
        {category:"Election",title:"US Midterms Could Reshape Congress",time:"7 March 2026",image:"https://picsum.photos/800/400?504",content:"Midterms may shift balance of power in Congress.",author:"Editor: Omotara How"},
        {category:"Election",title:"India State Elections Draw Attention",time:"7 March 2026",image:"https://picsum.photos/800/400?505",content:"State elections across India are closely watched.",author:"Editor: Omotara How"}
    );
}

/* === Backup News if API Fails === */
function loadBackup(){
    allNews = [
        {category:"World",title:"Markets React to Rising Oil Prices",time:"7 March 2026",image:"https://picsum.photos/800/400?1",content:"Markets react cautiously as oil prices rise amid global tensions.",author:"Radiant Waves News"},
        {category:"Technology",title:"AI Companies Release New Models",time:"7 March 2026",image:"https://picsum.photos/800/400?2",content:"Tech companies race to release new AI models.",author:"Radiant Waves News"},
        {category:"Sports",title:"Champions League Draw Completed",time:"7 March 2026",image:"https://picsum.photos/800/400?3",content:"European football teams learn upcoming opponents.",author:"Radiant Waves News"}
    ];
    addElectionNews();
    filteredNews = allNews;
    updateBreakingNews();
    render();
}

/* === Render News Cards === */
function render(){
    const container = document.getElementById("news");
    container.innerHTML = "";
    filteredNews.forEach((n,i)=>{
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${n.image}">
            <h3>${n.title}</h3>
            <div class="time">${n.time}</div>
            <div class="details" id="d${i}">
                <p>${n.content}</p>
                <p><em>${n.author}</em></p>
            </div>
        `;
        card.onclick = ()=>{
    if(allNews[i].url && allNews[i].url !== ""){
        window.open(allNews[i].url,"_blank");
    } else {
        const d = document.getElementById("d"+i);
        d.style.display = d.style.display==="block"?"none":"block";
    }
};
        container.appendChild(card);
    });
}

/* === Filter by Category === */
function showCategory(cat){
    if(cat==="All"){
        filteredNews=allNews; // show all categories
    } else {
        filteredNews=allNews.filter(n=>n.category===cat);
    }
    render();
}

/* === Search Function === */
function searchNews(text){
    filteredNews = allNews.filter(n=> n.title.toLowerCase().includes(text.toLowerCase()));
    render();
}

/* === Update Breaking News Ticker === */
function updateBreakingNews(){
    const breaking = document.getElementById("breaking-news");
    breaking.innerText = allNews.slice(0,10).map(n=>"🔴 "+n.title).join(" | ");
}

/* === Utility Capitalize Function === */
function capitalize(str){return str.charAt(0).toUpperCase()+str.slice(1);}

/* === Load News Initially & Auto-refresh every 10 min === */
loadBackup();
loadNews();
setInterval(loadNews,600000);

</script>
</body>
</html>
