<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radiant Waves Global News</title>

<meta name="description" content="Radiant Waves delivers breaking global news, politics, technology, science and business updates.">
<meta name="keywords" content="world news, global news, politics, technology, business, science">
<meta name="author" content="Radiant Waves Media">

<meta property="og:title" content="Radiant Waves Global News">
<meta property="og:description" content="Breaking global news from Radiant Waves Media">
<meta property="og:image" content="icon-512.png">

<link rel="icon" href="icon-512.png">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
}

header img{
width:60px;
}

nav{
background:#222;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00bfff;
}

.breaking{
background:#1a4fd8;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
}

.ticker{
white-space:nowrap;
display:inline-block;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.container{
display:flex;
max-width:1200px;
margin:auto;
padding:20px;
}

.news{
flex:3;
}

.trending{
flex:1;
background:white;
margin-left:20px;
padding:15px;
border-radius:6px;
}

.article{
background:white;
margin-bottom:20px;
padding:15px;
border-radius:6px;
}

.article img{
width:100%;
border-radius:4px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<img src="icon-512.png">

<h1>Radiant Waves</h1>

<p>Gateway to World News</p>

</header>


<div style="text-align:center;margin:10px;">

<button id="playNews">🔊 Listen to RadiantWaves</button>

<audio id="newsAudio" loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</div>


<nav>

<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Politics</a>
<a href="#">Business</a>
<a href="#">Technology</a>
<a href="#">Science</a>
<a href="#">Sports</a>
<a href="#">Entertainment</a>

</nav>


<div class="breaking">

<span>Breaking News:</span>

<span class="ticker" id="ticker"></span>

</div>


<div class="container">

<div class="news" id="news"></div>

<div class="trending">

<h3>Trending News</h3>

<ul id="trending"></ul>

</div>

</div>


<footer>

<p>Radiant Waves Media © 2026</p>

</footer>


<script>

const playButton=document.getElementById("playNews")
const audio=document.getElementById("newsAudio")

playButton.onclick=function(){

if(audio.paused){
audio.play()
playButton.innerHTML="⏸ Pause RadiantWaves"
}else{
audio.pause()
playButton.innerHTML="🔊 Listen to RadiantWaves"
}

}


fetch("news.json")

.then(res=>res.json())

.then(data=>{

let newsHTML=""
let ticker=""
let trendingHTML=""

data.articles.forEach((article,i)=>{

let img=article.image?article.image:"icon-512.png"

newsHTML+=`

<div class="article">

<img src="${img}">

<h2>${article.title}</h2>

<p>${article.description}</p>

<small>${article.date}</small>

</div>

`

ticker+=article.title+" • "

if(i<5){

trendingHTML+=`<li>${article.title}</li>`

}

})

document.getElementById("news").innerHTML=newsHTML
document.getElementById("ticker").innerText=ticker
document.getElementById("trending").innerHTML=trendingHTML

})

</script>

</body>
</html>
