// Merge all news into single array
const news=[...naijaNews,...worldNews,...techNews,...sportsNews,...electionNews];

let currentNews=[...news];

function render(list){
  let html="";
  list.forEach((n,i)=>{
    html+=`
    <div class="card">
    <img src="${n.image}">
    <div class="content">
    <h3>${n.title}</h3>
    <p>${n.summary}</p>
    <button class="read-more" onclick="toggle(${i})">Read Full Story</button>
    <div class="details" id="d${i}">
    <p>${n.details}</p>
    <p><em>${n.author}</em> | <strong>Source:</strong> ${n.source}</p>
    </div>
    </div>
    </div>`;
  });
  document.getElementById("news").innerHTML=html;
}

function toggle(i){
  let d=document.getElementById("d"+i);
  d.style.display=d.style.display==="block"?"none":"block";
}

function filterNews(cat){
  if(cat==="all"){currentNews=[...news];}
  else{currentNews=news.filter(n=>n.category===cat);}
  render(currentNews);
}

function searchNews(){
  let q=document.getElementById("search").value.toLowerCase();
  let results=news.filter(n=>n.title.toLowerCase().includes(q));
  render(results);
}

// Breaking news ticker
document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ");

// Initial render
render(news);
