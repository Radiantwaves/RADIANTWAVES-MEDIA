<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves News Network</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:white;
text-align:center;
padding:20px;
border-bottom:3px solid #0b3d91;
}

header img{
width:120px;
}

h1{
margin:10px 0;
font-size:34px;
color:#0b3d91;
}

.slogan{
font-size:17px;
color:#444;
}

/* BREAKING NEWS */

.breaking{
background:#0b3d91;
color:white;
padding:10px;
font-weight:bold;
font-size:16px;
}

/* NAVIGATION */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

nav a:hover{
color:#f4c542;
}

/* NEWS AREA */

#news{
max-width:900px;
margin:auto;
padding:20px;
}

/* NEWS CARD */

.news-card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

.news-card h3{
color:#0b3d91;
margin:10px 0;
}

.news-card p{
color:#333;
line-height:1.5;
}

/* FOOTER */

footer{
background:#0b3d91;
color:white;
text-align:center;
padding:25px;
}

.social img{
width:32px;
margin:8px;
transition:0.3s;
}

.social img:hover{
transform:scale(1.2);
}

/* AUDIO */

audio{
margin-top:10px;
}

</style>

</head>

<body>

<header>

<img src="icon-512.png">

<h1>RadiantWaves</h1>

<p class="slogan">
Gateway to World News – Connecting You to the World
</p>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking">
<marquee id="breaking">Loading Breaking News...</marquee>
</div>

<nav>

<a onclick="filterNews('all')">Home</a>
<a onclick="filterNews('world')">World</a>
<a onclick="filterNews('politics')">Politics</a>
<a onclick="filterNews('business')">Business</a>
<a onclick="filterNews('technology')">Technology</a>
<a onclick="filterNews('sports')">Sports</a>
<a onclick="filterNews('entertainment')">Entertainment</a>

</nav>

<div id="news"></div>

<footer>

<p>© 2026 RadiantWaves News Network</p>
<p>Truth • Insight • Global Perspective</p>

<div class="social">

<a href="https://facebook.com/RadiantWavesMedia" target="_blank">
<img src="facebook.png">
</a>

<a href="https://instagram.com/RadiantWavesMedia" target="_blank">
<img src="instagram.png">
</a>

<a href="https://twitter.com/RadiantWavesNews" target="_blank">
<img src="twitter.png">
</a>

<a href="https://tiktok.com/@RadiantWavesMedia" target="_blank">
<img src="tiktok.png">
</a>

</div>

</footer>

<script>

let allNews = []

fetch("news.json")
.then(response => response.json())
.then(data => {

allNews = data.articles

displayNews("all")

if(allNews.length > 0){
document.getElementById("breaking").innerText = allNews[0].title
}

})

function displayNews(category){

let container = document.getElementById("news")

container.innerHTML=""

let filtered = category === "all" ? allNews :
allNews.filter(n => n.category === category)

filtered.forEach(article => {

container.innerHTML += `

<div class="news-card">

<img src="${article.image}">

<h3>${article.title}</h3>

<p>${article.story}</p>

</div>

`

})

}

function filterNews(cat){
displayNews(cat)
}

</script>

</body>
</html>
