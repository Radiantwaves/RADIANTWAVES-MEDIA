<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>
<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; cursor:pointer; }
.title { font-size: 32px; font-weight: bold; margin: 5px; }
.title a { text-decoration: none; color: black; }
.title a:hover { color: #0047AB; }
.slogan { color: #666; font-size: 14px; }
.audio-player { margin-top: 10px; }
.breaking { background: #0047AB; color: white; padding: 8px; overflow: hidden; white-space: nowrap; }
.breaking span { display: inline-block; padding-left:100%; animation:scroll 20s linear infinite; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 12px; text-decoration: none; font-size: 14px; cursor:pointer; }
nav a:hover { text-decoration: underline; }
.container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; padding: 20px; }
.main { flex: 3; min-width: 600px; }
.sidebar { flex: 1; padding-left: 20px; min-width: 250px; }
.article { background: white; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
.article h3 { margin-top: 0; display:flex; align-items:center; }
.article img { width: 100px; height:60px; object-fit:cover; margin-right:10px; border-radius:4px; }
.article h3 a { text-decoration:none; color:black; flex:1; }
.article h3 a:hover { color:#0047AB; }
.readmore { color: #0047AB; font-weight: bold; text-decoration:none; display:block; margin-top:5px; }
.live { background: red; color:white; font-size:10px; padding:3px 6px; margin-right:5px; border-radius:3px; }
.sidebar h3 { border-bottom:2px solid #ddd; }
.sidebar a { display:block; margin:8px 0; text-decoration:none; color:#222; }
.sidebar a:hover { color:#0047AB; }
.social { text-align:center; margin-top:20px; }
.social a img { width:28px; margin:5px; cursor:pointer; }
footer { background:#111; color:white; text-align:center; padding:20px; margin-top:20px; }
footer a { color:white; margin:0 8px; text-decoration:none; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html"><img src="images/icon-512.png" alt="Logo"></a>
  <div class="title"><a href="index.html">RadiantWaves</a></div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
  <div class="audio-player">
    <audio controls autoplay loop>
      <source src="news-music.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<div class="breaking">
  <span id="breakingNews">Loading breaking news...</span>
</div>

<nav>
  <a data-category="All">Home</a>
  <a data-category="World">World</a>
  <a data-category="Politics">Politics</a>
  <a data-category="Business">Business</a>
  <a data-category="Technology">Technology</a>
  <a data-category="Science">Science</a>
  <a data-category="Sport">Sport</a>
  <a data-category="Entertainment">Entertainment</a>
</nav>

<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending News</h3>
    <div id="trending"></div>
  </div>
</div>

<div class="social">
  <a href="https://facebook.com/radiantwavesnews" target="_blank"><img src="images/facebook.png" alt="Facebook"></a>
  <a href="https://twitter.com/radiant13528995" target="_blank"><img src="images/twitter.png" alt="Twitter"></a>
  <a href="https://instagram.com/radiantwaves1" target="_blank"><img src="images/instagram.png" alt="Instagram"></a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><img src="images/tiktok.png" alt="TikTok"></a>
  <a href="https://youtube.com/@radiantwave-wv6rg" target="_blank"><img src="images/youtube.png" alt="YouTube"></a>
</div>

<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves Global News</p>
</footer>

<script>
fetch("news.json")
.then(res => res.json())
.then(articles => {

  const trending = document.getElementById("trending");

    news.innerHTML = '';
    trending.innerHTML = '';

      articleDiv.className='article';

      const h3 = document.createElement('h3');
      const link = document.createElement('a');
      link.href = `article.html?id=${i}`;
      link.innerHTML = (a.live?'<span class="live">LIVE</span
