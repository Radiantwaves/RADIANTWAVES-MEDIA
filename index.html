<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="RadiantWaves Media - Gateway to World News, connecting you to the world">
<meta name="theme-color" content="#1e3a5f">
<title>RadiantWaves Media | Gateway to World News</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Your CSS goes here, same as current repository */
</style>
</head>
<body><!-- Breaking News Ticker --><div class="breaking-ticker">
  <div class="ticker-wrapper">
    <span class="ticker-label">Breaking</span>
    <div class="ticker-content">
      <div class="ticker-marquee" id="breaking-news">
        Loading global headlines...
      </div>
    </div>
  </div>
</div><!-- Header --><header class="header">
<!-- Header content same as repository -->
</header><!-- Main Content --><main class="main">
  <!-- Hero Section -->
  <!-- Use existing hero layout -->
</main><!-- Audio News --><audio id="news-audio" src="news-music.mp3" autoplay loop></audio>

<script>
// API Key & URLs
const gnewsApiKey = '10618a434f80cc4ffe52717ea1bf2401';
const gnewsUrl = `https://gnews.io/api/v4/top-headlines?lang=en&max=10&token=${gnewsApiKey}`;

// Load local JSON
async function loadLocalNews() {
  const res = await fetch('news.json');
  const data = await res.json();
  return data;
}

// Load API news
async function loadApiNews() {
  try {
    const res = await fetch(gnewsUrl);
    if(!res.ok) throw new Error('API fetch failed');
    const json = await res.json();
    return json.articles.map(article => ({
      title: article.title,
      summary: article.description || '',
      image: article.image || '',
      source: article.source.name,
      category: 'World',
      subcategory: 'Global'
    }));
  } catch(e) {
    console.warn('GNews API failed, using local only');
    return [];
  }
}

// Merge & display ticker
async function displayBreakingNews() {
  const localNews = await loadLocalNews();
  const apiNews = await loadApiNews();
  const allNews = [...apiNews, ...localNews];
  const uniqueTitles = new Set();
  const tickerContainer = document.getElementById('breaking-news');
  tickerContainer.innerHTML = '';
  allNews.forEach(news => {
    if(!uniqueTitles.has(news.title) && tickerContainer.children.length < 12){
      uniqueTitles.add(news.title);
      const span = document.createElement('span');
      span.className = 'ticker-item';
      span.textContent = `[${news.category}] ${news.title}`;
      tickerContainer.appendChild(span);
    }
  });
}

displayBreakingNews();

// Mobile menu toggle
function toggleMenu(){
  document.getElementById('navList').classList.toggle('show');
}

// Display current date
document.getElementById('current-date').textContent = new Date().toDateString();
</script></body>
</html>
