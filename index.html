<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves Global News</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HEADER */

header{
background:white;
text-align:center;
padding:20px;
border-bottom:3px solid #c40000;
}

header img{
width:140px;
}

h1{
color:#c40000;
margin:10px 0;
}

.slogan{
color:#333;
font-size:16px;
}

/* BREAKING */

.breaking{
background:#c40000;
color:white;
padding:10px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

/* NAV */

nav{
background:#111;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ffcc00;
}

/* NEWS AREA */

#news{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */

.news-card{
background:white;
margin-bottom:20px;
padding:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:5px;
margin-bottom:10px;
}

.news-card h3{
color:#c40000;
}

.news-card p{
color:#333;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

.social img{
width:32px;
margin:10px;
}

</style>

</head>

<body>

<header>

<img src="icon-512.png">

<h1>RadiantWaves</h1>

<p class="slogan">Gateway to World News</p>

<audio controls autoplay loop>
<source src="audio/news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking" id="breaking">
Loading breaking news...
</div>

<nav>

<a href="index.html">Home</a>
<a href="world.html">World</a>
<a href="politics.html">Politics</a>
<a href="business.html">Business</a>
<a href="technology.html">Technology</a>
<a href="sports.html">Sports</a>
<a href="entertainment.html">Entertainment</a>

</nav>

<div id="news"></div>

<footer>

<p>© 2026 RadiantWaves Global News</p>

<p>Truth • Insight • Global Perspective</p>

<div class="social">

<a href="#"><img src="social/facebook.png"></a>
<a href="#"><img src="social/instagram.png"></a>
<a href="#"><img src="social/twitter.png"></a>
<a href="#"><img src="social/tiktok.png"></a>

</div>

</footer>

<script>

fetch("news.json")

.then(response => response.json())

.then(data => {

let container = document.getElementById("news");

data.articles.forEach(article => {

container.innerHTML += `

<div class="news-card">

<img src="${article.image}">

<h3>${article.title}</h3>

<p>${article.story}</p>

</div>

`;

});

document.getElementById("breaking").innerHTML = data.articles[0].title;

})

.catch(error => {

document.getElementById("breaking").innerHTML = "RadiantWaves Global News Update";

});

</script>

</body>
</html>
