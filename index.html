<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves News</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c00;
color:white;
text-align:center;
padding:15px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 16px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
background:#c00;
}

.breaking{
background:black;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
padding:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:6px;
}

.card h3{
margin:10px 0;
}

.time{
color:gray;
font-size:13px;
margin-bottom:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:30px;
margin:10px;
background:white;
padding:6px;
border-radius:6px;
}

audio{
margin-top:10px;
}

</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span>
🔴 Macron Calls for Middle East De-escalation |
🔴 Global Oil Prices Surge |
🔴 Nigeria Reviews Economic Policy |
🔴 US Raises Security Alert Worldwide
</span>
</div>

<nav>

<button onclick="loadAll()">Home</button>
<button onclick="loadNigeria()">Naija Pulse</button>
<button onclick="loadCategory('world')">World</button>
<button onclick="loadCategory('business')">Business</button>
<button onclick="loadCategory('technology')">Technology</button>
<button onclick="loadCategory('sports')">Sports</button>

</nav>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="https://instagram.com/radiantwaves1">
<img src="instagram.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia">
<img src="tiktok.png">
</a>

<a href="https://facebook.com/radiantwavesnews">
<img src="facebook.png">
</a>

<a href="https://twitter.com/radiantwaves13528995">
<img src="twitter.png">
</a>

</div>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

const API="https://gnews.io/api/v4/top-headlines?apikey=10618a434f80cc4ffe52717ea1bf2401&lang=en&max=10"

function showNews(articles){

let output=""

articles.forEach(article=>{

output+=`

<div class="card">

<img src="${article.image || 'https://picsum.photos/600/300'}">

<h3>${article.title}</h3>

<div class="time">
${new Date(article.publishedAt).toLocaleString()}
</div>

<p>${article.description || ""}</p>

<a href="${article.url}" target="_blank">Read Full Story</a>

</div>

`

})

document.getElementById("news").innerHTML=output

}

function loadAll(){

fetch(API)
.then(res=>res.json())
.then(data=>showNews(data.articles))

}

function loadCategory(cat){

fetch(API+"&topic="+cat)
.then(res=>res.json())
.then(data=>showNews(data.articles))

}

function loadNigeria(){

fetch("https://gnews.io/api/v4/search?q=Nigeria&apikey=10618a434f80cc4ffe52717ea1bf2401&lang=en&max=10")
.then(res=>res.json())
.then(data=>showNews(data.articles))

}

loadAll()

</script>

</body>
</html>
