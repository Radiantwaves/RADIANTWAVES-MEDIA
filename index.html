<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
.topbar {
  background:#cc0000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { display:flex; align-items:center; gap:10px; }
.logo img { height:40px; }

.slogan { font-size:12px; }

.topbar a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero { position:relative; height:300px; overflow:hidden; }
#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-text {
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  text-shadow:2px 2px 6px black;
}

/* BREAKING */
.breaking {
  background:black;
  color:yellow;
  padding:10px;
  font-weight:bold;
}

/* CONTENT */
.container { padding:20px; }

.featured img { width:100%; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
}

.card img { width:100%; }

/* SOCIAL */
.social {
  text-align:center;
  padding:20px;
  background:white;
}

.social a {
  margin:10px;
  font-size:25px;
  color:#111;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.png">
    <div>
      <strong>RadiantWavesMedia</strong><br>
      <span class="slogan">Gateway to World News — Connecting You to the World</span>
    </div>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">World</a>
    <a href="#">Politics</a>
    <a href="#">Business</a>
  </nav>
</header>

<section class="hero">
  <video autoplay muted loop id="bgVideo">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="hero-text">
    <h2 id="hero-title"></h2>
  </div>
</section>

<div class="breaking">
  🔴 LIVE: <span id="breaking-text"></span>
</div>

<div class="container">
  <div id="featured"></div>
  <div class="grid" id="grid-news"></div>
</div>

<div class="social">
  <a href="https://facebook.com/Radiantwavesnews" target="_blank"><i class="fab fa-facebook"></i></a>
  <a href="https://twitter.com/radiant13528995" target="_blank"><i class="fab fa-x-twitter"></i></a>
  <a href="https://youtube.com/@radiantwave=wv6j" target="_blank"><i class="fab fa-youtube"></i></a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<footer>
  © 2026 RadiantWavesMedia<br>
  Connecting You Deeper to the World's Most Important Stories
</footer>

<script>
async function loadNews() {
  const res = await fetch("news.json");
  const data = await res.json();

  const articles = data.articles;
  const breaking = data.breaking;

  // HERO + FEATURED
  document.getElementById("hero-title").textContent = articles[0].title;

  document.getElementById("featured").innerHTML = `
    <h2>${articles[0].title}</h2>
    <img src="${articles[0].image}">
    <p>${articles[0].description || ""}</p>
  `;

  // GRID
  const grid = document.getElementById("grid-news");
  grid.innerHTML = "";

  articles.slice(1).forEach(a => {
    grid.innerHTML += `
      <div class="card">
        <img src="${a.image}">
        <h4>${a.title}</h4>
        <small>${a.category}</small>
      </div>
    `;
  });

  // BREAKING ROTATION
  let i = 0;
  function rotate() {
    document.getElementById("breaking-text").textContent = breaking[i];
    i = (i + 1) % breaking.length;
  }

  rotate();
  setInterval(rotate, 4000);
}

loadNews();
</script>

</body>
</html>
