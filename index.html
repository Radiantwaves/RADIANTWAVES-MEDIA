<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Media | Gateway to World News</title>
<meta name="description" content="RadiantWaves Media - Gateway to your world news, connecting you to the world">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Open Sans',sans-serif; margin:0; background:#f7fafc; color:#1a202c;}
.header, .footer {background:#1e3a5f; color:white;}
.header-main, .footer-content {max-width:1400px; margin:auto; padding:20px;}
.header-main {display:flex; justify-content:space-between; align-items:center;}
.logo-text h1 {font-family:'Merriweather',serif; margin:0;}
.logo-text p {margin:0; font-size:0.9rem; opacity:0.8;}
.breaking-ticker {background:#c53030; color:white; padding:10px; overflow:hidden; white-space:nowrap;}
.ticker-item {display:inline-block; padding-right:50px;}
.ticker-marquee {display:inline-block; animation:marquee 20s linear infinite;}
@keyframes marquee {0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.hero {position:relative; margin:20px auto; max-width:1400px;}
.hero img {width:100%; border-radius:10px;}
audio {width:100%; margin:10px 0;}
footer {padding:40px 20px;}
.social-links img {width:32px; margin-right:10px;}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-main">
    <div class="logo">
      <img src="main-story.jpg" alt="RadiantWaves Logo" style="width:80px; border-radius:10px;">
      <div class="logo-text">
        <h1>RadiantWaves</h1>
        <p>Gateway to World News, connecting you to the World</p>
      </div>
    </div>
  </div>
</header>

<!-- Breaking News -->
<div class="breaking-ticker">
  <div class="ticker-marquee">
    <span class="ticker-item">Global headlines updating soon...</span>
  </div>
</div>

<!-- Hero Section with Music -->
<main class="hero">
  <img src="main-story.jpg" alt="Main Story Image">
  <audio controls loop>
    <source src="news-music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</main>

<!-- Footer -->
<footer>
  <div class="footer-content">
    <div>
      <h3>About RadiantWaves</h3>
      <p>Truth. Insight. Global Perspective.</p>
    </div>
    <div>
      <h3>Follow Us</h3>
      <div class="social-links">
        <a href="#"><img src="facebook.png" alt="Facebook"></a>
        <a href="#"><img src="instagram.png" alt="Instagram"></a>
      </div>
    </div>
  </div>
  <div style="text-align:center; margin-top:20px;">
    &copy; 2026 RadiantWaves News Network
  </div>
</footer>

</body>
</html>
