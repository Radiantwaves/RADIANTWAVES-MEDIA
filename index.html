<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global News Network</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f4f4;
}

/* HEADER */
header{
  background:#b30000;
  color:white;
  padding:15px;
  font-size:24px;
  font-weight:bold;
  text-align:center;
}

/* NAVIGATION */
nav{
  background:#111;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
nav a{
  color:white;
  padding:12px 18px;
  text-decoration:none;
  cursor:pointer;
}
nav a:hover{
  background:#b30000;
}

/* BREAKING */
.breaking{
  background:#ff0000;
  color:white;
  padding:8px;
  overflow:hidden;
  white-space:nowrap;
}
.breaking span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 20s linear infinite;
}
@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* MAIN STORY */
.main{
  padding:20px;
  background:white;
  margin:15px;
}
.main img{
  width:100%;
  max-height:400px;
  object-fit:cover;
}
.main h2{
  margin-top:10px;
}
.time{
  color:gray;
  font-size:14px;
}

/* NEWS GRID */
.news-container{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.02);
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card h3{
  margin:10px 0 5px 0;
}

/* DETAILS MODAL */
#details{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  overflow:auto;
}
.details-content{
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
  max-width:800px;
}
.details-content img{
  width:100%;
}
.close{
  float:right;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
}

/* SOCIAL */
.social{
  text-align:center;
  padding:20px;
}
.social img{
  width:40px;
  margin:0 10px;
}
</style>
</head>

<body>

<header>Global News Network</header>

<div class="breaking">
  <span id="breakingNews">Loading breaking news...</span>
</div>

<nav>
  <a onclick="filterNews('All')">Home</a>
  <a onclick="filterNews('Nigeria')">Nigeria</a>
  <a onclick="filterNews('Europe')">Europe</a>
  <a onclick="filterNews('America')">America</a>
  <a onclick="filterNews('Asia')">Asia</a>
  <a onclick="filterNews('World')">World</a>
  <a onclick="filterNews('Sports')">Sports</a>
  <a onclick="filterNews('Technology')">Technology</a>
  <a onclick="filterNews('Health')">Health</a>
</nav>

<div class="main" id="mainStory"></div>

<div class="news-container" id="newsContainer"></div>

<div id="details">
  <div class="details-content">
    <span class="close" onclick="closeDetails()">X</span>
    <div id="detailsContent"></div>
  </div>
</div>

<div class="social" id="socialLinks"></div>

<script>
let allNews=[];

fetch("news.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{

  // BREAKING NEWS
  let breakingText="";
  data.breaking.forEach(item=>{
    breakingText += " 🔴 " + item.title + " ("+item.time+")  | ";
  });
  document.getElementById("breakingNews").innerText = breakingText;

  // MAIN STORY
  document.getElementById("mainStory").innerHTML = `
    <img src="${data.main.image}">
    <h2>${data.main.title}</h2>
    <p class="time">${data.main.time}</p>
    <p>${data.main.summary}</p>
  `;

  allNews = data.news;

  displayNews("All");

  // SOCIAL
  let socialHTML="";
  data.social.forEach(s=>{
    socialHTML += `<a href="${s.link}" target="_blank">
                    <img src="${s.image}">
                   </a>`;
  });
  document.getElementById("socialLinks").innerHTML=socialHTML;
});

function displayNews(category){
  const container=document.getElementById("newsContainer");
  container.innerHTML="";

  let filtered = category==="All" ? allNews :
      allNews.filter(n=>n.category===category);

  if(filtered.length===0){
    container.innerHTML="<p>No news available.</p>";
    return;
  }

  filtered.forEach(news=>{
    container.innerHTML += `
      <div class="card" onclick='openDetails(${JSON.stringify(news)})'>
        <img src="${news.image}">
        <h3>${news.title}</h3>
        <p class="time">${news.time}</p>
        <p>${news.summary}</p>
      </div>
    `;
  });
}

function filterNews(category){
  displayNews(category);
}

function openDetails(news){
  document.getElementById("details").style.display="block";
  document.getElementById("detailsContent").innerHTML=`
    <h2>${news.title}</h2>
    <p class="time">${news.time}</p>
    <img src="${news.image}">
    <p>${news.content}</p>
  `;
}

function closeDetails(){
  document.getElementById("details").style.display="none";
}
</script>

</body>
</html>
