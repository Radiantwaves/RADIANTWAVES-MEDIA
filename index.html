<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves News Network</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

header img{
width:120px;
}

h1{
margin:10px 0;
font-size:34px;
}

.slogan{
color:#cfe8ff;
font-size:18px;
}

/* BREAKING NEWS */

.breaking{
background:#0d47a1;
color:white;
padding:10px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 22s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* NAVIGATION */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

/* NEWS SECTION */

#news{
max-width:900px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

.social img{
width:35px;
margin:8px;
}

</style>

</head>

<body>

<header>

<img src="images/icon-512.png">

<h1>RadiantWaves</h1>

<p class="slogan">
Gateway to World News – Connecting You to the World
</p>

</header>

<div class="breaking">
<span id="breaking-news">Loading global headlines...</span>
</div>

<nav>

<a href="index.html">Home</a>
<a href="world.html">World</a>
<a href="politics.html">Politics</a>
<a href="business.html">Business</a>
<a href="technology.html">Technology</a>
<a href="science.html">Science</a>
<a href="sports.html">Sports</a>
<a href="entertainment.html">Entertainment</a>

</nav>

<div id="news"></div>

<footer>

<p>© 2026 RadiantWaves News Network</p>
<p>Truth • Insight • Global Perspective</p>

<div class="social">

<a href="https://facebook.com/radiantwavesnews" target="_blank">
<img src="images/facebook.png">
</a>

<a href="https://instagram.com/radiantwaves1" target="_blank">
<img src="images/instagram.png">
</a>

<a href="https://twitter.com/radiant13528995" target="_blank">
<img src="images/twitter.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia" target="_blank">
<img src="images/tiktok.png">
</a>

</div>

</footer>

<script>

/* API KEY */

const apiKey = "10618a434f80cc4ffe52717ea1bf2401";

/* LOAD LIVE NEWS */

fetch(`https://newsapi.org/v2/top-headlines?language=en&pageSize=10&apiKey=${apiKey}`)
.then(res => res.json())
.then(data => {

let container = document.getElementById("news");
let breaking = document.getElementById("breaking-news");

let headlines = [];

data.articles.forEach(article => {

if(article.urlToImage){

container.innerHTML += `

<div class="news-card">

<img src="${article.urlToImage}">

<h3>${article.title}</h3>

<p>${article.description || "Click to read more about this story."}</p>

</div>

`;

headlines.push(article.title);

}

});

breaking.innerHTML = headlines.join(" • ");

})

.catch(error => {

/* FALLBACK TO LOCAL NEWS */

fetch("news.json")
.then(res => res.json())
.then(data => {

let container = document.getElementById("news");
let breaking = document.getElementById("breaking-news");

let headlines = [];

data.articles.forEach(article => {

container.innerHTML += `

<div class="news-card">

<img src="${article.image}">

<h3>${article.title}</h3>

<p>${article.story}</p>

</div>

`;

headlines.push(article.title);

});

breaking.innerHTML = headlines.join(" • ");

});

});

</script>

</body>

</html>
