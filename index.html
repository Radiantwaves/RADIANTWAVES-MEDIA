<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>
<link rel="manifest" href="manifest.json">
<style>
body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#111; color:white; }
header{ background:#000; padding:15px; text-align:center; font-size:28px; font-weight:bold; color:#00ffcc; }
#liveDateTime{ text-align:center; padding:8px; background:#222; color:#00ffcc; font-size:14px; pointer-events:none;}
#breaking{ background:red; padding:8px; overflow:hidden; white-space:nowrap; pointer-events:none;}
#breakingContent{ display:inline-block; padding-left:100%; animation:scroll 25s linear infinite;}
@keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
.main{ padding:20px; text-align:center; }
.main img{ width:100%; max-height:350px; object-fit:cover; }
.main h2{ color:#00ffcc; margin:10px 0; }
.tabs{ display:flex; overflow-x:auto; gap:10px; padding:10px 15px; background:#222; }
.tabs button{ flex-shrink:0; padding:8px 15px; border:none; background:#333; color:#00ffcc; border-radius:5px; cursor:pointer; transition:0.2s; white-space:nowrap; }
.tabs button.active, .tabs button:hover{ background:#00ffcc; color:#000; }
.headline-row{ display:flex; overflow-x:auto; gap:15px; scroll-behavior:smooth; padding:10px 0; }
.headline-row a{ flex-shrink:0; color:#00ffcc; text-decoration:none; font-weight:bold; padding:5px 10px; background:#222; border-radius:5px; transition:0.2s; white-space:nowrap; }
.headline-row a:hover{ background:#333; color:#fff; }
.social{ text-align:center; padding:15px; background:#000; }
.social img{ width:28px; margin:0 10px; }
footer{ text-align:center; padding:10px; background:#000; font-size:12px; }
.toast{ position:fixed; bottom:10px; left:50%; transform:translateX(-50%); background:#00ffcc; color:#000; padding:10px 20px; border-radius:5px; display:none; z-index:2000; font-weight:bold;}
</style>
</head>
<body>

<header>Radiant Waves Media</header>
<div id="liveDateTime"></div>
<div id="breaking"><span id="breakingContent">Loading breaking news...</span></div>

<div class="main">
  <img id="mainImage" src="main-story.jpg">
  <h2 id="mainTitle">Loading headline...</h2>
  <p id="mainSummary"></p>
</div>

<!-- Tabs for sections -->
<div class="tabs" id="tabsContainer"></div>

<!-- Headline row container -->
<div id="headlineContainer"></div>

<div class="toast" id="toast"></div>

<div class="social">
  <a href="#"><img src="facebook.png"></a>
  <a href="#"><img src="twitter.png"></a>
  <a href="#"><img src="Instagram.png"></a>
  <a href="#"><img src="tiktok.png" style="background:white;padding:4px;border-radius:6px;"></a>
</div>

<footer>© 2026 Radiant Waves Media</footer>
<audio id="bgMusic" src="news-music.mp3" loop></audio>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // LIVE CLOCK
  function updateClock(){
    const now = new Date();
    const options={ weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("liveDateTime").innerHTML=
      now.toLocaleDateString(undefined, options) + " | " + now.toLocaleTimeString();
  }
  setInterval(updateClock,1000); updateClock();

  const tabsContainer = document.getElementById("tabsContainer");
  const headlineContainer = document.getElementById("headlineContainer");

  fetch("news.json").then(r=>r.json()).then(data=>{
    const sections = ["nigeria","europe","america","africa","asia","politics","business","sport","music","movies"];
    const sectionNames = {
      nigeria:"Nigeria", europe:"Europe", america:"America", africa:"Africa", asia:"Asia",
      politics:"Politics", business:"Business", sport:"Sport", music:"Music", movies:"Movies"
    };

    // CREATE TABS
    sections.forEach((section,i)=>{
      const btn = document.createElement("button");
      btn.innerText = sectionNames[section];
      if(i===0) btn.classList.add("active"); // first tab active
      btn.addEventListener("click", function(){
        document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
        this.classList.add("active");
        renderHeadlines(section);
      });
      tabsContainer.appendChild(btn);
    });

    // MAIN STORY ROTATION
    let mainIndex = 0;
    const toast = document.getElementById("toast");
    function rotateMain(){
      const story = data.main[mainIndex];
      document.getElementById("mainTitle").innerText = story.title;
      document.getElementById("mainSummary").innerText = story.summary;
      document.getElementById("mainImage").src = story.image;

      toast.innerText = "Breaking: " + story.title;
      toast.style.display = "block";
      setTimeout(()=>{ toast.style.display="none"; }, 3500);

      mainIndex = (mainIndex + 1) % data.main.length;
    }
    rotateMain(); setInterval(rotateMain,8000);

    // BREAKING NEWS TICKER
    document.getElementById("breakingContent").innerText =
      data.breaking.map(item=>item.title).join(" ⚡ ");

    // RENDER HEADLINES FUNCTION
    function renderHeadlines(section){
      headlineContainer.innerHTML = "";
      const row = document.createElement("div");
      row.className = "headline-row";

      data[section].forEach(item=>{
        const a = document.createElement("a");
        a.href="#";
        a.innerText = item.title;
        a.dataset.title = item.title;
        a.dataset.summary = item.summary;
        a.dataset.image = item.image || "main-story.jpg";

        a.addEventListener("click", function(e){
          e.preventDefault();
          document.getElementById("mainTitle").innerText = this.dataset.title;
          document.getElementById("mainSummary").innerText = this.dataset.summary;
          document.getElementById("mainImage").src = this.dataset.image;
          window.scrollTo({top:0, behavior:"smooth"});
        });

        row.appendChild(a);
      });

      headlineContainer.appendChild(row);
    }

    // INITIAL RENDER: first section
    renderHeadlines(sections[0]);

  });

  // MUSIC TOGGLE
  window.toggleMusic=function(){
    const music=document.getElementById("bgMusic");
    if(music.paused){ music.play(); } else { music.pause(); }
  }

  // SERVICE WORKER
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js").then(()=>console.log("Service Worker Registered"));
  }

});
</script>
</body>
</html>
