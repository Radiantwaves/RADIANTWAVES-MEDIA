<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:#0b3d91;color:white;padding:20px;text-align:center;}
header h1{margin:0;}
header p{margin:5px;font-size:14px;font-weight:bold;}
nav{background:#111;display:flex;flex-wrap:wrap;align-items:center;}
nav button{background:none;border:none;color:white;padding:12px 16px;cursor:pointer;}
nav button:hover{background:#0b3d91;}
.search{margin-left:auto;padding:8px;}
.search input{padding:6px;width:220px;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 60s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.container{padding:20px;}
.card{background:white;margin-bottom:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.card img{width:100%;height:230px;object-fit:cover;}
.content{padding:15px;}
.details{display:none;margin-top:10px;line-height:1.7;}
button.read-more{background:#0b3d91;color:white;border:none;padding:6px 10px;margin-top:8px;cursor:pointer;border-radius:3px;}
footer{background:#111;color:white;padding:25px;text-align:center;}
.social a img{width:28px;margin:8px;}
audio{width:100%;margin-top:10px;}
</style>
</head>

<h1>Radiant Waves Global News</h1>
<p>Gateway to World News – Connecting You to the World</p>
</header><audio controls autoplay loop>
