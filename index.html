<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves News Network</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

header img{
width:150px;
border-radius:5px;
}

h1{
margin:10px 0;
font-size:36px;
}

.slogan{
font-size:18px;
opacity:0.9;
}

/* MUSIC */

audio{
margin-top:15px;
width:260px;
}

/* BREAKING NEWS */

.breaking{
background:red;
color:white;
padding:10px;
font-weight:bold;
}

/* NAVIGATION */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
font-size:16px;
}

/* NEWS */

#news{
max-width:900px;
margin:auto;
padding:20px;
}

.news-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#08364b;
color:white;
text-align:center;
padding:25px;
}

.social img{
width:35px;
margin:8px;
}

</style>

</head>

<body>

<header>

<img src="main-story.jpg">

<h1>RadiantWaves</h1>

<p class="slogan">
Gateway to World News, connecting you to the World
</p>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking" id="breaking">
RadiantWaves Global News Update
</div>

<nav>

<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Politics</a>
<a href="#">Business</a>
<a href="#">Technology</a>
<a href="#">Sports</a>

</nav>

<div id="news">

</div>

<footer>

<p>© 2026 RadiantWaves News Network</p>

<p>Truth. Insight. Global Perspective</p>

<div class="social">

<img src="facebook.png">
<img src="instagram.png">
<img src="twitter.png">
<img src="tiktok.png">

</div>

</footer>

<script>

/* LOAD NEWS FROM JSON */

fetch("news.json")
.then(response => response.json())
.then(data => {

let newsContainer = document.getElementById("news");

data.articles.forEach(article => {

newsContainer.innerHTML += `

<div class="news-card">

<img src="${article.image}">

<h3>${article.title}</h3>

<p>${article.summary}</p>

</div>

`;

});

/* BREAKING NEWS */

let breaking = document.getElementById("breaking");

if(data.articles.length > 0){

breaking.innerHTML = data.articles[0].title;

}

});

</script>

</body>
</html>
