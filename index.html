<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
.topbar {
  background:#cc0000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { display:flex; align-items:center; gap:10px; }
.logo img { height:40px; }

.slogan { font-size:12px; }

.topbar a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero { position:relative; height:300px; overflow:hidden; }

#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-text {
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  text-shadow:2px 2px 6px black;
}

/* BREAKING */
.breaking {
  background:black;
  color:yellow;
  padding:10px;
  font-weight:bold;
}

/* SECTION BLOCKS */
.section {
  padding:20px;
}

.section h2 {
  border-bottom:3px solid #cc0000;
  padding-bottom:5px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
}

.card img { width:100%; }

/* SOCIAL */
.social {
  text-align:center;
  padding:20px;
  background:white;
}

.social a {
  margin:10px;
  font-size:25px;
  color:#111;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.png">
    <div>
      <strong>RadiantWavesMedia</strong><br>
      <span class="slogan">Gateway to World News — Connecting You to the World</span>
    </div>
  </div>

  <nav>
    <a onclick="filterNews('All')">Home</a>
    <a onclick="filterNews('World')">World</a>
    <a onclick="filterNews('Politics')">Politics</a>
    <a onclick="filterNews('Business')">Business</a>
    <a onclick="filterNews('Technology')">Tech</a>
  </nav>
</header>

<section class="hero">
  <video autoplay muted loop id="bgVideo">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="hero-text">
    <h2 id="hero-title"></h2>
  </div>
</section>

<div class="breaking">
  🔴 LIVE: <span id="breaking-text"></span>
</div>

<!-- MAIN FEATURE -->
<div class="section">
  <div id="featured"></div>
</div>

<!-- CATEGORY SECTIONS -->
<div class="section">
  <h2>World</h2>
  <div class="grid" id="world-news"></div>
</div>

<div class="section">
  <h2>Politics</h2>
  <div class="grid" id="politics-news"></div>
</div>

<div class="section">
  <h2>Business</h2>
  <div class="grid" id="business-news"></div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="https://facebook.com/Radiantwavesnews" target="_blank"><i class="fab fa-facebook"></i></a>
  <a href="https://twitter.com/radiant13528995" target="_blank"><i class="fab fa-x-twitter"></i></a>
  <a href="https://youtube.com/@radiantwave=wv6j" target="_blank"><i class="fab fa-youtube"></i></a>
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<footer>
  © 2026 RadiantWavesMedia<br>
  Connecting You Deeper to the World's Most Important Stories
</footer>

<script>
let allArticles = [];

async function loadNews() {
  const res = await fetch("news.json?v=" + new Date().getTime());
  const data = await res.json();

  allArticles = data.articles;

  setupBreaking(data.breaking);
  renderFeatured(allArticles[0]);
  renderAllCategories();
}

/* 🔴 BREAKING ROTATION */
function setupBreaking(breaking) {
  let i = 0;

  function rotate() {
    document.getElementById("breaking-text").textContent = breaking[i];
    i = (i + 1) % breaking.length;
  }

  rotate();
  setInterval(rotate, 4000);
}

/* ⭐ FEATURED */
function renderFeatured(article) {
  document.getElementById("hero-title").textContent = article.title;

  document.getElementById("featured").innerHTML = `
    <h2>${article.title}</h2>
    <img src="${article.image}">
    <p>${article.description || ""}</p>
  `;
}

/* 🌍 AUTO CREATE SECTIONS */
function renderAllCategories() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  // Get unique categories
  const categories = [...new Set(allArticles.map(a => a.category))];

  categories.forEach(category => {
    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `
      <h2>${category}</h2>
      <div class="grid" id="section-${category}"></div>
    `;

    container.appendChild(section);

    const grid = document.getElementById(`section-${category}`);

    allArticles
      .filter(a => a.category === category)
      .slice(0, 4)
      .forEach(a => {
        grid.innerHTML += `
          <div class="card">
            <img src="${a.image}">
            <h4>${a.title}</h4>
          </div>
        `;
      });
  });
}

loadNews();
</script>

</body>
</html>
