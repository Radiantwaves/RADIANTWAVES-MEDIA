<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:#0b3d91;color:white;padding:20px;text-align:center;}
header h1{margin:0;}
header p{margin:5px;font-size:14px;font-weight:bold;}
nav{background:#111;display:flex;flex-wrap:wrap;align-items:center;}
nav button{background:none;border:none;color:white;padding:12px 16px;cursor:pointer;}
nav button:hover{background:#0b3d91;}
.search{margin-left:auto;padding:8px;}
.search input{padding:6px;width:200px;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 60s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.container{padding:20px;}
.card{background:white;margin-bottom:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.card img{width:100%;height:230px;object-fit:cover;}
.content{padding:15px;}
.details{display:none;margin-top:10px;line-height:1.7;}
button.read-more{background:#0b3d91;color:white;border:none;padding:6px 10px;margin-top:8px;cursor:pointer;border-radius:3px;}
footer{background:#111;color:white;padding:25px;text-align:center;}
.social a img{width:28px;margin:8px;}
audio{width:100%;margin-top:10px;}
</style>
</head>
<body>

<header>
<h1>Radiant Waves Global News</h1>
<p>Gateway to World News – Connecting You to the World</p>
</header>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<div class="breaking">
<span id="ticker"></span>
</div>

<nav>
<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Tech')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>
<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div>
</nav>

<div class="container" id="news"></div>

<footer>
<div class="social">
<a href="https://instagram.com/radiantwaves1"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a href="https://tiktok.com/@radiantwavesmedia"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
<a href="https://facebook.com/radiantwavesnews"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
<a href="https://twitter.com/radiantwaves13528995"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>
</div>
<br>@2026 Radiant Waves
</footer>

<script>

// Breaking news
const breakingNews = [
"Nigeria expands electricity meter rollout nationwide",
"Student loan programme begins monthly disbursement",
"Middle East tensions escalate after infrastructure strikes",
"AI technology transforming healthcare systems globally",
"Global fuel prices continue to fluctuate amid supply concerns"
];

document.getElementById("ticker").innerText = breakingNews.join(" • ");

// News array with categories
const news = [
{
title:"Peter Obi Calls for Electoral Reform",
category:"Naija",
image:"https://picsum.photos/800/500?obi",
summary:"Calls for transparent elections.",
details:"Peter Obi emphasizes credible and transparent elections across Nigeria. Advocates reforms for stronger democratic institutions.",
author:"Editor: Omotara How",source:"Local News"
},
{
title:"President Tinubu Rolls Out Electricity Meters",
category:"Naija",
image:"https://picsum.photos/800/500?tinubu",
summary:"Nationwide electricity meters distributed to households.",
details:"The Tinubu administration initiates electricity meter rollouts zone by zone, improving billing accuracy and reducing power theft.",
author:"Editor: Omotara How",source:"Energy Nigeria"
},
{
title:"Middle East Tensions Escalate",
category:"World",
image:"https://picsum.photos/800/500?middleeast",
summary:"Global leaders call for calm.",
details:"Countries across Europe, Asia, and the Americas monitor conflicts closely, urging restraint to avoid escalation.",
author:"Editor: Omotara How",source:"Global Times"
},
{
title:"AI Revolutionizes Healthcare",
category:"Tech",
image:"https://picsum.photos/800/500?ai",
summary:"Hospitals adopt AI diagnostics.",
details:"Artificial intelligence algorithms improve detection of diseases, transforming hospital operations worldwide.",
author:"Editor: Omotara How",source:"Tech Journal"
},
{
title:"Champions League Quarter-Finals Draw Announced",
category:"Sports",
image:"https://picsum.photos/800/500?football",
summary:"European clubs learn opponents.",
details:"Teams prepare for upcoming quarter-finals with focus on tactics and player fitness.",
author:"Editor: Omotara How",source:"UEFA News"
},
{
title:"France Prepares for Presidential Election",
category:"Election",
image:"https://picsum.photos/800/500?france-election",
summary:"Campaigns intensify ahead of Sunday poll.",
details:"French citizens stay informed about candidates, policies, and upcoming presidential elections.",
author:"Editor: Omotara How",source:"French Times"
}
// Add the remaining 50+ stories in the same format
];

// Current news array
let currentNews=[...news];

// Render news
function render(list){
let html="";
list.forEach((n,i)=>{
html+=`
<div class="card">
<img src="${n.image}">
<div class="content">
<h3>${n.title}</h3>
<p>${n.summary}</p>
<button class="read-more" onclick="toggle(${i})">Read Full Story</button>
<div class="details" id="d${i}">
<p>${n.details}</p>
<p><em>${n.author}</em> | <strong>Source:</strong> ${n.source}</p>
</div>
</div>
</div>`;
});
document.getElementById("news").innerHTML=html;
}

function toggle(i){
let d=document.getElementById("d"+i);
d.style.display=d.style.display==="block"?"none":"block";
}

function filterNews(cat){
if(cat==="all"){currentNews=[...news];}
else{currentNews=news.filter(n=>n.category===cat);}
render(currentNews);
}

function searchNews(){
let q=document.getElementById("search").value.toLowerCase();
let results=news.filter(n=>n.title.toLowerCase().includes(q));
render(results);
}

// Initial render
render(news);

</script>
</body>
</html>
