let current=[...news];

function render(list){

let html="";

list.forEach((n,i)=>{

html+=`
<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button class="read" onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">
<p>${n.details}</p>
<p><em>${n.author}</em> | Source: ${n.source}</p>
</div>

</div>
</div>
`;

});

document.getElementById("news").innerHTML=html;

}

function toggle(i){

let d=document.getElementById("d"+i);

d.style.display=d.style.display==="block"?"none":"block";

}

function filterNews(cat){

current=(cat==="all")?news:news.filter(n=>n.category===cat);

render(current);

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase();

let r=news.filter(n=>n.title.toLowerCase().includes(q));

render(r);

}

document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ");

render(news);
