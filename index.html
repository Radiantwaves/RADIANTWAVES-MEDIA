<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.title a { text-decoration: none; color: black; }
.slogan { color: #666; font-size: 14px; }

/* AUDIO */
.audio-player { margin-top: 10px; }

/* VIDEO BREAKING */
.breaking-video {
  position: relative;
  height: 140px;
  overflow: hidden;
}

.breaking-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.breaking-text {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 8px;
  white-space: nowrap;
  overflow: hidden;
}

.breaking-text span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 12px; text-decoration: none; cursor:pointer; }

/* LAYOUT */
.container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; padding: 20px; }
.main { flex: 3; min-width: 600px; }
.sidebar { flex: 1; padding-left: 20px; }

/* ARTICLES */
.article { background: white; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
.article img { width:100%; border-radius:4px; margin-bottom:10px; }
.article h3 a { text-decoration:none; color:black; }
.article h3 a:hover { color:#0047AB; }

.readmore { color:#0047AB; font-weight:bold; }

/* LIVE */
.live { background:red; color:white; font-size:10px; padding:3px 6px; border-radius:3px; }

/* TRENDING */
.sidebar a { display:block; margin:8px 0; text-decoration:none; }

/* SOCIAL */
.social { text-align:center; margin-top:20px; }
.social img { width:28px; margin:5px; }

/* WHATSAPP BUTTON */
#whatsappBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* FOOTER */
footer { background:#111; color:white; text-align:center; padding:20px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <a href="index.html"><img src="images/icon-512.png"></a>
  <div class="title"><a href="index.html">RadiantWaves</a></div>
  <div class="slogan">Gateway to World News</div>

  <div class="audio-player">
    <audio controls autoplay loop>
      <source src="news-music.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<!-- VIDEO BREAKING -->
<div class="breaking-video">
  <video id="bgVideo" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <div class="breaking-text">
    <span id="breakingNews">Loading...</span>
  </div>
</div>

<!-- NAV -->
<nav>
  <a data-category="All">Home</a>
  <a data-category="World">World</a>
  <a data-category="Politics">Politics</a>
  <a data-category="Business">Business</a>
  <a data-category="Technology">Technology</a>
  <a data-category="Science">Science</a>
  <a data-category="Sport">Sport</a>
  <a data-category="Entertainment">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>

  <div class="sidebar">
    <h3>Trending News</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="https://facebook.com/radiantwavesnews"><img src="images/facebook.png"></a>
  <a href="https://twitter.com/radiant13528995"><img src="images/twitter.png"></a>
  <a href="https://instagram.com/radiantwaves1"><img src="images/instagram.png"></a>
  <a href="https://tiktok.com/@radiantwavesmedia"><img src="images/tiktok.png"></a>
  <a href="https://youtube.com/@radiantwave-wv6rg"><img src="images/youtube.png"></a>
</div>

<!-- WHATSAPP -->
<a id="whatsappBtn" target="_blank">💬</a>

<!-- FOOTER -->
<footer>
  <p>© 2026 RadiantWaves Global News</p>
</footer>
