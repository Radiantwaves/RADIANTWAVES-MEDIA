<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RadiantWaves News Network</title>
  <link rel="icon" href="icon-192.png">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background-color:#fff; }
    header { padding:10px 20px; display:flex; align-items:center; background-color:#fff; }
    header img { height:60px; }
    header h1 { color:red; margin-left:10px; }
    header p { margin-left:20px; font-size:0.9em; color:#333; }
    nav { margin:10px 20px; }
    nav a { margin-right:15px; text-decoration:none; color:#000; font-weight:bold; }
    #breaking { background-color:#f00; color:#fff; padding:10px 20px; overflow:hidden; white-space:nowrap; }
    #news { margin:20px; display:flex; flex-direction:column; gap:20px; }
    .news-item img { max-width:100%; height:auto; margin-bottom:10px; }
    footer { background-color:#222; color:#fff; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .social-icons img { width:40px; height:40px; margin-left:10px; }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="RadiantWaves Logo">
  <h1>RadiantWaves</h1>
  <p>Truth. Insight. Global Perspective.</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">World</a>
  <a href="#">Politics</a>
  <a href="#">Business</a>
  <a href="#">Technology</a>
  <a href="#">Sports</a>
  <a href="#">Entertainment</a>
</nav>

<div id="breaking">
  Breaking News: <span id="breaking-news">Loading global headlines...</span>
</div>

<div id="news"></div>

<footer>
  <div>
    &copy; 2026 RadiantWaves News Network<br>
    About RadiantWaves
  </div>
  <div class="social-icons">
    <a href="#"><img src="facebook.png" alt="Facebook"></a>
    <a href="#"><img src="instagram.png" alt="Instagram"></a>
    <a href="#"><img src="tiktok.png" alt="TikTok"></a>
    <a href="#"><img src="twitter.png" alt="Twitter"></a>
  </div>
</footer>

<script>
  const newsContainer = document.getElementById('news');
  fetch('news.json')
    .then(response => response.json())
    .then(data => {
      if(data.length === 0) {
        newsContainer.innerHTML = '<p>No news available at this time.</p>';
      } else {
        data.forEach(article => {
          const div = document.createElement('div');
          div.classList.add('news-item');
          div.innerHTML = `
            <h3>${article.title}</h3>
            ${article.image ? `<img src="${article.image}" alt="${article.title}">` : ''}
            <p>${article.summary}</p>
          `;
          newsContainer.appendChild(div);
        });
      }
    })
    .catch(err => {
      newsContainer.innerHTML = '<p>Failed to load news.</p>';
      console.error(err);
    });

  // Example: breaking news rolling text
  const breakingNews = ['RadiantWaves Global News', 'Update: 12 March 2026 Olympics Highlights', 'UK dual passport citizens face challenges in France'];
  let index = 0;
  const breakingSpan = document.getElementById('breaking-news');
  setInterval(() => {
    breakingSpan.textContent = breakingNews[index];
    index = (index + 1) % breakingNews.length;
  }, 5000);
</script>

</body>
</html>
