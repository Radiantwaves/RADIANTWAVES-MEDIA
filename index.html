<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { height: 220px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: #0047AB; color: white; padding: 8px; }

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 10px; cursor: pointer; }

/* LAYOUT */
.container { max-width: 1100px; margin: auto; padding: 15px; }
.article { background: white; padding: 12px; margin-bottom: 15px; }

/* IMAGE */
.article img { width: 100%; height: 180px; object-fit: cover; }

/* BUTTON */
.readmore {
  display:inline-block;
  margin-top:8px;
  color:#0047AB;
  font-weight:bold;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/icon-512.png">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking" id="breakingNews">Loading breaking news...</div>

<!-- NAV -->
<nav>
  <a onclick="loadNews('All')">Home</a>
  <a onclick="loadNews('World')">World</a>
  <a onclick="loadNews('Politics')">Politics</a>
  <a onclick="loadNews('Business')">Business</a>
  <a onclick="loadNews('Technology')">Technology</a>
  <a onclick="loadNews('Science')">Science</a>
  <a onclick="loadNews('Sport')">Sport</a>
  <a onclick="loadNews('Entertainment')">Entertainment</a>
</nav>

<!-- NEWS -->
<div class="container" id="news"></div>

<script>
let allNews = [];

fetch("news.json")
.then(res => res.json())
.then(data => {
  allNews = data;
  loadNews("All");

  // breaking
  document.getElementById("breakingNews").innerText = data[0].title;
})
.catch(() => {
  document.getElementById("news").innerHTML = "❌ Failed to load news.json";
});

function loadNews(category) {
  const newsDiv = document.getElementById("news");
  newsDiv.innerHTML = "";

  const filtered = category === "All"
    ? allNews
    : allNews.filter(n => n.category === category);

  filtered.forEach((n, index) => {
    newsDiv.innerHTML += `
      <div class="article">
        ${n.image ? `<img src="${n.image}">` : ""}
        <h3>${n.title}</h3>
        <p>${n.summary}</p>
        <a class="readmore" href="article.html?id=${index}">Read more</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
