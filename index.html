<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:Arial; background:#f4f4f4; }

/* HEADER */
.topbar {
  background:#cc0000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img { height:40px; }

.slogan {
  font-size:12px;
  opacity:0.9;
}

.topbar a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  position:relative;
  height:300px;
  overflow:hidden;
}

#bgVideo {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-text {
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  text-shadow:2px 2px 6px black;
}

/* BREAKING */
.breaking {
  background:black;
  color:yellow;
  overflow:hidden;
  white-space:nowrap;
}

.ticker {
  display:inline-block;
  padding-left:100%;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* CONTENT */
.container { padding:20px; }

.featured img {
  width:100%;
  border-radius:6px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:6px;
}

.card img {
  width:100%;
  border-radius:6px;
}

/* VIDEO */
.video-section { padding:20px; }

/* SOCIAL */
.social {
  text-align:center;
  padding:20px;
  background:white;
}

.social a {
  margin:10px;
  font-size:25px;
  color:black;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.footer-slogan {
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <img src="logo.png">
    <div>
      <strong>RadiantWavesMedia</strong><br>
      <span class="slogan">Gateway to World News — Connecting You to the World</span>
    </div>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">World</a>
    <a href="#">Politics</a>
    <a href="#">Business</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop id="bgVideo">
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>
  <div class="hero-text">
    <h2 id="hero-title"></h2>
  </div>
</section>

<!-- BREAKING -->
<div class="breaking">
  <div class="ticker">
    🔴 LIVE: <span id="breaking-text"></span>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="featured" id="featured"></div>

  <div class="grid" id="grid-news"></div>

</div>

<!-- VIDEO -->
<section class="video-section">
  <h2>Featured Video</h2>
  <iframe width="100%" height="400" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</section>

<!-- SOCIAL MEDIA -->
<div class="social">
  <a href="https://facebook.com/radiantwaves" target="_blank">
    <i class="fab fa-facebook"></i>
  </a>
  <a href="https://twitter.com/radiantwaves" target="_blank">
    <i class="fab fa-x-twitter"></i>
  </a>
  <a href="https://youtube.com/@radiantwaves" target="_blank">
    <i class="fab fa-youtube"></i>
  </a>
  <a href="https://tiktok.com/@radiantwaves" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>
</div>

<footer>
  © 2026 RadiantWavesMedia<br>
  <div class="footer-slogan">
    Connecting You Deeper to the World's Most Important Stories
  </div>
</footer>

<script>
async function loadNews() {
  const res = await fetch("news.json");
  const data = await res.json();
  const articles = data.articles;

  if(articles.length > 0){
    document.getElementById("hero-title").textContent = articles[0].title;
    document.getElementById("breaking-text").textContent = articles[0].title;

    document.getElementById("featured").innerHTML = `
      <h2>${articles[0].title}</h2>
      <img src="${articles[0].image}">
      <p>${articles[0].description || ""}</p>
    `;
  }

  const grid = document.getElementById("grid-news");
  grid.innerHTML = "";

  articles.slice(1).forEach(a => {
    grid.innerHTML += `
      <div class="card">
        <img src="${a.image}">
        <h4>${a.title}</h4>
        <small>${a.category || ""}</small>
      </div>
    `;
  });
}

loadNews();
</script>

</body>
</html>
