<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News - Add News Helper</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
h1 { color: #c40000; }
label { display: block; margin-top: 10px; font-weight: bold; }
input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
textarea { resize: vertical; height: 100px; }
button { background: #c40000; color: white; border: none; padding: 10px 15px; margin-top: 15px; cursor: pointer; border-radius: 4px; }
button:hover { background: #a30000; }
pre { background: #eee; padding: 10px; margin-top: 15px; overflow-x: auto; }
</style>
</head>
<body>
<h1>Radiant Waves News - Add News Helper</h1>

<label>Title:</label>
<input type="text" id="title">

<label>Category:</label>
<select id="category">
  <option value="Naija">Naija Pulse</option>
  <option value="World">World</option>
  <option value="Tech">Technology</option>
  <option value="Sports">Sports</option>
  <option value="Election">Election Watch</option>
</select>

<label>Image URL:</label>
<input type="text" id="image" placeholder="https://example.com/image.jpg">

<label>Summary:</label>
<textarea id="summary"></textarea>

<label>Full Details:</label>
<textarea id="details"></textarea>

<label>Author:</label>
<input type="text" id="author" value="Editor: Omotara How">

<label>Source:</label>
<input type="text" id="source" value="Radiant Waves News">

<button onclick="generateJSON()">Generate JSON</button>

<h2>JSON Output:</h2>
<pre id="output">Your JSON will appear here...</pre>

<script>
function generateJSON() {
  const newsItem = {
    title: document.getElementById("title").value,
    category: document.getElementById("category").value,
    image: document.getElementById("image").value,
    summary: document.getElementById("summary").value,
    details: document.getElementById("details").value,
    author: document.getElementById("author").value,
    source: document.getElementById("source").value
  };
  
  // Pretty print JSON
  const jsonOutput = JSON.stringify(newsItem, null, 2);
  
  document.getElementById("output").textContent = jsonOutput;
}
</script>
</body>
</html>
