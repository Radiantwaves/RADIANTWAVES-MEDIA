<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>
<link rel="manifest" href="manifest.json">
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}
header{
    background:#000;
    padding:15px;
    text-align:center;
}
header h1{
    margin:0;
}
#liveDateTime{
    font-size:14px;
    color:#ccc;
    margin-top:5px;
}
/* Social Icons under header */
#social{
    text-align:center;
    padding:10px;
    background:#111;
}
#social img{
    width:28px;
    margin:0 8px;
    background:white;
    padding:5px;
    border-radius:6px;
}
/* Section Menu */
#sectionsMenu{
    display:flex;
    justify-content:center;
    background:#222;
    padding:8px;
    flex-wrap:wrap;
}
#sectionsMenu button{
    background:#333;
    color:#1e90ff;
    border:none;
    margin:4px;
    padding:6px 12px;
    cursor:pointer;
    border-radius:4px;
}
#sectionsMenu button:hover{
    background:#1e90ff;
    color:white;
}
/* Breaking News */
#breakingNews{
    background:#ff3b3b;
    color:white;
    padding:8px;
    overflow:hidden;
    white-space:nowrap;
    font-weight:bold;
}
#breakingNews span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 18s linear infinite;
}
@keyframes scroll{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-100%); }
}
/* Main Story */
#mainStory{
    padding:15px;
    text-align:center;
}
#mainStory img{
    width:100%;
    max-height:400px;
    object-fit:cover;
    border-radius:8px;
}
#mainTitle{
    color:#1e90ff;
    margin-top:10px;
}
/* Sections */
.section{
    padding:10px;
}
.card{
    background:white;
    color:black;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    cursor:pointer;
}
.card img{
    width:100%;
    border-radius:6px;
}
.card h3{
    color:#1e90ff;
    margin:5px 0;
}
</style>
</head>
<body>

<header>
<h1>Radiant Waves Media</h1>
<div id="liveDateTime"></div>
</header>

<!-- Social Icons -->
<div id="social">
<a href="#"><img src="facebook.png"></a>
<a href="#"><img src="twitter.png"></a>
<a href="#"><img src="instagram.png"></a>
<a href="#"><img src="tiktok.png"></a>
</div>

<!-- Breaking News -->
<div id="breakingNews"><span>Loading breaking news...</span></div>

<!-- Section Menu -->
<div id="sectionsMenu">
<button onclick="showSection('nigeria')">Nigeria</button>
<button onclick="showSection('europe')">Europe</button>
<button onclick="showSection('america')">America</button>
<button onclick="showSection('africa')">Africa</button>
<button onclick="showSection('asia')">Asia</button>
<button onclick="showSection('politics')">Politics</button>
<button onclick="showSection('business')">Business</button>
<button onclick="showSection('sport')">Sport</button>
<button onclick="showSection('music')">Music</button>
<button onclick="showSection('movies')">Movies</button>
</div>

<!-- Main Story -->
<div id="mainStory">
<img id="mainImage" src="main-story.jpg">
<h2 id="mainTitle">Loading...</h2>
<p id="mainSummary"></p>
</div>

<!-- Sections -->
<div id="nigeria" class="section"></div>
<div id="europe" class="section"></div>
<div id="america" class="section"></div>
<div id="africa" class="section"></div>
<div id="asia" class="section"></div>
<div id="politics" class="section"></div>
<div id="business" class="section"></div>
<div id="sport" class="section"></div>
<div id="music" class="section"></div>
<div id="movies" class="section"></div>

<script>
let lastVersion=null;

// Show only one section at a time
function showSection(sectionName){
    ["nigeria","europe","america","africa","asia","politics","business","sport","music","movies"].forEach(s=>{
        document.getElementById(s).style.display = "none";
    });
    document.getElementById(sectionName).style.display = "block";
}

// Load News
function loadNews(){
    fetch("news.json?v="+Date.now())
    .then(res=>res.json())
    .then(data=>{
        // Main story
        const mainImg=document.getElementById("mainImage");
        mainImg.onerror=function(){ mainImg.src="main-story.jpg"; };
        mainImg.src=data.main[0].image;
        document.getElementById("mainTitle").innerText=data.main[0].title;
        document.getElementById("mainSummary").innerText=data.main[0].summary;

        // Breaking news
        if(data.breaking){
            let text=data.breaking.map(b=>b.title).join(" | ");
            document.getElementById("breakingNews").innerHTML="<span>"+text+"</span>";
        }

        // Sections loader
        function loadSection(name){
            if(!data[name]) return;
            let html="";
            data[name].forEach((item,index)=>{
                html+=`
                <div class="card" onclick="showMain('${name}',${index})">
                    ${item.image?`<img src="${item.image}" onerror="this.src='main-story.jpg'">`:""}
                    <h3>${item.title}</h3>
                    <p>${item.summary}</p>
                </div>`;
            });
            document.getElementById(name).innerHTML=html;
        }
        ["nigeria","europe","america","africa","asia","politics","business","sport","music","movies"].forEach(loadSection);

        // Notification alert on update
        if(lastVersion && lastVersion!==data.version){
            alert("News Updated!");
        }
        lastVersion=data.version;
    })
    .catch(err=>console.log("Error loading news:",err));
}

// Click to show main
function showMain(section,index){
    fetch("news.json?v="+Date.now())
    .then(res=>res.json())
    .then(data=>{
        let story=data[section][index];
        const mainImg=document.getElementById("mainImage");
        mainImg.onerror=function(){ mainImg.src="main-story.jpg"; };
        mainImg.src=story.image;
        document.getElementById("mainTitle").innerText=story.title;
        document.getElementById("mainSummary").innerText=story.summary;
    });
}

// Clock
function updateClock(){
    const now=new Date();
    document.getElementById("liveDateTime").innerText=
    now.toDateString()+" | "+now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// Service Worker
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("service-worker.js");
}

// Initial Load
showSection("nigeria"); // default section
loadNews();
setInterval(loadNews,300000); // reload news every 5 min
</script>

</body>
</html>
