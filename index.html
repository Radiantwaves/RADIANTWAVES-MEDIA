<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* HEADER */
.header { text-align: center; background: white; padding: 15px; }
.header img { width: 70px; }
.title { font-size: 32px; font-weight: bold; }
.slogan { color: #666; font-size: 14px; }

/* VIDEO */
.video-bg { width: 100%; height: 250px; overflow: hidden; }
.video-bg video { width: 100%; height: 100%; object-fit: cover; }

/* BREAKING */
.breaking { background: #0047AB; color: white; padding: 8px; }

/* NAV */
nav { background: #111; text-align: center; padding: 10px; }
nav a { color: white; margin: 0 12px; cursor:pointer; text-decoration:none; }

/* LAYOUT */
.container { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; padding: 20px; }
.main { flex: 3; min-width: 600px; }
.sidebar { flex: 1; padding-left: 20px; }

/* ARTICLE */
.article { background: white; padding: 15px; margin-bottom: 20px; }
.article h3 { display: flex; align-items: center; }
.article img { width: 80px; height: 60px; object-fit: cover; margin-right: 10px; }
.readmore { color: #0047AB; font-weight: bold; text-decoration:none; }

/* LIVE */
.live { background: red; color: white; font-size: 10px; padding: 3px 6px; margin-right: 5px; }

/* SOCIAL */
.social { text-align: center; margin-top: 20px; }
.social a { color: #0047AB; margin: 0 8px; text-decoration:none; }

/* FOOTER */
footer { background: #111; color: white; text-align: center; padding: 20px; margin-top:20px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="images/icon-512.png">
  <div class="title">RadiantWaves</div>
  <div class="slogan">Gateway to World News – Connecting You to the World</div>
</div>

<!-- VIDEO -->
<div class="video-bg">
  <video id="bgVideo" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
</div>

<!-- BREAKING -->
<div class="breaking">
  <span id="breakingNews">🔴 Loading breaking news...</span>
</div>

<!-- NAV -->
<nav>
  <a data-category="All">Home</a>
  <a data-category="World">World</a>
  <a data-category="Politics">Politics</a>
  <a data-category="Business">Business</a>
  <a data-category="Technology">Technology</a>
  <a data-category="Science">Science</a>
  <a data-category="Sport">Sport</a>
  <a data-category="Entertainment">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="main" id="news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<!-- SOCIAL (SAFE TEXT VERSION) -->
<div class="social">
  <a href="https://facebook.com/radiantwavesnews" target="_blank">Facebook</a> |
  <a href="https://twitter.com/radiant13528995" target="_blank">Twitter</a> |
  <a href="https://instagram.com/radiantwaves1" target="_blank">Instagram</a> |
  <a href="https://tiktok.com/@radiantwavesmedia" target="_blank">TikTok</a> |
  <a href="https://youtube.com/@radiantwave-wv6rg" target="_blank">YouTube</a>
</div>

<footer>
  <p>Truth. Insight. Global Perspective.</p>
  <p>© 2026 RadiantWaves Global News</p>
</footer>

<!-- SCRIPT -->
<script>
fetch("news.json")
.then(res => res.json())
.then(articles => {

  const news = document.getElementById("news");
  const trending = document.getElementById("trending");
  const breakingBar = document.getElementById("breakingNews");

  function render(category){
    news.innerHTML = '';
    trending.innerHTML = '';

    const filtered = category === 'All'
      ? articles
      : articles.filter(a => a.category === category);

    filtered.forEach((a,i)=>{
      const div = document.createElement('div');
      div.className = 'article';

      const h3 = document.createElement('h3');

      if(a.image){
        const img = document.createElement('img');
        img.src = a.image;
        h3.appendChild(img);
      }

      const link = document.createElement('a');
      link.href = `article.html?id=${i}`;
      link.innerHTML = (a.live ? '<span class="live">LIVE</span> ' : '') + a.title;

      h3.appendChild(link);
      div.appendChild(h3);

      const p = document.createElement('p');
      p.textContent = a.summary;
      div.appendChild(p);

      const read = document.createElement('a');
      read.href = `article.html?id=${i}`;
      read.textContent = "Read more";
      read.className = "readmore";

      div.appendChild(read);
      news.appendChild(div);
    });

    // Trending
    articles.slice(0,5).forEach((a,i)=>{
      const t = document.createElement('a');
      t.href = `article.html?id=${i}`;
      t.textContent = a.title;
      trending.appendChild(t);
    });
  }

  render('All');

  document.querySelectorAll("nav a").forEach(btn=>{
    btn.onclick = () => render(btn.dataset.category);
  });

  // 🔴 BREAKING NEWS ROTATION
  let i = 0;
  setInterval(() => {
    const a = articles[i % articles.length];
    breakingBar.innerHTML =
      `<a href="article.html?id=${i % articles.length}" style="color:white;text-decoration:none;">
        🔴 ${a.title}
      </a>`;
    i++;
  }, 4000);

});

// VIDEO ROTATION
const vids = ["video1.mp4","video2.mp4","video3.mp4"];
let v = 0;

setInterval(()=>{
  v = (v+1) % vids.length;
  document.getElementById("bgVideo").src = vids[v];
}, 12000);
</script>

</body>
</html>
