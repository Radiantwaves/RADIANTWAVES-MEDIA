<script>

const apiKey = "10618a434f80cc4ffe52717ea1bf2401"

let page = 1
let currentSection = "world"

function loadWorld(reset=true){

if(reset){
page = 1
document.getElementById("news-container").innerHTML=""
}

currentSection="world"

fetch(`https://newsapi.org/v2/everything?q=news&language=en&pageSize=12&page=${page}&sortBy=publishedAt&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadNigeria(){

page=1
currentSection="nigeria"

document.getElementById("news-container").innerHTML=""

fetch(`https://newsapi.org/v2/everything?q=Nigeria&pageSize=12&page=${page}&sortBy=publishedAt&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadTechnology(){

page=1
currentSection="tech"

document.getElementById("news-container").innerHTML=""

fetch(`https://newsapi.org/v2/everything?q=technology&pageSize=12&page=${page}&sortBy=publishedAt&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadSports(){

page=1
currentSection="sports"

document.getElementById("news-container").innerHTML=""

fetch(`https://newsapi.org/v2/everything?q=sports&pageSize=12&page=${page}&sortBy=publishedAt&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function loadMore(){

page++

let query="news"

if(currentSection==="nigeria") query="Nigeria"
if(currentSection==="tech") query="technology"
if(currentSection==="sports") query="sports"

fetch(`https://newsapi.org/v2/everything?q=${query}&language=en&pageSize=12&page=${page}&sortBy=publishedAt&apiKey=${apiKey}`)
.then(res=>res.json())
.then(data=>displayNews(data.articles))

}

function displayNews(articles){

const container=document.getElementById("news-container")

if(!articles || articles.length===0){
container.innerHTML += "<p>No news available.</p>"
return
}

articles.forEach(article=>{

const news=document.createElement("div")

news.className="news"

news.innerHTML=`

<img src="${article.urlToImage || ''}" style="width:100%;max-height:200px;object-fit:cover">

<h2>
<a href="${article.url}" target="_blank">
${article.title}
</a>
</h2>

<p>${article.description || ""}</p>

`

container.appendChild(news)

})

}

loadWorld()

</script>
