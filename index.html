<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

/* HEADER */
.header { background:#111; text-align:center; padding:15px; }
.logo img { height:50px; }
.header-slogan { color:#aaa; font-size:14px; }

/* HERO */
.hero { position:relative; height:250px; overflow:hidden; }
.hero video { width:100%; height:100%; object-fit:cover; }
.overlay { position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.hero-text { position:absolute; bottom:20px; left:20px; font-size:22px; }

/* BREAKING */
.breaking { background:red; padding:10px; font-weight:bold; }

/* NAV */
nav { background:#000; text-align:center; padding:10px; }
nav a { color:white; margin:0 10px; cursor:pointer; }
nav a:hover { color:#00bfff; }

/* LAYOUT */
.container { max-width:1100px; margin:auto; display:flex; flex-wrap:wrap; padding:15px; }
.main { flex:3; display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.sidebar { flex:1; padding-left:15px; }

/* ARTICLES */
.article { background:#111; border-radius:6px; overflow:hidden; }
.article img { width:100%; height:180px; object-fit:cover; }
.article-content { padding:10px; }

.featured { grid-column:1 / -1; }
.featured img { height:280px; }
.article-content h2 {
  font-size:22px;
  line-height:1.3;
}

.article-content h3 {
  font-size:16px;
  line-height:1.3;
}

.article-content p {
  font-size:14px;
  color:#ccc;
}

.featured {
  border-bottom:2px solid red;
}
/* SIDEBAR */
.sidebar a { display:block; color:#ccc; margin:8px 0; }

/* SOCIAL */
.social { text-align:center; margin-top:20px; }
.social i { margin:10px; font-size:20px; }

/* FOOTER */
footer { background:#000; text-align:center; padding:20px; }
.footer-slogan { color:#aaa; }

/* MOBILE */
@media(max-width:768px){
  .main { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><img src="logo.png"></div>
  <div class="header-slogan">Real-Time Global Intelligence & Breaking News Network</div>
</div>

<!-- HERO -->
<div class="hero">
  <video id="bgVideo" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="hero-text">Top Stories Around the World</div>
  <button onclick="toggleSound()" style="position:absolute;top:10px;right:10px;">🔊</button>
</div>

<!-- BREAKING -->
<div class="breaking" id="breakingText"></div>

<!-- NAV -->
<nav>
  <a onclick="loadCategory('all')">Home</a>
  <a onclick="loadCategory('world')">World</a>
  <a onclick="loadCategory('tech')">Tech</a>
  <a onclick="loadCategory('business')">Business</a>
  <a onclick="loadCategory('politics')">Politics</a>
  <a onclick="loadCategory('health')">Health</a>
  <a onclick="loadCategory('entertainment')">Entertainment</a>
</nav>

<!-- CONTENT -->
<div class="container">

  <div class="main" id="newsContainer"></div>

  <div class="sidebar">
    <h3>Trending</h3>
    <a href="#">Global summit updates</a>
    <a href="#">AI transforming industries</a>

    <div class="social">
      <i class="fab fa-facebook"></i>
      <i class="fab fa-x-twitter"></i>
      <i class="fab fa-youtube"></i>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 RadiantWavesMedia
  <div class="footer-slogan">Connecting You Deeper to the World's Most Important Stories</div>
</footer>
<script>

const newsDB = {

  all: [
    {title:"Global Leaders Meet",desc:"Economic talks ongoing",img:"https://picsum.photos/800/400?1",time:"5 min ago"},
    {title:"AI Revolution",desc:"AI reshaping industries",img:"https://picsum.photos/800/400?2",time:"12 min ago"},
    {title:"Climate Alert",desc:"Urgent global warning",img:"https://picsum.photos/800/400?3",time:"30 min ago"},
    {title:"Markets Rising",desc:"Stocks gaining momentum",img:"https://picsum.photos/800/400?4",time:"1 hour ago"}
  ],

  world: [
    {title:"World Summit",desc:"Global cooperation rising",img:"https://picsum.photos/800/400?5",time:"10 min ago"},
    {title:"International Talks Continue",desc:"Leaders meet globally",img:"https://picsum.photos/800/400?6",time:"25 min ago"}
  ],

  tech: [
    {title:"Tech Breakthrough",desc:"Innovation accelerating",img:"https://picsum.photos/800/400?7",time:"8 min ago"},
    {title:"AI Expansion",desc:"New tools emerging",img:"https://picsum.photos/800/400?8",time:"40 min ago"}
  ],

  business: [
    {title:"Business Growth Rising",desc:"Markets improving globally",img:"https://picsum.photos/800/400?9",time:"15 min ago"}
  ],

  politics: [
    {title:"Political Debate Intensifies",desc:"Leaders clash on policies",img:"https://picsum.photos/800/400?11",time:"20 min ago"}
  ],

  health: [
    {title:"Health Advances Emerging",desc:"Medical research progresses",img:"https://picsum.photos/800/400?13",time:"35 min ago"}
  ],

  entertainment: [
    {title:"Entertainment Industry Booms",desc:"Streaming dominates globally",img:"https://picsum.photos/800/400?15",time:"50 min ago"}
  ]

};


// 🧠 DISPLAY FUNCTION
function displayNews(data){
  const container = document.getElementById("newsContainer");
  container.innerHTML = "";

  data.forEach((a,i)=>{

    container.innerHTML += i===0 ?
    `<div class="article featured">
        <img src="${a.img}">
        <div class="article-content">
          <span style="color:red;font-weight:bold;">● LIVE</span>
          <span style="color:#aaa;margin-left:10px;">${a.time}</span>
          <h2>TOP STORY: ${a.title}</h2>
          <p>${a.desc}</p>
        </div>
     </div>`
    :
    `<div class="article">
        <img src="${a.img}">
        <div class="article-content">
          <span style="color:#aaa;font-size:12px;">${a.time}</span>
          <h3>${a.title}</h3>
          <p>${a.desc}</p>
        </div>
     </div>`;
  });
}


// 🔁 CATEGORY
function loadCategory(cat){
  displayNews(newsDB[cat]);
}


// 🔴 BREAKING NEWS
const breakingNews = [
  "Global summit begins",
  "AI dominates headlines",
  "Climate discussions rise",
  "Markets reacting"
];

let b = 0;
setInterval(()=>{
  document.getElementById("breakingText").textContent = breakingNews[b];
  b = (b+1) % breakingNews.length;
}, 3000);


// 🔊 VIDEO SOUND
function toggleSound(){
  const video = document.getElementById("bgVideo");
  video.muted = !video.muted;
}


// 🚀 START
displayNews(newsDB.all);

</script>
</body>
</html>
