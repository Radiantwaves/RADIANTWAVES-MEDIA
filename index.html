<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;}
header{background:#c00;color:white;padding:15px;text-align:center;font-size:26px;font-weight:bold;}
nav{background:#111;display:flex;overflow:auto;}
nav button{background:none;border:none;color:white;padding:14px 18px;cursor:pointer;font-size:15px;}
nav button:hover{background:#c00;}
.breaking{background:black;color:white;padding:8px;overflow:hidden;white-space:nowrap;font-weight:bold;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 20s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}} 
.container{padding:15px;}
.card{background:white;margin-bottom:18px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:5px;}
.card h3{margin:10px 0 6px 0;}
.time{color:gray;font-size:13px;}
.details{display:none;margin-top:10px;}
footer{background:#111;color:white;padding:20px;text-align:center;margin-top:20px;}
.social img{width:32px;height:32px;vertical-align:middle;margin:0 8px;}
</style>
</head>
<body>

<div class="container" id="news"></div>

<footer>

</a>
</div>

<source src="news-music.mp3" type="audio/mpeg">
</audio>
<p>© 2026 Radiant Waves News</p>
</footer>

<script>
// ===== Local news =====
const allNews=[
{category:"Nigeria",title:"Tinubu Nominates Oyedele as Finance Minister",time:"March 6, 2026",image:"https://picsum.photos/800/400?101",content:"President Tinubu announced the nomination of Oyedele as Minister of State for Finance.",author:"Editor: Omotara How"},
{category:"Nigeria",title:"Yobe APC Chairman Re-elected",time:"March 6, 2026",image:"https://picsum.photos/800/400?102",content:"The Yobe APC chairman secured re-election at the recent party congress.",author:"Editor: Omotara How"},

{category:"Technology",title:"Global AI Companies Race to Release New Models",time:"March 6, 2026",image:"https://picsum.photos/800/400?105",content:"Tech companies invest billions into AI development across US, Europe, and Asia.",author:"Editor: Omotara How"},
{category:"Technology",title:"Cybersecurity Experts Warn of New Global Attacks",time:"March 6, 2026",image:"https://picsum.photos/800/400?106",content:"Security agencies warn of potential cyber attacks worldwide.",author:"Editor: Omotara How"},
{category:"Sports",title:"Champions League Quarter-Final Draw Completed",time:"March 6, 2026",image:"https://picsum.photos/800/400?107",content:"UEFA conducted the Champions League quarter-final draw.",author:"Editor: Omotara How"},
{category:"Sports",title:"FIFA Announces New International Tournament Calendar",time:"March 6, 2026",image:"https://picsum.photos/800/400?108",content:"FIFA confirmed new international football schedules.",author:"Editor: Omotara How"},
{category:"World",title:"Macron Urges De-escalation in Middle East Conflict",time:"March 6, 2026",image:"https://picsum.photos/800/400?109",content:"French President Macron urges restraint as tensions rise in Middle East.",author:"Editor: Omotara How"},
{category:"World",title:"Global Oil Prices Surge",time:"March 6, 2026",image:"https://picsum.photos/800/400?110",content:"Energy markets react sharply to Middle East tensions.",author:"Editor: Omotara How"},
{category:"World",title:"US Raises Global Military Alert",time:"March 6, 2026",image:"https://picsum.photos/800/400?111",content:"The Pentagon increased security measures at overseas bases amid rising tensions.",author:"Editor: Omotara How"},
{category:"World",title:"China Calls for Ceasefire",time:"March 6, 2026",image:"https://picsum.photos/800/400?112",content:"China urges all parties in Middle East to engage in dialogue and avoid escalation.",author:"Editor: Omotara How"},
{category:"World",title:"African Union Warns of Economic Ripple Effects",time:"March 6, 2026",image:"https://picsum.photos/800/400?113",content:"AU warns global instability could impact trade and fuel costs in Africa.",author:"Editor: Omotara How"}
// Add more stories here up to 25 total
];

// ===== Render =====
function render(list){
  const container=document.getElementById("news");
  let html="";
  list.forEach((n,i)=>{
    html+=`
    <div class="card" onclick="toggle(${i})">
      <img src="${n.image}">
      <h3>${n.title}</h3>
      <div class="time">${n.time}</div>
      <div class="details" id="d${i}">
        <p>${n.content}</p>
        <p><em>${n.author}</em></p>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

function toggle(i){
  const d=document.getElementById("d"+i);
  d.style.display=d.style.display==="block"?"none":"block";
}

function showCategory(cat){
  if(cat==="All"){render(allNews); return;}
  render(allNews.filter(n=>n.category===cat));
}

render(allNews);
</script>
</body>
