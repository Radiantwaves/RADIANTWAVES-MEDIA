<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav button{
background:#c40000;
color:white;
border:none;
padding:10px 14px;
margin:4px;
cursor:pointer;
}

#searchBar{
width:90%;
padding:10px;
margin:15px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 10px 10px;
}

.readMore{
background:#c40000;
color:white;
border:none;
padding:8px 12px;
margin:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
Radiant Waves News
</header>

<nav>

<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Naija')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election</button>

</nav>

<center>
<input type="text" id="searchBar" placeholder="Search news..." onkeyup="searchNews()">
</center>

<div class="container" id="newsContainer"></div>
<footer style="background:#111;color:white;text-align:center;padding:20px;margin-top:40px;">
<p>© 2026 Radiant Waves News Network</p>

<<div style="margin-top:15px;">

<a href="https://facebook.com">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="30">
</a>

<a href="https://twitter.com">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" width="30">
</a>

<a href="https://instagram.com">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="30">
</a>

<a href="https://youtube.com">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="30">
</a>

</div>
<div style="margin-top:15px;">
<audio controls>
<source src="news.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>
</div>
</footer>

<script>

let allNews = [];

fetch("news.json")
.then(response => response.json())
.then(data => {

allNews = data;

displayNews(data);

});

function displayNews(news){

const container = document.getElementById("newsContainer");

container.innerHTML="";

news.forEach(n => {

container.innerHTML += `

<div class="card">

<img src="${n.image}">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button class="readMore" onclick="alert('${n.details}')">Read More</button>

<p style="font-size:12px;padding:10px;">
${n.author} | Source: ${n.source}
</p>

</div>

`;

});

}

function filterNews(category){

if(category==="All"){

displayNews(allNews);

}else{

const filtered = allNews.filter(n=>n.category===category);

displayNews(filtered);

}

}

function searchNews(){

const search = document.getElementById("searchBar").value.toLowerCase();

const filtered = allNews.filter(n =>
n.title.toLowerCase().includes(search)
);

displayNews(filtered);

}

</script>

</body>
</html>
