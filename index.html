<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radiant Waves Global News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#c40000;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.slogan{
font-size:14px;
margin-top:5px;
}

.banner img{
width:100%;
height:300px;
object-fit:cover;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav button{
background:#c40000;
color:white;
border:none;
padding:10px 14px;
margin:4px;
cursor:pointer;
}

.breaking{
background:black;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

.ticker{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

#searchBar{
width:90%;
padding:10px;
margin:15px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 10px 10px;
}

.readMore{
background:#c40000;
color:white;
border:none;
padding:8px 12px;
margin:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
margin:5px;
}

</style>
</head>

<body>

<header>
Radiant Waves Global News
<div class="slogan">
Truth • Insight • Global Perspective
</div>
</header>

<div class="banner">
<img src="main-story.jpg">
</div>

<nav>

<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Naija')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election</button>

</nav>

<div class="breaking">
<div class="ticker" id="breakingNews">
Loading global headlines...
</div>
</div>

<center>
<input type="text" id="searchBar" placeholder="Search global news..." onkeyup="searchNews()">
</center>

<div class="container" id="newsContainer"></div>

<footer>

<p>© 2026 Radiant Waves News Network</p>

<div class="social">

<a href="https://facebook.com">
<img src="facebook.png" width="30">
</a>

<a href="https://instagram.com">
<img src="instagram.png" width="30">
</a>

<a href="https://twitter.com">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" width="30">
</a>

<a href="https://tiktok.com">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" width="30">
</a>

</div>

<div style="margin-top:15px">

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</div>

</footer>

<script>

let allNews=[];

/* Load local newsroom stories */

fetch("news.json")
.then(response=>response.json())
.then(data=>{

allNews=data;
displayNews(data);

})
.catch(error=>{

document.getElementById("newsContainer").innerHTML =
"<p style='padding:20px'>News loading error.</p>";

});

/* Display news */

function displayNews(news){

const container=document.getElementById("newsContainer");

container.innerHTML="";

news.forEach(n=>{

container.innerHTML+=`

<div class="card">

<img src="${n.image}">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button class="readMore" onclick="alert('${n.details}')">Read More</button>

<p style="font-size:12px;padding:10px">
${n.author} | Source: ${n.source}
</p>

</div>

`;

});

}

/* Category filter */

function filterNews(category){

if(category==="All"){
displayNews(allNews);
return;
}

const filtered=allNews.filter(n=>n.category===category);

displayNews(filtered);

}

/* Search */

function searchNews(){

const search=document.getElementById("searchBar").value.toLowerCase();

const filtered=allNews.filter(n=>
n.title.toLowerCase().includes(search)
);

displayNews(filtered);

}

/* GLOBAL BREAKING NEWS (API) */

fetch("https://gnews.io/api/v4/top-headlines?lang=en&max=10&token=10618a434f80cc4ffe52717ea1bf2401")
.then(response=>response.json())
.then(data=>{

let headlines="";

if(data.articles){

data.articles.forEach(article=>{

headlines += article.title + " ♦ ";

});

}else{

headlines="Global news updates ♦ Europe politics ♦ US economy ♦ Asia technology ♦ Africa development";

}

document.getElementById("breakingNews").innerText=headlines;

})
.catch(error=>{

document.getElementById("breakingNews").innerText =
"Radiant Waves newsroom bringing global headlines";

});

</script>

</body>
</html>
