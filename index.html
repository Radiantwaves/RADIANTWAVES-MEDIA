<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

header{
background:#c00;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

nav{
background:#111;
display:flex;
overflow:auto;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 16px;
cursor:pointer;
font-size:15px;
white-space:nowrap;
}

nav button:hover{
background:#c00;
}

.breaking{
background:black;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{
padding:15px;
}

.card{
background:white;
margin-bottom:20px;
padding:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
border-radius:5px;
}

.card h3{
margin:10px 0 5px 0;
}

.time{
color:gray;
font-size:13px;
}

.details{
display:none;
margin-top:10px;
color:#333;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
margin-top:20px;
}

.social a{
margin:0 10px;
color:white;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<header>Radiant Waves News</header>

<div class="breaking">
<span>
🔴 Macron Pushes De-escalation in Middle East |
🔴 U.S. Raises Global Military Alert |
🔴 Oil Prices Surge Globally |
🔴 Nigeria Reviews Revenue Forecast
</span>
</div>

<nav>
<button onclick="filterNews('All')">Home</button>
<button onclick="filterNews('Nigeria')">Nigeria</button>
<button onclick="filterNews('Europe')">Europe</button>
<button onclick="filterNews('America')">America</button>
<button onclick="filterNews('Asia')">Asia</button>
<button onclick="filterNews('Africa')">Africa</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Technology')">Technology</button>
</nav>

<div class="container" id="newsContainer"></div>

<footer>

<div class="social">

</a>

<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" width="30">
</a>
</div>

<br>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<p>© 2026 Radiant Waves News</p>

</footer>

<script>

const newsData = [

{
category:"World",
title:"Macron Urges Israel to Avoid Ground Offensive in Lebanon",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?1",
content:"French President Emmanuel Macron called Israeli Prime Minister Benjamin Netanyahu urging restraint along the Lebanon border. France warned that expanding military operations could destabilize the entire Middle East region."
},

{
category:"America",
title:"U.S. Military Bases Increase Security Worldwide",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?2",
content:"The Pentagon confirmed heightened security measures at overseas military installations amid fears of retaliation linked to ongoing Middle East tensions."
},

{
category:"Nigeria",
title:"Nigeria Reviews Economic Impact of Rising Oil Prices",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?3",
content:"Nigeria's finance ministry is assessing revenue projections following a surge in global crude oil prices triggered by geopolitical instability."
},

{
category:"Europe",
title:"UK Holds Emergency Energy Security Meeting",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?4",
content:"British officials convened emergency talks to evaluate fuel reserves and prepare contingency measures in case of prolonged global supply disruptions."
},

{
category:"Asia",
title:"China Calls for Immediate Ceasefire at UN",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?5",
content:"China addressed the UN Security Council urging all parties involved in the Middle East crisis to engage in dialogue and avoid further escalation."
},

{
category:"Africa",
title:"African Union Warns of Economic Ripple Effects",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?6",
content:"The African Union expressed concern that global instability could negatively impact African trade, food supply chains, and fuel costs."
},

{
category:"Technology",
title:"Cybersecurity Agencies Warn of Possible Global Cyber Attacks",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?7",
content:"Security agencies across Europe and North America warned of possible cyber retaliation targeting infrastructure and financial systems."
},

{
category:"Sports",
title:"International Football Bodies Review Match Security",
time:"March 5, 2026 - 00:00",
image:"https://picsum.photos/600/300?8",
content:"Football governing bodies announced enhanced security protocols for upcoming international fixtures."
}

];

function displayNews(data){
const container=document.getElementById("newsContainer");
container.innerHTML="";
data.forEach((news,index)=>{
container.innerHTML+=`
<div class="card" onclick="toggleDetails(${index})">
<img src="${news.image}">
<h3>${news.title}</h3>
<div class="time">${news.time}</div>
<div class="details" id="details${index}">
<p>${news.content}</p>
</div>
</div>
`;
});
}

function toggleDetails(index){
const detail=document.getElementById("details"+index);
detail.style.display=detail.style.display==="block"?"none":"block";
}

function filterNews(category){
if(category==="All"){
displayNews(newsData);
}else{
displayNews(newsData.filter(n=>n.category===category));
}
}

displayNews(newsData);

</script>

</body>
</html>
