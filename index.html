<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Global News</title><style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

/* HEADER */

header{
text-align:center;
background:#111;
color:white;
padding:15px;
}

header h1{
margin:0;
}

.slogan{
color:#00aaff;
font-weight:bold;
margin-top:5px;
}

/* BREAKING NEWS */

.breaking{
background:#0066cc;
color:white;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

#ticker{
display:inline-block;
}

/* NAVIGATION */

nav{
text-align:center;
background:#222;
padding:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00aaff;
}

/* MAIN CONTENT */

.container{
display:flex;
padding:20px;
}

.news{
flex:3;
}

.article{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:5px;
}

.article img{
width:100%;
border-radius:5px;
}

/* TRENDING */

.trending{
flex:1;
margin-left:20px;
background:white;
padding:15px;
border-radius:5px;
}

.trending h3{
margin-top:0;
}

.trending a{
text-decoration:none;
color:#333;
}

.trending a:hover{
color:#0066cc;
}

/* FOOTER */

footer{
text-align:center;
background:#111;
color:white;
padding:20px;
margin-top:20px;
}

footer a{
color:#00aaff;
margin:5px;
text-decoration:none;
}

</style></head><body><header>
<h1>Radiant Waves Global News</h1><div class="slogan">
Gateway to World News – Connecting You to the World
</div>
</header><div class="breaking">
<strong>Breaking:</strong>
<span id="ticker"></span>
</div><nav>
<a href="index.html">Home</a>
<a href="world.html">World</a>
<a href="politics.html">Politics</a>
<a href="business.html">Business</a>
<a href="technology.html">Technology</a>
<a href="science.html">Science</a>
<a href="sports.html">Sport</a>
<a href="entertainment.html">Entertainment</a>
</nav><div class="container"><div class="news" id="news-container"></div><div class="trending">
<h3>Trending News</h3>
<ul id="trending"></ul>
</div></div><footer><div>
<a href="https://facebook.com/radiantwavesnews">Facebook</a>
<a href="https://instagram.com/radiantwaves1">Instagram</a>
<a href="https://tiktok.com/@radiantwavesmedia">TikTok</a>
<a href="https://twitter.com/radiant13528995">Twitter</a>
</div><p>@2026 Radiant Waves Global News</p><p style="color:#00aaff">
Truth. Insight. Global Perspective.
</p></footer><script>

fetch("news.json")
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("news-container");
const trending=document.getElementById("trending");
const ticker=document.getElementById("ticker");

/* MAIN ARTICLES */

data.articles.forEach((a,i)=>{

const div=document.createElement("div");
div.className="article";

div.innerHTML=`

<img src="${a.image}" alt="">

<h2>${a.title}</h2>

<p>${a.description}</p>

<a href="article.html?id=${i}">Read more</a>

`;

container.appendChild(div);

});

/* TRENDING */

data.articles.slice(0,10).forEach((a,i)=>{

const li=document.createElement("li");

li.innerHTML=`<a href="article.html?id=${i}">${a.title}</a>`;

trending.appendChild(li);

});

/* BREAKING TICKER */

data.articles.slice(0,5).forEach(a=>{

ticker.innerHTML+=a.title+" | ";

});

});

</script></body>
</html>
