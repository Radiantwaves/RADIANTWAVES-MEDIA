<!DOCTYPE html>
<html>
<head>
<title>Radiant Waves News</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}
header{background:#111;color:white;padding:15px;}
nav{display:flex;gap:15px;align-items:center;}
nav button{background:none;border:none;color:white;font-size:15px;cursor:pointer;}
.search{margin-left:auto;}
.search input{padding:6px;}
.breaking{background:red;color:white;padding:8px;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 40s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.main{display:grid;grid-template-columns:3fr 1fr;gap:20px;padding:20px;}
.news{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{background:white;box-shadow:0 0 5px rgba(0,0,0,0.2);}
.card img{width:100%;height:180px;object-fit:cover;}
.content{padding:15px;}
.details{display:none;margin-top:10px;}
.sidebar{background:white;padding:15px;box-shadow:0 0 5px rgba(0,0,0,0.2);}
footer{background:#111;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>

<header>
<h2>Radiant Waves News</h2>
<nav>
<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija Pulse')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>
<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div>
</nav>
</header>

<div class="breaking">
<span id="breaking"></span>
</div>

<div class="main">
<div class="news" id="news"></div>
<div class="sidebar">
<h3>Trending Stories</h3>
<ul id="trending"></ul>
</div>
</div>

<footer>
Radiant Waves Global News<br>
Editor: Omotara How
</footer>

<script>

/* HEADLINES AND DETAILS */
const news=[
{
title:"Peter Obi Calls for Electoral Reform in Nigeria",
category:"Naija Pulse",
image:"images/peter-obi.jpg",
synopsis:"Former presidential candidate urges electoral transparency.",
details:"Peter Obi has renewed his call for stronger electoral reforms in Nigeria, emphasizing that transparent elections are essential for public trust in democracy. Analysts highlight ongoing discussions about institutional reforms ahead of the next election cycle. He also met with civil society groups to discuss strategies for voter education.",
editor:"Omotara How"
},
{
title:"El-Rufai Speaks on Future of Nigerian Politics",
category:"Naija Pulse",
image:"images/el-rufai.jpg",
synopsis:"Former Kaduna governor remains influential.",
details:"Nasir El-Rufai continues to influence Nigerian political debates. His commentary on governance, economic policy, and national security resonates across political circles. Analysts consider him a major voice in shaping political conversations.",
editor:"Omotara How"
},
{
title:"Sunday Igboho Calls for Unity in Southwest Nigeria",
category:"Naija Pulse",
image:"images/sunday-igboho.jpg",
synopsis:"Activist encourages cooperation among Yoruba communities.",
details:"Sunday Igboho emphasizes unity and peaceful dialogue among Yoruba communities. He encourages local leaders to collaborate on security and development projects, highlighting the importance of cultural identity and civic action.",
editor:"Omotara How"
},
{
title:"Global Leaders Monitor Middle East Tensions",
category:"World",
image:"https://picsum.photos/600/400?world1",
synopsis:"Diplomatic efforts continue worldwide.",
details:"International leaders are closely monitoring developments in the Middle East as diplomatic efforts continue to prevent escalation. Governments and organizations are urging calm while preparing humanitarian assistance where needed.",
editor:"Omotara How"
},
{
title:"Artificial Intelligence Investment Expands Worldwide",
category:"Technology",
image:"https://picsum.photos/600/400?tech1",
synopsis:"Tech companies accelerate AI development.",
details:"Major technology companies are rapidly increasing investment in artificial intelligence systems designed to improve automation and data analysis. Experts say AI innovation could transform multiple industries including healthcare and finance.",
editor:"Omotara How"
},
{
title:"Cybersecurity Experts Warn of Rising Digital Threats",
category:"Technology",
image:"https://picsum.photos/600/400?tech2",
synopsis:"Governments urged to strengthen systems.",
details:"Cybersecurity specialists warn governments and companies about growing cyber threats as digital infrastructure becomes vital to economies worldwide. Immediate actions are recommended to protect critical systems.",
editor:"Omotara How"
},
{
title:"European Football Clubs Prepare for Major Tournament",
category:"Sports",
image:"https://picsum.photos/600/400?sports1",
synopsis:"Teams intensify preparations for competitions.",
details:"Top European football clubs are intensifying preparations for upcoming continental tournaments. Coaches say the coming weeks will determine qualification for major championships.",
editor:"Omotara How"
},
{
title:"US Election Campaign Season Intensifies",
category:"Election",
image:"https://picsum.photos/600/400?election1",
synopsis:"Candidates increase campaign activities.",
details:"Political campaigns across the United States are intensifying as candidates expand travel, speeches, and policy announcements ahead of the upcoming election season.",
editor:"Omotara How"
}
]

function render(list){
let container=document.getElementById("news")
container.innerHTML=""
list.forEach((n,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${n.image}">
<div class="content">
<h3>${n.title}</h3>
<p>${n.synopsis}</p>
<button onclick="toggle(${i})">Read More</button>
<div class="details" id="d${i}">
<p>${n.details}</p>
<p><b>Editor:</b> ${n.editor}</p>
</div>
</div>
</div>
`
})
}

function toggle(i){
let d=document.getElementById("d"+i)
d.style.display=d.style.display==="block"?"none":"block"
}

function filterNews(cat){
if(cat==="all") render(news)
else render(news.filter(n=>n.category===cat))
}

function searchNews(){
let q=document.getElementById("search").value.toLowerCase()
render(news.filter(n=>n.title.toLowerCase().includes(q)))
}

/* BREAKING NEWS TICKER */
document.getElementById("breaking").innerText=news.map(n=>n.title).join("  •  ")

/* TRENDING STORIES */
let trending=document.getElementById("trending")
news.slice(0,6).forEach(n=>{
trending.innerHTML+=`<li>${n.title}</li>`
})

render(news)

</script>
</body>
</html>
