<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves Global News</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;color:#333;}
a{text-decoration:none;}
header{text-align:center;background:white;padding:15px;border-bottom:3px solid #c00;}
header img{width:120px;}
h1{color:#c00;margin:10px 0;}
.tagline{color:#333;font-size:16px;}
.breaking{background:#c00;color:white;padding:10px;font-weight:bold;overflow:hidden;white-space:nowrap;}
nav{background:#111;text-align:center;padding:12px;}
nav a{color:white;margin:0 12px;font-weight:bold;cursor:pointer;}
nav a:hover{color:#ffd700;}
.container{display:flex;max-width:1200px;margin:auto;padding:20px;gap:20px;}
.main{flex:3;}
.sidebar{flex:1;}
.card{background:white;margin-bottom:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.2);overflow:hidden;}
.card img{width:100%;display:block;}
.card h3{color:#c00;margin:10px;}
.card p{margin:10px;color:#333;line-height:1.5;}
.top-headline{position:relative;margin-bottom:20px;}
.top-headline img{width:100%;height:400px;object-fit:cover;}
.top-headline h2{position:absolute;bottom:20px;left:20px;color:white;background:rgba(0,0,0,0.6);padding:10px;font-size:28px;max-width:80%;border-radius:5px;}
.sidebar h3{color:#c00;margin-bottom:10px;}
.sidebar .trending{background:white;padding:10px;margin-bottom:15px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.sidebar .trending h4{margin:5px 0;color:#c00;font-size:16px;}
.sidebar .trending p{font-size:14px;line-height:1.4;}
footer{background:#111;color:white;text-align:center;padding:30px;margin-top:20px;}
footer .social img{width:30px;margin:8px;}
audio{margin-top:10px;width:250px;}
</style>
</head>
<body>

<header>
<!-- Inline Base64 logo -->
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABG0lEQVR4nO3RMQ0AAAgDINc/9K3hBBCAk0FrlIYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgL8CTxIAAFxBzJgAAAABJRU5ErkJggg==" alt="RadiantWaves Logo">
<h1>RadiantWaves</h1>
<p class="tagline">Gateway to World News</p>
<audio controls autoplay loop>
  <source src="audio/news-music.mp3" type="audio/mpeg">
  Your browser does not support audio
</audio>
</header>

<div class="breaking">
<marquee id="breaking">Loading breaking news...</marquee>
</div>

<nav>
<a onclick="showCategory('all')">Home</a>
<a onclick="showCategory('world')">World</a>
<a onclick="showCategory('politics')">Politics</a>
<a onclick="showCategory('business')">Business</a>
<a onclick="showCategory('technology')">Technology</a>
<a onclick="showCategory('sports')">Sports</a>
<a onclick="showCategory('entertainment')">Entertainment</a>
</nav>

<div class="container">
  <div class="main" id="main-news"></div>
  <div class="sidebar">
    <h3>Trending</h3>
    <div id="trending"></div>
  </div>
</div>

<footer>
<p>© 2026 RadiantWaves News Network</p>
<p>Truth • Insight • Global Perspective</p>
<div class="social">
<!-- Inline Base64 social icons -->
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAABKElEQVR4nO3SsQnAIAwE0fD/NV7iIzIiRUlPTyq/kIhQ9mBrnOAbAAAQAAAAAAAAAAAAAAAAAAAJ0Pkkb6v+lIjv6tWta5yWl8hn2d5N5xe0Vb+6y53e1Xvm+q1X+XsvlVt+qjqlq/+89AAAAAAAAAAAAAID+F+IPAAAAAAAAAAAAAAAgf4X4g8AAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAABP+H1tMfx4e1lIAAAAAElFTkSuQmCC" alt="Facebook">
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAABMklEQVR4nO3SsQnAIAwE0fD/NV7iIzIiRUlPTyq/kIhQ9mBrnOAbAAAQAAAAAAAAAAAAAAAAAAAJ0Pkkb6v+lIjv6tWta5yWl8hn2d5N5xe0Vb+6y53e1Xvm+q1X+XsvlVt+qjqlq/+89AAAAAAAAAAAAAID+F+IPAAAAAAAAAAAAAAAgf4X4g8AAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAABP+H1tMfx4e1lIAAAAAElFTkSuQmCC" alt="Instagram">
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAABNklEQVR4nO3SsQnAIAwE0fD/NV7iIzIiRUlPTyq/kIhQ9mBrnOAbAAAQAAAAAAAAAAAAAAAAAAAJ0Pkkb6v+lIjv6tWta5yWl8hn2d5N5xe0Vb+6y53e1Xvm+q1X+XsvlVt+qjqlq/+89AAAAAAAAAAAAAID+F+IPAAAAAAAAAAAAAAAgf4X4g8AAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAABP+H1tMfx4e1lIAAAAAElFTkSuQmCC" alt="Twitter">
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAABK0lEQVR4nO3SsQnAIAwE0fD/NV7iIzIiRUlPTyq/kIhQ9mBrnOAbAAAQAAAAAAAAAAAAAAAAAAAJ0Pkkb6v+lIjv6tWta5yWl8hn2d5N5xe0Vb+6y53e1Xvm+q1X+XsvlVt+qjqlq/+89AAAAAAAAAAAAAID+F+IPAAAAAAAAAAAAAAAgf4X4g8AAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAAAAAACB/hfiDwAAAAAAAABP+H1tMfx4e1lIAAAAAElFTkSuQmCC" alt="TikTok">
</div>
</footer>

<script>
let articles = [];
let currentCategory = 'all';

function showCategory(category){
  currentCategory = category;
  renderNews();
}

function renderNews(){
  const main = document.getElementById("main-news");
  const trending = document.getElementById("trending");
  main.innerHTML = '';
  trending.innerHTML = '';

  let filtered = (currentCategory==='all') ? articles : articles.filter(a=>a.category===currentCategory);

  if(filtered.length>0){
    let top = filtered[0];
    main.innerHTML += `
      <div class="top-headline">
        <img src="${top.image}" alt="${top.title}">
        <h2>${top.title}</h2>
      </div>
    `;
  }

  filtered.slice(1).forEach(article=>{
    main.innerHTML += `
      <div class="card">
        <img src="${article.image}" alt="${article.title}">
        <h3>${article.title}</h3>
        <p>${article.story}</p>
      </div>
    `;
  });

  filtered.slice(0,3).forEach(article=>{
    trending.innerHTML += `
      <div class="trending">
        <h4>${article.title}</h4>
        <p>${article.story.substring(0,60)}...</p>
      </div>
    `;
  });

  if(filtered.length>0) document.getElementById("breaking").innerHTML = filtered[0].title;
}

// Fetch live news using API key
async function fetchNews(){
  try{
    const res = await fetch(`https://newsapi.org/v2/top-headlines?language=en&pageSize=10&apiKey=10618a434f80cc4ffe52717ea1bf2401`);
    const data = await res.json();
    articles = data.articles.map(a=>{
      return {
        title: a.title || "No title",
        story: a.description || a.content || "Read more...",
        image: a.urlToImage || "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABG0lEQVR4nO3RMQ0AAAgDINc/9K3hBBCAk0FrlIYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgL8CTxIAAFxBzJgAAAABJRU5ErkJggg==",
        category: "world"
      };
    });
    renderNews();
  }catch(err){
    console.error("Failed to fetch news:", err);
    articles = [
      {title:"Local News Example", story:"This is placeholder story.", image:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABG0lEQVR4nO3RMQ0AAAgDINc/9K3hBBCAk0FrlIYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgL8CTxIAAFxBzJgAAAABJRU5ErkJggg==", category:"world"}
    ];
    renderNews();
  }
}

fetchNews();
</script>

</body>
</html>
