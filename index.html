<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiantWaves News Network</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:white;
text-align:center;
padding:20px;
border-bottom:3px solid #0b3d91;
}

header img{
width:120px;
}

h1{
margin:10px 0;
font-size:34px;
color:#0b3d91;
}

.slogan{
font-size:17px;
color:#444;
}

/* BREAKING NEWS */

.breaking{
background:#0b3d91;
color:white;
padding:10px;
font-weight:bold;
}

/* NAVIGATION */

nav{
background:black;
text-align:center;
padding:12px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

nav a:hover{
color:#f4c542;
}

/* MAIN LAYOUT */

.main{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:3fr 1fr;
gap:25px;
padding:20px;
}

/* TOP STORY */

.top-story{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.top-story img{
width:100%;
border-radius:4px;
}

.top-story h2{
color:#0b3d91;
}

/* NEWS GRID */

.news-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.news-card{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

.news-card img{
width:100%;
border-radius:4px;
margin-bottom:10px;
}

.news-card h3{
color:#0b3d91;
}

.news-card h3 a{
text-decoration:none;
color:#0b3d91;
}

.news-card h3 a:hover{
color:#f4c542;
}

/* TRENDING */

.trending{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

.trending h3{
color:#0b3d91;
border-bottom:2px solid #0b3d91;
padding-bottom:8px;
}

.trending p{
font-size:14px;
margin:10px 0;
cursor:pointer;
}

.trending p:hover{
color:#0b3d91;
}

/* FOOTER */

footer{
background:#0b3d91;
color:white;
text-align:center;
padding:25px;
margin-top:30px;
}

.social img{
width:32px;
margin:8px;
}

audio{
margin-top:10px;
}

</style>

</head>

<body>

<header>

<img src="icon-512.png">

<h1>RadiantWaves</h1>

<p class="slogan">
Gateway to World News – Connecting You to the World
</p>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

</header>

<div class="breaking">
<marquee id="breaking">Loading Breaking News...</marquee>
</div>

<nav>

<a onclick="filterNews('all')">Home</a>
<a onclick="filterNews('world')">World</a>
<a onclick="filterNews('politics')">Politics</a>
<a onclick="filterNews('business')">Business</a>
<a onclick="filterNews('technology')">Technology</a>
<a onclick="filterNews('sports')">Sports</a>
<a onclick="filterNews('entertainment')">Entertainment</a>

</nav>

<div class="main">

<div>

<div id="topNews"></div>

<div class="news-grid" id="news"></div>

</div>

<div class="trending">

<h3>Trending / Most Read</h3>

<div id="trending"></div>

</div>

</div>

<footer>

<p>© 2026 RadiantWaves News Network</p>
<p>Truth. Insight. Global Perspective</p>

<div class="social">

<a href="https://facebook.com/radiantwavesnews" target="_blank">
<img src="images/facebook.png">
</a>

<a href="https://instagram.com/radiantwaves1" target="_blank">
<img src="images/instagram.png">
</a>

<a href="https://twitter.com/radiant13528995" target="_blank">
<img src="images/twitter.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia" target="_blank">
<img src="images/tiktok.png">
</a>

</div>

</footer>

<script>

let allNews=[]

fetch("news.json")
.then(res=>res.json())
.then(data=>{

allNews=data.articles

displayNews("all")

if(allNews.length>0){
document.getElementById("breaking").innerText=allNews[0].title
}

loadTrending()

})

function displayNews(category){

let filtered=category==="all"?allNews:allNews.filter(n=>n.category===category)

let top=filtered[0]

document.getElementById("topNews").innerHTML=`

<div class="top-story">

<img src="${top.image}">

<h2>
<a href="article.html?title=${encodeURIComponent(top.title)}&story=${encodeURIComponent(top.story)}&image=${encodeURIComponent(top.image)}">
${top.title}
</a>
</h2>

<p>${top.story}</p>

</div>
`

let container=document.getElementById("news")

container.innerHTML=""

filtered.slice(1).forEach(article=>{

container.innerHTML+=`

<div class="news-card">

<img src="${article.image}">

<h3>
<a href="article.html?title=${encodeURIComponent(article.title)}&story=${encodeURIComponent(article.story)}&image=${encodeURIComponent(article.image)}">
${article.title}
</a>
</h3>

<p>${article.story}</p>

</div>

`

})

}

function loadTrending(){

let t=document.getElementById("trending")

allNews.slice(0,5).forEach(n=>{

t.innerHTML+=`<p>${n.title}</p>`

})

}

function filterNews(cat){
displayNews(cat)
}

</script>

</body>
</html>
