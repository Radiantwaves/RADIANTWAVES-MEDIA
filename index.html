<!DOCTYPE html>
<html>

<head>

<title>Radiant Waves News</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#111;
color:white;
padding:15px;
}

nav{
display:flex;
gap:15px;
align-items:center;
}

nav button{
background:none;
border:none;
color:white;
font-size:15px;
cursor:pointer;
}

.search{
margin-left:auto;
}

.search input{
padding:5px;
}

.breaking{
background:red;
color:white;
padding:8px;
white-space:nowrap;
overflow:hidden;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 40s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.main{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.news{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.details{
display:none;
margin-top:10px;
}

.sidebar{
background:white;
padding:15px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h2>Radiant Waves News</h2>

<nav>

<button onclick="filterNews('all')">Home</button>
<button onclick="filterNews('Naija Pulse')">Naija Pulse</button>
<button onclick="filterNews('World')">World</button>
<button onclick="filterNews('Technology')">Technology</button>
<button onclick="filterNews('Sports')">Sports</button>
<button onclick="filterNews('Election')">Election Watch</button>

<div class="search">
<input id="search" placeholder="Search..." onkeyup="searchNews()">
</div>

</nav>

</header>

<div class="breaking">
<span id="breaking"></span>
</div>

<div class="main">

<div class="news" id="news"></div>

<div class="sidebar">

<h3>Trending</h3>

<ul id="trending"></ul>

</div>

</div>

<footer>

Radiant Waves News © 2026  
Editor: Omotara How

</footer>

<script>

const news=[

{
category:"Naija Pulse",
title:"Peter Obi Calls for Electoral Reform in Nigeria",
image:"images/peter-obi.jpg",
synopsis:"Obi urges stronger democratic institutions.",
details:"Peter Obi has renewed calls for major electoral reforms in Nigeria. He urged political leaders and institutions to strengthen transparency and accountability in elections while encouraging citizens to remain engaged in democratic processes."
},

{
category:"Naija Pulse",
title:"El-Rufai Political Influence Remains Strong",
image:"images/el-rufai.jpg",
synopsis:"Analysts discuss El-Rufai’s future role.",
details:"Political observers say former Kaduna governor Nasir El-Rufai remains a key figure in national politics as Nigeria gradually moves toward the 2027 election cycle."
},

{
category:"Naija Pulse",
title:"Sunday Igboho Advocates Regional Unity",
image:"images/sunday-igboho.jpg",
synopsis:"Activist calls for unity among Yoruba communities.",
details:"Yoruba activist Sunday Igboho has urged stronger unity among communities in southwestern Nigeria while encouraging peaceful advocacy."
},

{
category:"Naija Pulse",
title:"Tinubu Government Defends Economic Policies",
image:"images/tinubu.jpg",
synopsis:"Officials say reforms are necessary.",
details:"Government officials say ongoing economic reforms are necessary to stabilize Nigeria’s long-term economic outlook despite current public concerns about inflation."
},

{
category:"Naija Pulse",
title:"Atiku Signals Possible Opposition Alliance",
image:"images/atikubakar.jpg",
synopsis:"Opposition parties consider cooperation.",
details:"Former Vice President Atiku Abubakar has hinted that opposition leaders may form alliances ahead of future elections."
},

{
category:"World",
title:"Global Oil Markets React to Middle East Tensions",
image:"images/world.jpg",
synopsis:"Energy markets monitor geopolitical risks.",
details:"Oil markets around the world are reacting to geopolitical tensions in the Middle East as diplomats attempt to reduce the risk of escalation."
},

{
category:"World",
title:"UN Calls for Humanitarian Access in Gaza",
image:"images/world.jpg",
synopsis:"Aid agencies warn of worsening conditions.",
details:"The United Nations has urged greater humanitarian access as aid organizations warn of worsening conditions in conflict-affected regions."
},

{
category:"Technology",
title:"Artificial Intelligence Innovation Accelerates",
image:"images/technology.jpg",
synopsis:"New AI systems promise faster computing.",
details:"Technology companies continue to invest heavily in artificial intelligence systems designed to improve automation and data processing capabilities."
},

{
category:"Technology",
title:"Cybersecurity Experts Warn of Rising Threats",
image:"images/technology.jpg",
synopsis:"Governments urged to strengthen defenses.",
details:"Cybersecurity experts say governments and companies must strengthen digital defenses as cyber attacks grow more sophisticated."
},

{
category:"Sports",
title:"Champions League Knockout Stage Approaches",
image:"images/sports.jpg",
synopsis:"European clubs prepare for decisive matches.",
details:"Major European football clubs are preparing for decisive Champions League knockout matches as the competition intensifies."
},

{
category:"Sports",
title:"Athletics Qualification Events Begin Worldwide",
image:"images/sports.jpg",
synopsis:"Athletes aim for global championships.",
details:"Athletes across several continents are competing in qualification events ahead of upcoming international championships."
},

{
category:"Election",
title:"US Presidential Campaign Intensifies",
image:"images/election.jpg",
synopsis:"Candidates increase nationwide campaigning.",
details:"Presidential candidates across the United States are expanding their campaign efforts as political debates dominate national headlines."
},

{
category:"Election",
title:"UK Political Parties Prepare for Election Season",
image:"images/election.jpg",
synopsis:"Parties unveil policy platforms.",
details:"Major UK political parties are unveiling campaign priorities ahead of the next election cycle."
}

]

function render(list){

let container=document.getElementById("news")

container.innerHTML=""

list.forEach((n,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.synopsis}</p>

<button onclick="toggle(${i})">Read More</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

<p><b>Editor:</b> Omotara How</p>

</div>

</div>

</div>

`

})

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filterNews(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("breaking").innerText=

news.map(n=>n.title).join(" • ")

let trending=document.getElementById("trending")

news.slice(0,6).forEach(n=>{

trending.innerHTML+=`<li>${n.title}</li>`

})

render(news)

</script>

</body>

</html>
