<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#ffffff;
    color:#000000;
}

header{
    background:#000;
    color:white;
    padding:15px;
    text-align:center;
}

#breaking{
    background:orange;
    color:black;
    padding:8px;
    font-weight:bold;
    overflow:hidden;
    white-space:nowrap;
}

#breaking span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 15s linear infinite;
}

@keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

#menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    background:#f2f2f2;
    padding:10px;
}

#menu button{
    margin:5px;
    padding:8px 12px;
    border:none;
    background:#1e90ff;
    color:white;
    cursor:pointer;
}

#menu button:hover{
    background:#000;
}

#main{
    padding:15px;
    text-align:center;
}

#main img{
    width:100%;
    max-height:400px;
    object-fit:cover;
}

.section{
    display:none;
    padding:15px;
}

.card{
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:10px;
}

.card img{
    width:100%;
}

.card a{
    text-decoration:none;
    color:#1e90ff;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Radiant Waves Media</h1>
</header>

<div id="breaking"><span>Loading breaking news...</span></div>

<div id="menu">
<button onclick="show('nigeria')">Nigeria</button>
<button onclick="show('america')">America</button>
<button onclick="show('europe')">Europe</button>
<button onclick="show('sport')">Sport</button>
<button onclick="show('business')">Business</button>
</div>

<div id="main">
<img id="mainImage" src="main-story.jpg">
<h2 id="mainTitle">Loading...</h2>
<p id="mainSummary"></p>
<a id="mainLink" href="#" target="_blank">Read Full Story</a>
</div>

<div id="nigeria" class="section"></div>
<div id="america" class="section"></div>
<div id="europe" class="section"></div>
<div id="sport" class="section"></div>
<div id="business" class="section"></div>

<script>
function show(section){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById(section).style.display='block';
}

fetch('news.json?v='+Date.now())
.then(res=>res.json())
.then(data=>{

    // MAIN STORY
    document.getElementById('mainImage').src=data.main.image;
    document.getElementById('mainTitle').innerText=data.main.title;
    document.getElementById('mainSummary').innerText=data.main.summary;
    document.getElementById('mainLink').href=data.main.link;

    // BREAKING
    document.getElementById('breaking').innerHTML=
    "<span>"+data.breaking+"</span>";

    // LOAD SECTIONS
    function loadSection(name){
        let container=document.getElementById(name);
        container.innerHTML="";
        data[name].forEach(item=>{
            container.innerHTML+=`
            <div class="card">
                <img src="${item.image}">
                <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
                <p>${item.summary}</p>
            </div>`;
        });
    }

    loadSection('nigeria');
    loadSection('america');
    loadSection('europe');
    loadSection('sport');
    loadSection('business');

});

show('nigeria');
</script>

</body>
</html>
