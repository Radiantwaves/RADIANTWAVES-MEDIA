<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Global News</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
background:#cc0000;
color:white;
padding:15px;
text-align:center;
}

header h1{
margin:0;
font-size:28px;
}

/* NAV */

nav{
background:#111;
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
padding:12px 15px;
cursor:pointer;
font-weight:bold;
}

nav button:hover{
background:#cc0000;
}

.search{
margin-left:auto;
padding:8px;
}

.search input{
padding:6px;
width:200px;
}

/* BREAKING NEWS */

.breaking{
background:#cc0000;
color:white;
padding:8px;
font-weight:bold;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
padding-left:100%;
animation:scroll 40s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* NEWS CARDS */

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
border-radius:4px;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:15px;
}

.details{
display:none;
margin-top:10px;
line-height:1.6;
}

.read{
background:#cc0000;
color:white;
border:none;
padding:6px 10px;
margin-top:10px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

.social img{
width:26px;
margin:6px;
}

audio{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>Radiant Waves Global News</h1>

<p>Gateway to World News – Connecting You to the World</p>

</header>

<audio controls autoplay loop>
<source src="news-music.mp3" type="audio/mpeg">
</audio>

<div class="breaking">
<span id="ticker"></span>
</div>

<nav>

<button onclick="filterNews('all')">Home</button>

<button onclick="filterNews('Naija')">Naija Pulse</button>

<button onclick="filterNews('Africa')">Africa</button>

<button onclick="filterNews('World')">World</button>

<button onclick="filterNews('Tech')">Technology</button>

<button onclick="filterNews('Economy')">Economy</button>

<button onclick="filterNews('Sports')">Sports</button>

<button onclick="filterNews('Election')">Election</button>

<div class="search">
<input id="search" placeholder="Search news..." onkeyup="searchNews()">
</div>

</nav>

<div class="container" id="news"></div>

<footer>

<div class="social">

<a href="https://instagram.com/radiantwaves1">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="https://tiktok.com/@radiantwavesmedia">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
</a>

<a href="https://facebook.com/radiantwavesnews">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://twitter.com/radiantwaves13528995">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
</a>

</div>

<p>© 2026 Radiant Waves Global News</p>

</footer>

/* NEWS STORIES */

category:"World",

details:"Diplomats from several countries continue negotiations aimed at reducing tensions in the Middle East conflict and preventing further escalation.",
author:"Editor: Omotara How",
source:"Radiant Waves Global Affairs Desk"
}


RENDER NEWS */

function render(list){

let html="";

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p><b>${n.category}</b></p>

<p>${n.summary}</p>

<div id="d${i}" class="details">

<p>${n.details}</p>

<p><b>${n.author}</b></p>

<p><i>${n.source}</i></p>

</div>

<button class="read" onclick="toggle(${i})">Read More</button>

</div>

</div>

`;

});

document.getElementById("news").innerHTML=html;

}


/* READ MORE */

function toggle(i){

let d=document.getElementById("d"+i);

d.style.display=d.style.display==="block"?"none":"block";

}


/* FILTER */

function filterNews(cat){

if(cat==="all"){
render(news);
}

else{
render(news.filter(n=>n.category===cat));
}

}


/* SEARCH */

function searchNews(){

let q=document.getElementById("search").value.toLowerCase();

render(news.filter(n=>n.title.toLowerCase().includes(q)));

}


render(news);

</script>

</body>
</html>
