<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves Media</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:white;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ffcc;
}

#liveDateTime{
  text-align:center;
  padding:8px;
  background:#222;
  color:#00ffcc;
  font-size:14px;
}

#breaking{
  background:red;
  padding:8px;
  overflow:hidden;
  white-space:nowrap;
}

#breakingContent{
  display:inline-block;
  padding-left:100%;
  animation:scroll 25s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}

.main{
  padding:20px;
  text-align:center;
}

.main img{
  width:100%;
  max-height:350px;
  object-fit:cover;
}

.section{
  padding:20px;
}

.section h2{
  border-bottom:2px solid #00ffcc;
  padding-bottom:5px;
  color:#00ffcc;
}

.card{
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:5px;
}

.card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
}

.social{
  text-align:center;
  padding:15px;
  background:#000;
}

.social img{
  width:28px;
  margin:0 10px;
}

footer{
  text-align:center;
  padding:10px;
  background:#000;
  font-size:12px;
}
</style>
</head>

<body>

<header>Radiant Waves Media</header>

<div id="liveDateTime"></div>

<div id="breaking">
<span id="breakingContent">Loading breaking news...</span>
</div>

<div class="main">
<img id="mainImage" src="main-story.jpg">
<h2 id="mainTitle">Loading headline...</h2>
<p id="mainSummary"></p>
</div>

<!-- NEWS SECTIONS -->

<div id="nigeriaNews" class="section"><h2>Nigeria</h2></div>
<div id="europeNews" class="section"><h2>Europe</h2></div>
<div id="americaNews" class="section"><h2>America</h2></div>
<div id="africaNews" class="section"><h2>Africa</h2></div>
<div id="asiaNews" class="section"><h2>Asia</h2></div>
<div id="politicsNews" class="section"><h2>Politics</h2></div>
<div id="businessNews" class="section"><h2>Business</h2></div>
<div id="sportNews" class="section"><h2>Sport</h2></div>
<div id="musicNews" class="section"><h2>Music</h2></div>
<div id="moviesNews" class="section"><h2>Movies</h2></div>

<div class="social">
<a href="#"><img src="facebook.png"></a>
<a href="#"><img src="twitter.png"></a>
<a href="#"><img src="Instagram.png"></a>
<a href="#"><img src="tiktok.png" style="background:white;padding:4px;border-radius:6px;"></a>
</div>

<footer>© 2026 Radiant Waves Media</footer>

<audio id="bgMusic" src="news-music.mp3" loop></audio>

<script>
// LIVE CLOCK
function updateClock(){
  const now = new Date();
  const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById("liveDateTime").innerHTML =
  now.toLocaleDateString(undefined, options) + " | " +
  now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();


// LOAD NEWS
fetch("news.json")
.then(response => response.json())
.then(data => {

  // MAIN ROTATION
  let index = 0;
  function rotateMain(){
    const story = data.main[index];
    document.getElementById("mainTitle").innerText = story.title;
    document.getElementById("mainSummary").innerText = story.summary;
    document.getElementById("mainImage").src = story.image;
    index = (index + 1) % data.main.length;
  }
  rotateMain();
  setInterval(rotateMain,8000);

  // BREAKING
  document.getElementById("breakingContent").innerText =
  data.breaking.map(item=>item.title).join(" ⚡ ");

  // LOAD SECTIONS
  function loadSection(sectionName){
    if(data[sectionName]){
      let html="";
      data[sectionName].forEach(item=>{
        html+=`
          <div class="card">
            ${item.image ? `<img src="${item.image}">` : ""}
            <h3>${item.title}</h3>
            <p>${item.summary}</p>
          </div>`;
      });
      document.getElementById(sectionName+"News").innerHTML += html;
    }
  }

  ["nigeria","europe","america","africa","asia",
   "politics","business","sport","music","movies"]
   .forEach(loadSection);

});


// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("service-worker.js")
    .then(()=>console.log("Service Worker Registered"));
  });
}
</script>

</body>
</html>
