<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWaves News Network</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;color:#000;}
header{background:#08364b;color:white;text-align:center;padding:25px;}
header img{width:150px;border-radius:5px;}
h1{margin:10px 0;font-size:36px;}
.slogan{font-size:18px;opacity:0.9;}
audio{margin-top:15px;width:260px;}
.breaking{background:red;color:white;padding:10px;font-weight:bold;overflow:hidden;white-space:nowrap;}
.breaking span{display:inline-block;padding-left:100%;animation:scroll 20s linear infinite;}
@keyframes scroll {0%{transform:translateX(0%);}100%{transform:translateX(-100%);}}
nav{background:black;text-align:center;padding:12px;}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:bold;font-size:16px;cursor:pointer;}
#news{max-width:900px;margin:auto;padding:20px;}
.news-card{background:white;padding:15px;margin-bottom:15px;border-radius:6px;box-shadow:0 0 5px rgba(0,0,0,0.2);}
.news-card img{width:100%;border-radius:4px;margin-bottom:10px;}
.news-card h3{margin:0;color:#1E3A8A;}
.news-card p{margin:0;}
.news-card small{color:#555;}
footer{background:#08364b;color:white;text-align:center;padding:25px;}
footer .social span{display:block;margin-bottom:8px;}
footer .social img{width:35px;margin:0 5px;vertical-align:middle;}
</style>
</head>
<body>

<header>
  <img src="main-story.jpg" alt="RadiantWaves Logo">
  <h1>RadiantWaves</h1>
  <p class="slogan">Gateway to World News, connecting you to the World</p>
  <audio controls autoplay loop>
    <source src="news-music.mp3" type="audio/mpeg">
  </audio>
</header>

<div class="breaking"><span id="breaking">Loading global headlines...</span></div>

<nav>
  <a onclick="loadNews(null)">Home</a>
  <a onclick="loadNews('World')">World</a>
  <a onclick="loadNews('Politics')">Politics</a>
  <a onclick="loadNews('Business')">Business</a>
  <a onclick="loadNews('Technology')">Technology</a>
  <a onclick="loadNews('Sports')">Sports</a>
  <a onclick="loadNews('Science')">Science</a>
  <a onclick="loadNews('Entertainment')">Entertainment</a>
</nav>

<div id="news">
  <p>Loading news...</p>
</div>

<footer>
  <p>© 2026 RadiantWaves News Network</p>
  <p>Truth. Insight. Global Perspective</p>
  <div class="social">
    <span>Follow RadiantWaves:</span>
    <a href="https://www.facebook.com/"><img src="facebook.png" alt="Facebook"></a>
    <a href="https://www.instagram.com/"><img src="instagram.png" alt="Instagram"></a>
    <a href="https://twitter.com/"><img src="twitter.png" alt="Twitter"></a>
    <a href="https://www.tiktok.com/"><img src="tiktok.png" alt="TikTok"></a>
  </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function(){

  async function loadNews(categoryFilter = null){
    try{
      const response = await fetch('news.json');
      const data = await response.json();
      const newsContainer = document.getElementById("news");
      const breakingSpan = document.getElementById("breaking");

      let filtered = data.articles;
      if(categoryFilter){
        filtered = data.articles.filter(a => a.category === categoryFilter);
      }

      if(filtered.length === 0){
        newsContainer.innerHTML = '<p>No news available.</p>';
        breakingSpan.textContent = 'No breaking news at this time.';
        return;
      }

      // Breaking news ticker: first 5 headlines
      breakingSpan.textContent = filtered.slice(0,5).map(a => a.title).join(' *** ');

      // Populate news cards
      newsContainer.innerHTML = filtered.map((article,i) => `
        <div class="news-card">
          <img src="${article.image}" alt="News ${i+1}">
          <h3>${article.title}</h3>
          <p>${article.summary}</p>
          <small>${article.date}</small>
        </div>
      `).join('');

    }catch(e){
      console.error(e);
      document.getElementById("news").innerHTML = '<p>Error loading news.</p>';
      document.getElementById("breaking").textContent = 'Error loading breaking news.';
    }
  }

  // Initial load
  loadNews();

  // Make loadNews global so nav links can call it
  window.loadNews = loadNews;
});
</script>

</body>
</html>
