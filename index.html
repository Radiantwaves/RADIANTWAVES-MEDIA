}

margin:8px;
}

</style></head><body><header><h1>Radiant Waves Global News</h1><p><b>Gateway to World News – Connecting You to the World</b></p></header><audio controls autoplay loop style="width:100%">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</footer><script>

const news=[

{
title:"Peter Obi Calls for Electoral Reform in Nigeria",
category:"Naija",
image:"https://picsum.photos/800/500?politics",
summary:"Former presidential candidate renews push for electoral transparency.",
details:"Peter Obi has renewed calls for electoral reform in Nigeria, stressing that credible elections remain the backbone of democracy. Speaking at a civic forum attended by youth leaders and political observers, Obi emphasized that stronger electoral institutions are needed to restore public trust in the voting process."
},

{
title:"Nasir El-Rufai Discusses Future of Nigerian Politics",
category:"Naija",
image:"https://picsum.photos/800/500?nigeria",
summary:"Former Kaduna governor weighs in on national political direction.",
details:"Nasir El-Rufai has reentered national political discussions with comments on governance reforms and economic policy. Analysts say his remarks could influence political debates across Nigeria as the country continues to address economic and security challenges."
},

{
title:"Middle East Conflict Draws Global Diplomatic Attention",
category:"World",
image:"https://picsum.photos/800/500?middleeast",
summary:"World leaders call for restraint amid rising tensions.",
details:"International leaders are monitoring developments in the Middle East closely as diplomatic efforts continue to prevent further escalation. Governments and global organizations are urging dialogue and peaceful negotiations."
},

{
title:"Artificial Intelligence Expansion Reshapes Global Technology Industry",
category:"Tech",
image:"https://picsum.photos/800/500?ai",
summary:"AI investment continues to accelerate worldwide.",
details:"Technology companies around the world are investing billions of dollars into artificial intelligence research and development. Experts believe AI could revolutionize industries including healthcare, finance, and transportation."
},

{
title:"Cybersecurity Concerns Grow as Global Cyber Attacks Increase",
category:"Tech",
image:"https://picsum.photos/800/500?cybersecurity",
summary:"Security experts warn of rising cyber threats.",
details:"Cybersecurity analysts warn that global cyber attacks are becoming more sophisticated, targeting financial systems, infrastructure, and government networks. Companies are investing heavily in digital protection technologies."
},

{
title:"European Football Clubs Prepare for Major International Tournament",
category:"Sports",
image:"https://picsum.photos/800/500?football",
summary:"Teams intensify training ahead of key competitions.",
details:"Football clubs across Europe are preparing for upcoming continental competitions. Coaches and analysts say player fitness and tactical discipline will play major roles in determining which teams advance deep into the tournaments."
},

{
title:"Olympic Preparations Accelerate as Host Cities Finalize Plans",
category:"Sports",
image:"https://picsum.photos/800/500?olympics",
summary:"Infrastructure and athlete training programs expand.",
details:"Host cities preparing for upcoming Olympic competitions are accelerating construction projects and finalizing athlete preparation programs. Organizers say global participation is expected to reach record levels."
}

]

function render(list){

let html=""

list.forEach((n,i)=>{

html+=`

<div class="card">

<img src="${n.image}">

<div class="content">

<h3>${n.title}</h3>

<p>${n.summary}</p>

<button onclick="toggle(${i})">Read Full Story</button>

<div class="details" id="d${i}">

<p>${n.details}</p>

</div>

</div>

</div>

`

})

document.getElementById("news").innerHTML=html

}

function toggle(i){

let d=document.getElementById("d"+i)

d.style.display=d.style.display==="block"?"none":"block"

}

function filter(cat){

if(cat==="all") render(news)

else render(news.filter(n=>n.category===cat))

}

function searchNews(){

let q=document.getElementById("search").value.toLowerCase()

render(news.filter(n=>n.title.toLowerCase().includes(q)))

}

document.getElementById("ticker").innerText=news.map(n=>n.title).join(" • ")

render(news)

</script></body>
</html>
