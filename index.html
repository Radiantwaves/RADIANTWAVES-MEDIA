<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiantWavesMedia</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<header class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
    <span>RadiantWavesMedia</span>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">World</a>
    <a href="#">Politics</a>
    <a href="#">Business</a>
    <a href="#">Tech</a>
  </nav>
</header>

<!-- HERO / VIDEO BACKGROUND -->
<section class="hero">
  <video autoplay muted loop id="bgVideo">
    <source src="assets/news.mp4" type="video/mp4">
  </video>
  <div class="hero-text">
    <h2 id="hero-title">Loading...</h2>
  </div>
</section>

<!-- BREAKING -->
<div class="breaking">
🔴 LIVE: <span id="breaking-text"></span>
</div>

<!-- MAIN CONTENT -->
<main class="container">

<section class="main-news" id="main-news"></section>

<aside class="sidebar" id="sidebar-news"></aside>

</main>

<!-- VIDEO SECTION -->
<section class="video-section" id="video-section">
  <h2>Featured Video</h2>
</section>

<!-- SOCIAL -->
<div class="social">
  <i class="fab fa-facebook"></i>
  <i class="fab fa-x-twitter"></i>
  <i class="fab fa-youtube"></i>
  <i class="fab fa-instagram"></i>
</div>

<footer>
© 2026 RadiantWavesMedia
</footer>

<script src="script.js"></script>
</body>
</html>
