<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Waves News</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

/* HEADER */
.header { background:#111; text-align:center; padding:15px; }
.logo img { height:50px; }
.header-slogan { color:#aaa; font-size:14px; }

/* HERO */
.hero { position:relative; height:250px; overflow:hidden; }
.hero video { width:100%; height:100%; object-fit:cover; }
.overlay { position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.hero-text { position:absolute; bottom:20px; left:20px; font-size:22px; }

/* BREAKING */
.breaking { background:red; padding:10px; font-weight:bold; }

/* NAV */
nav { background:#000; text-align:center; padding:10px; }
nav a { color:white; margin:0 10px; cursor:pointer; }
nav a:hover { color:#00bfff; }

/* LAYOUT */
.container { max-width:1100px; margin:auto; display:flex; flex-wrap:wrap; padding:15px; }
.main { flex:3; display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.sidebar { flex:1; padding-left:15px; }

/* ARTICLES */
.article { background:#111; border-radius:6px; overflow:hidden; }
.article img { width:100%; height:180px; object-fit:cover; }
.article-content { padding:10px; }

.featured { grid-column:1 / -1; }
.featured img { height:280px; }

/* SIDEBAR */
.sidebar a { display:block; color:#ccc; margin:8px 0; }

/* SOCIAL */
.social { text-align:center; margin-top:20px; }
.social i { margin:10px; font-size:20px; }

/* FOOTER */
footer { background:#000; text-align:center; padding:20px; }
.footer-slogan { color:#aaa; }

/* MOBILE */
@media(max-width:768px){
  .main { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><img src="logo.png"></div>
  <div class="header-slogan">Real-Time Global Intelligence & Breaking News Network</div>
</div>

<!-- HERO -->
<div class="hero">
  <video id="bgVideo" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="hero-text">Top Stories Around the World</div>
  <button onclick="toggleSound()" style="position:absolute;top:10px;right:10px;">🔊</button>
</div>

<!-- BREAKING -->
<div class="breaking" id="breakingText"></div>

<!-- NAV -->
<nav>
  <a onclick="loadCategory('all')">Home</a>
  <a onclick="loadCategory('world')">World</a>
  <a onclick="loadCategory('tech')">Tech</a>
</nav>

<!-- CONTENT -->
<div class="container">

  <div class="main" id="newsContainer"></div>

  <div class="sidebar">
    <h3>Trending</h3>
    <a href="#">Global summit updates</a>
    <a href="#">AI transforming industries</a>

    <div class="social">
      <i class="fab fa-facebook"></i>
      <i class="fab fa-x-twitter"></i>
      <i class="fab fa-youtube"></i>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 RadiantWavesMedia
  <div class="footer-slogan">Connecting You Deeper to the World's Most Important Stories</div>
</footer>

<<script>

// 📰 FULL NEWS DATABASE (LIKE REAL SITE)
const newsDB = {

  all: [
    {
      title: "Global Leaders Meet at Economic Summit",
      desc: "World leaders gather to discuss global financial recovery.",
      img: "https://picsum.photos/800/400?1"
    },
    {
      title: "AI Revolution Accelerates Worldwide",
      desc: "Artificial intelligence reshaping industries rapidly.",
      img: "https://picsum.photos/800/400?2"
    },
    {
      title: "Climate Change Warnings Intensify",
      desc: "Experts warn urgent action is needed globally.",
      img: "https://picsum.photos/800/400?3"
    },
    {
      title: "Global Markets Show Signs of Growth",
      desc: "Investors respond positively to economic indicators.",
      img: "https://picsum.photos/800/400?4"
    },
    {
      title: "Major Sports Events Capture Attention",
      desc: "Fans follow global tournaments closely.",
      img: "https://picsum.photos/800/400?5"
    },
    {
      title: "Technology Giants Release New Innovations",
      desc: "Breakthroughs in AI and robotics dominate headlines.",
      img: "https://picsum.photos/800/400?6"
    }
  ],

  world: [
    {
      title: "International Peace Talks Begin",
      desc: "Diplomatic efforts aim to resolve global conflicts.",
      img: "https://picsum.photos/800/400?7"
    },
    {
      title: "Global Migration Trends Shift",
      desc: "New patterns emerging across continents.",
      img: "https://picsum.photos/800/400?8"
    }
  ],

  tech: [
    {
      title: "New AI Model Breakthrough",
      desc: "Next-generation AI shows human-like reasoning.",
      img: "https://picsum.photos/800/400?9"
    },
    {
      title: "Cybersecurity Threats Increase",
      desc: "Experts warn of rising global cyber attacks.",
      img: "https://picsum.photos/800/400?10"
    }
  ]

};


// 🧠 DISPLAY FUNCTION
function displayNews(data){
  const container = document.getElementById("newsContainer");
  container.innerHTML = "";

  data.forEach((a,i)=>{
    container.innerHTML += i === 0 ?
    `<div class="article featured">
        <img src="${a.img}">
        <div class="article-content">
          <h2>${a.title}</h2>
          <p>${a.desc}</p>
        </div>
     </div>`
    :
    `<div class="article">
        <img src="${a.img}">
        <div class="article-content">
          <h3>${a.title}</h3>
          <p>${a.desc}</p>
        </div>
     </div>`;
  });
}


// 🔁 CATEGORY SWITCH
function loadCategory(cat){
  displayNews(newsDB[cat]);
}


// 🔴 BREAKING NEWS (MORE REAL)
const breakingNews = [
  "Global summit begins amid economic concerns",
  "AI continues to dominate global headlines",
  "Climate crisis discussions intensify worldwide",
  "Markets react to latest financial reports",
  "Technology sector sees rapid innovation growth"
];

let b = 0;
setInterval(()=>{
  document.getElementById("breakingText").textContent = breakingNews[b];
  b = (b+1) % breakingNews.length;
}, 3000);


// 🔊 VIDEO SOUND
function toggleSound(){
  const video = document.getElementById("bgVideo");
  video.muted = !video.muted;
}


// 🚀 START
displayNews(newsDB.all);

</script>
</body>
</html>
