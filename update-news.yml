name: Update RadiantWaves News

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install node-fetch

      - run: node news-engine.js

      - run: |
          git config user.name "RadiantWaves Bot"
          git config user.email "bot@radiantwaves.com"
          git add news.json
          git commit -m "Auto news update"
          git push
